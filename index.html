<!-- D1 -->
<section class=&quot;section&quot; id=&quot;d1&quot;>
  <div class=&quot;section-head&quot;><div>
    <div class=&quot;section-day-num&quot;>Dzień 1</div>
    <h2 class=&quot;section-title&quot;>Czasy <em>angielskie</em></h2>
  </div></div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Present Simple / Present Continuous <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Czas</th><th>Kiedy używamy</th><th>Przykład</th></tr>
      <tr><td>Present Simple</td><td>Nawyki, fakty, prawdy ogólne, rozkłady jazdy</td><td><em>She works in a hospital.</em></td></tr>
      <tr><td>Present Continuous</td><td>Czynność trwająca teraz lub tymczasowo</td><td><em>She's working from home this week.</em></td></tr>
    </table></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Past Simple / Past Continuous <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Czas</th><th>Kiedy używamy</th><th>Przykład</th></tr>
      <tr><td>Past Simple</td><td>Zamknięte zdarzenie w konkretnym momencie</td><td><em>She left at 8.</em></td></tr>
      <tr><td>Past Continuous</td><td>Czynność trwała w tle — przerywana przez PS</td><td><em>While I was cooking, the phone rang.</em></td></tr>
    </table></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Present Perfect / Past Simple <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Czas</th><th>Kiedy używamy</th><th>Sygnały</th></tr>
      <tr><td>Present Perfect</td><td>Nie wiem kiedy, łączność z teraźniejszością, doświadczenia życiowe</td><td><em>already, yet, just, ever, never, since, for</em></td></tr>
      <tr><td>Past Simple</td><td>Wiem dokładnie kiedy — zamknięta przeszłość</td><td><em>yesterday, last week, ago, in 2010</em></td></tr>
    </table></div>
    <div class=&quot;phrase-block&quot;>
      <em>I have lost my keys.</em> — nie wiem kiedy, teraz ich nie mam (PP)<br>
      <em>I lost my keys yesterday.</em> — wiem kiedy (PS)
    </div>
    <div class=&quot;box box-green&quot;>✓ <strong>Transformacja maturalna:</strong> <em>He started working here in 2015.</em> → <em>He has worked here since 2015.</em></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Present Perfect / Present Perfect Continuous <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;phrase-block&quot;>
      <em>I've written three emails.</em> — wynik, co zostało zrobione (PP)<br>
      <em>I've been writing emails all morning.</em> — proces, jak długo trwa (PPC)
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Future: will / going to / Present Continuous <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Forma</th><th>Kiedy używamy</th><th>Przykład</th></tr>
      <tr><td>will</td><td>Spontaniczna decyzja lub przewidywanie bez dowodów</td><td><em>&quot;It's ringing!&quot; → &quot;I'll get it!&quot;</em></td></tr>
      <tr><td>going to</td><td>Plan z wyprzedzeniem lub przewidywanie z widocznym dowodem</td><td><em>Look at those clouds — it's going to rain.</em></td></tr>
      <tr><td>Present Continuous</td><td>Ustalony plan z konkretną godziną i miejscem</td><td><em>I'm meeting her at 7. I booked the table.</em></td></tr>
    </table></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Past Perfect / Past Perfect Continuous <span class=&quot;badge badge-r&quot;>Głównie rozszerzona</span></div>
    <div class=&quot;phrase-block&quot;>
      <em>When I arrived, she had already left.</em> — czynność przed inną czynnością w przeszłości (PP)<br>
      <em>He was tired because he had been working all night.</em> — proces trwający przed momentem w przeszłości (PPC)
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Future Perfect / Future Continuous <span class=&quot;badge badge-r&quot;>Rozszerzona</span></div>
    <div class=&quot;phrase-block&quot;>
      <em>By 2030, scientists will have found a cure.</em> — FP: ukończone przed momentem w przyszłości<br>
      <em>This time tomorrow I'll be sitting my exam.</em> — FC: trwać w konkretnym momencie
    </div>
    <div class=&quot;box box-blue&quot;>💡 <strong>Pro tip:</strong> Transformacje zdań to jedno z najbardziej przewidywalnych zadań na rozszerzonej — liczba struktur jest skończona. PP vs PS, since vs for, going to vs will — to się powtarza co roku.</div>
  </div>
</section>

<!-- D2 -->
<section class=&quot;section&quot; id=&quot;d2&quot;>
  <div class=&quot;section-head&quot;><div>
    <div class=&quot;section-day-num&quot;>Dzień 2</div>
    <h2 class=&quot;section-title&quot;>Conditionals, Modals + <em>kluczowe konstrukcje</em></h2>
  </div></div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>Conditionals — wszystkie typy</div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Typ</th><th>Budowa</th><th>Znaczenie</th><th>Przykład</th></tr>
      <tr><td>Type 0</td><td><em>If + PS → PS</em></td><td>Fakty i prawa ogólne <span class=&quot;badge badge-both&quot;>P+R</span></td><td><em>If you heat water to 100°C, it boils.</em></td></tr>
      <tr><td>Type 1</td><td><em>If + PS → will + inf.</em></td><td>Realna możliwość w przyszłości <span class=&quot;badge badge-both&quot;>P+R</span></td><td><em>If she studies hard, she will pass.</em></td></tr>
      <tr><td>Type 2</td><td><em>If + PS → would + inf.</em></td><td>Nierealna teraźniejszość <span class=&quot;badge badge-both&quot;>P+R</span></td><td><em>If I were you, I would apply for that job.</em></td></tr>
      <tr><td>Type 3</td><td><em>If + PP → would have + PP3</em></td><td>Nierealna przeszłość <span class=&quot;badge badge-r&quot;>R</span></td><td><em>If I had studied harder, I would have passed.</em></td></tr>
    </table></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Inversion <span class=&quot;badge badge-r&quot;>Rozszerzona</span></div>
    <div class=&quot;phrase-block&quot;>
      <em>Had I known,</em> I would have acted differently. (= If I had known...)<br>
      <em>Were she here,</em> she would help us. (= If she were here...)<br>
      <em>Should you need</em> help, call me. (= If you should need help...)
    </div>
    <div class=&quot;box box-green&quot;>✓ <strong>Transformacja maturalna:</strong> <em>&quot;Because he didn't study, he failed.&quot;</em> → <em>&quot;If he had studied, he wouldn't have failed.&quot;</em> — klasyczny type 3 który wchodzi co roku.</div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>Wish / If only</div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Konstrukcja</th><th>Znaczenie</th><th>Przykład</th></tr>
      <tr><td><em>wish + Past Simple</em></td><td>Żal za teraźniejszością</td><td><em>I wish I knew the answer.</em></td></tr>
      <tr><td><em>wish + Past Perfect</em></td><td>Żal za przeszłością</td><td><em>I wish I had studied harder.</em></td></tr>
      <tr><td><em>wish + would</em></td><td>Irytacja, prośba o zmianę</td><td><em>I wish you would stop talking.</em></td></tr>
      <tr><td><em>If only + PS</em></td><td>Silniejszy żal (teraźniejszość)</td><td><em>If only I spoke better English.</em></td></tr>
      <tr><td><em>If only + PP</em></td><td>Silniejszy żal (przeszłość)</td><td><em>If only I had arrived earlier.</em></td></tr>
    </table></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>Modals w przeszłości <span class=&quot;badge badge-r&quot;>Głównie rozszerzona</span></div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Konstrukcja</th><th>Znaczenie</th><th>Przykład</th></tr>
      <tr><td><em>must have + PP3</em></td><td>Pewna dedukcja</td><td><em>She must have left early — her coat is gone.</em></td></tr>
      <tr><td><em>can't have + PP3</em></td><td>Pewne zaprzeczenie</td><td><em>He can't have said that — I don't believe it.</em></td></tr>
      <tr><td><em>should have + PP3</em></td><td>Żal, wyrzut</td><td><em>You should have told me! I could have helped.</em></td></tr>
      <tr><td><em>might have + PP3</em></td><td>Możliwość w przeszłości</td><td><em>She might have missed the bus.</em></td></tr>
    </table></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>Kluczowe konstrukcje</div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Konstrukcja</th><th>Znaczenie</th><th>Przykład</th></tr>
      <tr><td><em>used to + inf.</em></td><td>Przeszły nawyk (już nie) <span class=&quot;badge badge-r&quot;>R</span></td><td><em>I used to smoke.</em></td></tr>
      <tr><td><em>would + inf.</em></td><td>Przeszły nawyk w narracji <span class=&quot;badge badge-r&quot;>R</span></td><td><em>He would walk to school.</em></td></tr>
      <tr><td><em>be used to + -ing</em></td><td>Być przyzwyczajonym <span class=&quot;badge badge-r&quot;>R</span></td><td><em>I'm used to waking up early.</em></td></tr>
      <tr><td><em>get used to + -ing</em></td><td>Przyzwyczajać się <span class=&quot;badge badge-r&quot;>R</span></td><td><em>She's getting used to driving.</em></td></tr>
      <tr><td><em>would like to + inf.</em></td><td>Grzeczna prośba / pragnienie <span class=&quot;badge badge-both&quot;>P+R</span></td><td><em>I'd like to book a table for two.</em></td></tr>
      <tr><td><em>be able to + inf.</em></td><td>Umiejętność we wszystkich czasach <span class=&quot;badge badge-both&quot;>P+R</span></td><td><em>He will be able to drive soon.</em></td></tr>
    </table></div>
    <div class=&quot;box box-blue&quot;>💡 <strong>Pro tip:</strong> be able to i would like to to ulubione struktury w transformacjach na rozszerzonej. <em>&quot;Can you come?&quot;</em> → <em>&quot;Would you be able to come?&quot;</em> — wchodzi co roku.</div>
  </div>
</section>

<!-- D3 -->
<section class=&quot;section&quot; id=&quot;d3&quot;>
  <div class=&quot;section-head&quot;><div>
    <div class=&quot;section-day-num&quot;>Dzień 3</div>
    <h2 class=&quot;section-title&quot;>Strona bierna + <em>mowa zależna</em></h2>
  </div></div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>Strona bierna — Passive Voice</div>
    <div class=&quot;box box-cream&quot;>Po co to jest? Strona bierna przesuwa uwagę z osoby na czynność — gdy nie wiemy kto coś zrobił, nie jest to ważne, lub chcemy brzmieć formalnie. Przykład: <em>The bridge was built in 1902.</em> — Nie wiemy kto go zbudował, liczy się fakt i data.</div>
    <div class=&quot;block-title&quot; style=&quot;margin-top:12px;&quot;>Budowa: be (w odpowiednim czasie) + PP3 <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Czas</th><th>Strona czynna</th><th>Strona bierna</th></tr>
      <tr><td>Present Simple</td><td><em>They make cars here.</em></td><td><em>Cars <strong>are made</strong> here.</em></td></tr>
      <tr><td>Past Simple</td><td><em>She wrote the report.</em></td><td><em>The report <strong>was written</strong> by her.</em></td></tr>
      <tr><td>Present Perfect</td><td><em>They have launched the app.</em></td><td><em>The app <strong>has been launched</strong>.</em></td></tr>
      <tr><td>Future (will)</td><td><em>They will announce results.</em></td><td><em>Results <strong>will be announced</strong>.</em></td></tr>
      <tr><td>Modal</td><td><em>You must submit the form.</em></td><td><em>The form <strong>must be submitted</strong>.</em></td></tr>
    </table></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Passive reporting structures <span class=&quot;badge badge-r&quot;>Rozszerzona</span></div>
    <div class=&quot;phrase-block&quot;>
      <em>It is said that the economy is recovering.</em> → <em>The economy <strong>is said to be</strong> recovering.</em><br>
      <em>It is believed that he fled abroad.</em> → <em>He <strong>is believed to have fled</strong> abroad.</em><br>
      <em>It is reported that she resigned.</em> → <em>She <strong>is reported to have resigned</strong>.</em>
    </div>
    <div class=&quot;box box-blue&quot;>💡 Klucz: zdanie w czasie przeszłym → <strong>to have + PP3</strong>. W teraźniejszym → <strong>to be + -ing</strong> lub <strong>to + infinitive</strong>.</div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Passive z get <span class=&quot;badge badge-r&quot;>Rozszerzona</span></div>
    <div class=&quot;phrase-block&quot;>
      <em>She got promoted last month.</em> (nieformalne = was promoted)<br>
      <em>He got fired for being late too often.</em>
    </div>
  </div>

  <hr class=&quot;block-divider&quot;>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>Mowa zależna — Reported Speech</div>
    <div class=&quot;box box-cream&quot;>Po co to jest? Sposób na opowiedzenie co ktoś powiedział bez dosłownego cytowania. Przykład: <em>&quot;I'm tired and I don't want to go,&quot; she said.</em> → <em>She said she was tired and didn't want to go.</em></div>
    <div class=&quot;block-title&quot; style=&quot;margin-top:12px;&quot;>Backshift — przesunięcie czasów <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Mowa bezpośrednia</th><th>Mowa zależna</th></tr>
      <tr><td>Present Simple</td><td>Past Simple</td></tr>
      <tr><td>Present Continuous</td><td>Past Continuous</td></tr>
      <tr><td>Past Simple</td><td>Past Perfect</td></tr>
      <tr><td>Present Perfect</td><td>Past Perfect</td></tr>
      <tr><td>will</td><td>would</td></tr>
      <tr><td>can</td><td>could</td></tr>
      <tr><td>may</td><td>might</td></tr>
      <tr><td>must</td><td>had to</td></tr>
    </table></div>
    <div class=&quot;phrase-block&quot;>
      <em>&quot;I am studying.&quot;</em> → She said she <strong>was studying</strong>.<br>
      <em>&quot;I have finished.&quot;</em> → He said he <strong>had finished</strong>.<br>
      <em>&quot;I will call you.&quot;</em> → She said she <strong>would call</strong> me.
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Zmiany wyrażeń czasu i miejsca <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Mowa bezpośrednia</th><th>Mowa zależna</th></tr>
      <tr><td><em>now</em></td><td><em>then</em></td></tr>
      <tr><td><em>today</em></td><td><em>that day</em></td></tr>
      <tr><td><em>yesterday</em></td><td><em>the day before / the previous day</em></td></tr>
      <tr><td><em>tomorrow</em></td><td><em>the next day / the following day</em></td></tr>
      <tr><td><em>last week</em></td><td><em>the week before / the previous week</em></td></tr>
      <tr><td><em>here / this / these</em></td><td><em>there / that / those</em></td></tr>
    </table></div>
    <div class=&quot;box box-blue&quot;>💡 &quot;Must&quot; → &quot;had to&quot; w backshifcie, ale &quot;should&quot; nie zmienia się. <em>&quot;You should try harder&quot;</em> → <em>She said I should try harder.</em> (nie: should have tried — to byłby wyrzut)</div>
  </div>
</section>

<!-- D4 -->
<section class=&quot;section&quot; id=&quot;d4&quot;>
  <div class=&quot;section-head&quot;><div>
    <div class=&quot;section-day-num&quot;>Dzień 4</div>
    <h2 class=&quot;section-title&quot;>Email nieformalny + <em>Blog</em></h2>
  </div></div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>Punktacja CKE — Podstawa (max 12 pkt)</div>
    <div class=&quot;box box-blue&quot;>💡 <strong>Ważne:</strong> Na poziomie podstawowym pierwsze zdanie jest zawsze <strong>podane w poleceniu</strong>. Zaczynasz od pierwszego podpunktu.</div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Kryterium</th><th>Co oceniają</th><th>Pkt</th></tr>
      <tr><td>Treść</td><td>Ile elementów poruszono i rozwinięto. Sama wzmianka bez rozwinięcia = niższy poziom.</td><td><strong>0–5</strong></td></tr>
      <tr><td>Spójność i logika</td><td>Tekst jako całość, akapity, logiczna organizacja</td><td><strong>0–2</strong></td></tr>
      <tr><td>Zakres środków językowych</td><td>Zróżnicowanie struktur, idiomy, kolokacje</td><td><strong>0–3</strong></td></tr>
      <tr><td>Poprawność środków językowych</td><td>Błędy gramatyczne i ortograficzne</td><td><strong>0–2</strong></td></tr>
    </table></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Struktura emaila nieformalnego <span class=&quot;badge badge-p&quot;>Podstawa</span></div>
    <div class=&quot;steps&quot;>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>1</div><div class=&quot;step-body&quot;><strong>Powitanie</strong> — podane. Opcjonalnie: <em>Hope you're doing well! / It's been ages!</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>2</div><div class=&quot;step-body&quot;><strong>Wstęp</strong> — <em>I'm writing to tell you about... / You won't believe what happened! / Guess what!</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>3</div><div class=&quot;step-body&quot;><strong>Rozwinięcie</strong> — 2 zdania na każdy punkt. Egzaminator musi widzieć akapity.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>4</div><div class=&quot;step-body&quot;><strong>Zakończenie</strong> — <em>I'd really recommend it! / Why don't we...? / Let me know what you think!</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>5</div><div class=&quot;step-body&quot;><strong>Pożegnanie</strong> — <em>Take care, / Best, / Hugs,</em> + XYZ</div></div>
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Gotowe zdania — email nieformalny</div>
    <div class=&quot;phrase-block&quot;>
      <div class=&quot;phrase-label&quot;>Otwierające</div>
      <em>You won't believe it, but...</em> <span class=&quot;pl&quot;>— Nie uwierzysz, ale...</span><br>
      <em>Guess what!</em> <span class=&quot;pl&quot;>— Zgadnij co!</span><br>
      <em>I'm writing to tell you about my recent...</em>
    </div>
    <div class=&quot;phrase-block&quot;>
      <div class=&quot;phrase-label&quot;>Relacjonowanie</div>
      <em>It was the most thrilling experience. / Our trip took an unexpected turn when...</em><br>
      <em>I was completely taken aback by...</em> <span class=&quot;pl&quot;>— Byłam zupełnie zaskoczona...</span><br>
      <em>We came across...</em> <span class=&quot;pl&quot;>— Natknęliśmy się na...</span> / <em>We ran out of...</em> <span class=&quot;pl&quot;>— Zabrakło nam...</span>
    </div>
    <div class=&quot;phrase-block&quot;>
      <div class=&quot;phrase-label&quot;>Zachęcanie / Kończące</div>
      <em>I would really recommend it to you. / Why don't we plan something similar next year?</em><br>
      <em>That's all for now — I'm looking forward to hearing from you! / Give my regards to your parents.</em>
    </div>
  </div>

  <hr class=&quot;block-divider&quot;>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Blog — struktura <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;box box-cream&quot;>Blog może mieć tytuł, pytania do czytelników, bezpośredni zwrot (you), osobisty ton. Email ma powitanie i pożegnanie. <strong>Nie mieszaj tych formatów.</strong></div>
    <div class=&quot;steps&quot; style=&quot;margin-top:10px;&quot;>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>1</div><div class=&quot;step-body&quot;><strong>Wstęp (podany!)</strong> — hook, który wciąga. <em>Have you heard about...? / Did I mention...?</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>2</div><div class=&quot;step-body&quot;><strong>Rozwinięcie</strong> — 2 zdania na każdy podpunkt. Możesz użyć <em>you, your, we</em>.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>3</div><div class=&quot;step-body&quot;><strong>Problem / kontrast</strong> — <em>However, there is an issue with... / This could be improved by...</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>4</div><div class=&quot;step-body&quot;><strong>Zakończenie</strong> — <em>Let me know what you think! / Feel free to share your experiences. / Stay tuned for more!</em></div></div>
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>Słownictwo kluczowe</div>
    <div class=&quot;vocab-grid&quot;>
      <div class=&quot;vocab-item&quot;><div class=&quot;vocab-en&quot;>work-life balance</div><div class=&quot;vocab-pl&quot;>równowaga praca-życie</div></div>
      <div class=&quot;vocab-item&quot;><div class=&quot;vocab-en&quot;>apply for (a job)</div><div class=&quot;vocab-pl&quot;>ubiegać się o pracę</div></div>
      <div class=&quot;vocab-item&quot;><div class=&quot;vocab-en&quot;>brush up on sth</div><div class=&quot;vocab-pl&quot;>odświeżyć (wiedzę)</div></div>
      <div class=&quot;vocab-item&quot;><div class=&quot;vocab-en&quot;>come across</div><div class=&quot;vocab-pl&quot;>natknąć się na</div></div>
      <div class=&quot;vocab-item&quot;><div class=&quot;vocab-en&quot;>run out of</div><div class=&quot;vocab-pl&quot;>skończyć się (komuś)</div></div>
      <div class=&quot;vocab-item&quot;><div class=&quot;vocab-en&quot;>be taken aback</div><div class=&quot;vocab-pl&quot;>być zaskoczonym</div></div>
      <div class=&quot;vocab-item&quot;><div class=&quot;vocab-en&quot;>bring together</div><div class=&quot;vocab-pl&quot;>jednoczyć, integrować</div></div>
      <div class=&quot;vocab-item&quot;><div class=&quot;vocab-en&quot;>extracurricular activities</div><div class=&quot;vocab-pl&quot;>zajęcia pozalekcyjne</div></div>
    </div>
  </div>
</section>

<!-- D5 -->
<section class=&quot;section&quot; id=&quot;d5&quot;>
  <div class=&quot;section-head&quot;><div>
    <div class=&quot;section-day-num&quot;>Dzień 5</div>
    <h2 class=&quot;section-title&quot;>List formalny + <em>Artykuł</em></h2>
  </div></div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>Punktacja CKE — Rozszerzona (max 13 pkt — identycznie dla obu form)</div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Kryterium</th><th>Co oceniają</th><th>Pkt</th></tr>
      <tr><td>Zgodność z poleceniem (treść + forma)</td><td>Elementy treści + elementy formy (rejestr, akapity, poprawne zwroty). Błędny rejestr obniża ocenę!</td><td><strong>0–5</strong></td></tr>
      <tr><td>Spójność i logika</td><td>Logiczna organizacja, wyraźnie oddzielone akapity</td><td><strong>0–2</strong></td></tr>
      <tr><td>Zakres środków językowych</td><td>B2 — złożone zdania, formalne wyrażenia, brak powtórzeń</td><td><strong>0–3</strong></td></tr>
      <tr><td>Poprawność środków językowych</td><td>Błędy oceniane surowiej niż na podstawie</td><td><strong>0–3</strong></td></tr>
    </table></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Struktura listu formalnego <span class=&quot;badge badge-r&quot;>Rozszerzona</span></div>
    <div class=&quot;steps&quot;>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>1</div><div class=&quot;step-body&quot;><strong>Nagłówek</strong> — <em>Dear Sir/Madam,</em> lub <em>Dear Mr/Ms [Nazwisko],</em> — zawsze z przecinkiem. Nigdy <em>Hello</em> ani <em>Hi</em>.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>2</div><div class=&quot;step-body&quot;><strong>Wstęp — cel listu</strong> — <em>I am writing to inquire about... / I am writing to express my concern regarding...</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>3</div><div class=&quot;step-body&quot;><strong>Rozwinięcie — 2–3 akapity</strong> — trzymaj się tematu, unikaj niekonkretnych sformułowań.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>4</div><div class=&quot;step-body&quot;><strong>Zakończenie</strong> — <em>I look forward to hearing from you. / Thank you for your attention to this matter.</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>5</div><div class=&quot;step-body&quot;><strong>Podpis</strong> — <em>Yours faithfully,</em> (do Sir/Madam) | <em>Yours sincerely,</em> (do Mr/Ms Smith) → XYZ</div></div>
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Formalny vs nieformalny — pułapki rejestru</div>
    <div class=&quot;two-col&quot;>
      <div class=&quot;col-card good&quot;><div class=&quot;col-card-label&quot;>Formalny ✓</div><div class=&quot;col-card-item&quot;>I am writing to...<br>I would appreciate...<br>I look forward to...<br>Yours faithfully,<br>Could you please...</div></div>
      <div class=&quot;col-card bad&quot;><div class=&quot;col-card-label&quot;>Nieformalny ✗</div><div class=&quot;col-card-item&quot;>I'm writing to...<br>Thanks a lot for...<br>Can't wait to hear...<br>Best wishes / Hugs,<br>Can you...?</div></div>
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Gotowe zdania — list formalny</div>
    <div class=&quot;phrase-block&quot;>
      <div class=&quot;phrase-label&quot;>Otwierające</div>
      <em>I am writing to inquire about...</em> <span class=&quot;pl&quot;>— Piszę, aby zapytać o...</span><br>
      <em>I am writing to express my concern about...</em><br>
      <em>I am writing to request further details about...</em>
    </div>
    <div class=&quot;phrase-block&quot;>
      <div class=&quot;phrase-label&quot;>Rozwinięcie</div>
      <em>I would appreciate it if you could...</em> | <em>I am pleased to inform you that...</em><br>
      <em>I regret to inform you that...</em> | <em>It would be advisable to...</em> | <em>May I suggest that...</em>
    </div>
    <div class=&quot;phrase-block&quot;>
      <div class=&quot;phrase-label&quot;>Kończące</div>
      <em>I look forward to hearing from you.</em> | <em>Thank you for your attention to this matter.</em><br>
      <em>If you have any further questions, please do not hesitate to contact me.</em>
    </div>
  </div>

  <hr class=&quot;block-divider&quot;>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Struktura artykułu <span class=&quot;badge badge-r&quot;>Rozszerzona</span></div>
    <div class=&quot;box box-cream&quot;>Artykuł ma tytuł i zwraca się do czytelnika przez <em>you</em>. Rejestr swobodniejszy niż w liście, ale to nie blog.</div>
    <div class=&quot;steps&quot; style=&quot;margin-top:10px;&quot;>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>1</div><div class=&quot;step-body&quot;><strong>Tytuł</strong> — krótki, wciągający. <em>Is Social Media Ruining Our Lives?</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>2</div><div class=&quot;step-body&quot;><strong>Wstęp — hook</strong> — <em>Did you know that...? / Have you ever thought about...? / Most people believe that... but is that really true?</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>3</div><div class=&quot;step-body&quot;><strong>Rozwinięcie — 2–3 akapity</strong> — możesz używać <em>you, your, we</em>.</div></div>

<!-- D6 -->
<section class=&quot;section&quot; id=&quot;d6&quot;>
  <div class=&quot;section-head&quot;><div>
    <div class=&quot;section-day-num&quot;>Dzień 6</div>
    <h2 class=&quot;section-title&quot;>Matura <em>ustna</em></h2>
  </div></div>

  <div class=&quot;block&quot;>
    <div class=&quot;box box-cream&quot;>~15 minut | rozmowa z egzaminującym | zdający losuje zestaw | polecenia po polsku | rozmowa wstępna ~2 min wlicza się do zakresu i poprawności języka</div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>Punktacja CKE — max 30 pkt | próg zdania: 9 pkt (30%)</div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Kryterium</th><th>Co oceniają</th><th>Pkt</th></tr>
      <tr><td><strong>Sprawność komunikacyjna</strong></td><td>Osobno w każdym zadaniu (max 6 pkt × 3 = <strong>18 pkt</strong>). Punkty karne: max −2 za zadanie gdy egzaminator pomaga.</td><td><strong>0–18</strong></td></tr>
      <tr><td>Zakres środków językowych</td><td>Za całą wypowiedź łącznie z rozmową wstępną</td><td><strong>0–4</strong></td></tr>
      <tr><td>Poprawność środków językowych</td><td>Za całą wypowiedź</td><td><strong>0–4</strong></td></tr>
      <tr><td>Wymowa</td><td>Nie musi być perfekcyjna! (tylko 2 pkt)</td><td><strong>0–2</strong></td></tr>
      <tr><td>Płynność wypowiedzi</td><td>Naturalne tempo, bez nadmiernych zawahań</td><td><strong>0–2</strong></td></tr>
    </table></div>
    <div class=&quot;box box-green&quot;>✓ <strong>Sprawność komunikacyjna = 60% całego wyniku.</strong> Priorytet: odnieść się do WSZYSTKICH elementów zadania i je rozwinąć.</div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Zadanie 2 — opis zdjęcia (4 elementy)</div>
    <div class=&quot;steps&quot;>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>1</div><div class=&quot;step-body&quot;><strong>KTO</strong> — <em>In the picture I can see... / There are... / The photo shows...</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>2</div><div class=&quot;step-body&quot;><strong>GDZIE</strong> — <em>They appear to be in... / The setting looks like... / It seems to be taking place in...</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>3</div><div class=&quot;step-body&quot;><strong>CO ROBIĄ</strong> — <em>They seem to be... / One of them is... / In the background I can see...</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>4</div><div class=&quot;step-body&quot;><strong>ATMOSFERA / NASTRÓJ</strong> — <em>The atmosphere seems... / The overall mood is... / It gives the impression of...</em></div></div>
    </div>
    <div class=&quot;phrase-block&quot;>
      <em>The photograph shows... / In the foreground/background I can see... / The image conveys a sense of... / Based on what I can see, I would guess that...</em>
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Zadanie 3 — materiał stymulujący + wybór + 2 pytania</div>
    <div class=&quot;steps&quot;>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>1</div><div class=&quot;step-body&quot;><strong>Wybór + uzasadnienie</strong> — <em>I would choose the first picture because... / This option is the most suitable because...</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>2</div><div class=&quot;step-body&quot;><strong>Odrzucenie pozostałych — OBOWIĄZKOWE!</strong> — <em>As for the other pictures... / Although this looks interesting, it wouldn't work because...</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>3</div><div class=&quot;step-body&quot;><strong>Pytania egzaminatora</strong> — pełne zdania, zawsze z uzasadnieniem. Unikaj jednowyrazowych odpowiedzi.</div></div>
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Ratunkowe frazy</div>
    <div class=&quot;phrase-block&quot;>
      <em>That's an interesting question — let me think for a moment.</em><br>
      <em>I've never really thought about it before, but I suppose...</em><br>
      <em>It's a kind of thing that you use to...</em> <span class=&quot;pl&quot;>(gdy nie znasz słowa)</span><br>
      <em>What I mean is...</em> <span class=&quot;pl&quot;>(gdy się zagmatwasz)</span>
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-label&quot;>10 zasad na maturze ustnej</div>
    <div class=&quot;steps&quot;>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>1</div><div class=&quot;step-body&quot;>Zawsze mów pełnymi zdaniami. <em>&quot;Yes.&quot;</em> → <em>&quot;Yes, I think that's a great idea because...&quot;</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>2</div><div class=&quot;step-body&quot;>Nie milcz — wypełniaj pauzy. <em>&quot;That's an interesting question, let me think...&quot;</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>3</div><div class=&quot;step-body&quot;>Porusz WSZYSTKIE 4 elementy zadania. Sprawność komunikacyjna = 60% wyniku.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>4</div><div class=&quot;step-body&quot;>Gdy nie znasz słowa — opisz je. To strategia komunikacyjna, nie błąd.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>5</div><div class=&quot;step-body&quot;>Używaj łączników: <em>Moreover, In addition, On the other hand, Nevertheless, However</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>6</div><div class=&quot;step-body&quot;>Używaj bogatego słownictwa. Zamiast <em>good</em> → <em>excellent / outstanding / beneficial</em></div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>7</div><div class=&quot;step-body&quot;>W zadaniu 3 ZAWSZE odrzuć pozostałe opcje. To obowiązkowy element!</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>8</div><div class=&quot;step-body&quot;>Rozmowa wstępna też się liczy językowo — traktuj ją poważnie.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>9</div><div class=&quot;step-body&quot;>Sprawdź kto zaczyna rozmowę w zadaniu 1 — polecenie to mówi.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>10</div><div class=&quot;step-body&quot;>Wymowa nie musi być perfekcyjna. 2 pkt = mniej niż 7% wyniku. Skup się na sprawności komunikacyjnej.</div></div>
    </div>
  </div>
</section>

<!-- D7 -->
<section class=&quot;section&quot; id=&quot;d7&quot;>
  <div class=&quot;section-head&quot;><div>
    <div class=&quot;section-day-num&quot;>Dzień 7</div>
    <h2 class=&quot;section-title&quot;>Strategie do <em>zadań maturalnych</em></h2>
  </div></div></div></div>
    </div>
    <div class=&quot;box box-green&quot;>✓ Żadna błędna odpowiedź nie odejmuje punktów — zawsze coś wpisuj. Lepiej coś napisać niż zostawić puste miejsce.</div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Rozumienie ze słuchu <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;steps&quot;>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>1</div><div class=&quot;step-body&quot;><strong>Przed nagraniem zawsze czytaj pytania!</strong> Skup się na czasownikach intencyjnych.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>2</div><div class=&quot;step-body&quot;><strong>Pierwsze odsłuchanie:</strong> zaznacz roboczą odpowiedź. Nie zatrzymuj się — idź dalej.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>3</div><div class=&quot;step-body&quot;><strong>Drugie odsłuchanie:</strong> potwierdź lub zmień. Skup się na niepewnych pytaniach.</div></div>
      <div class=&quot;step&quot;><div class=&quot;step-num&quot;>4</div><div class=&quot;step-body&quot;><strong>Słuchaj sensu, nie słów.</strong> Uwaga na negacje: <em>not / won't / no / can't / doesn't</em> — często zmieniają kontekst.</div></div>
    </div>
    <div class=&quot;phrase-block&quot;>
      <div class=&quot;phrase-label&quot;>Pułapki w typach zadań</div>
      <strong>Wielokrotny wybór:</strong> Jedna opcja = parafraza tekstu, druga = słowo wzięte dosłownie w złym kontekście. Szukaj synonimów i parafraz.<br><br>
      <strong>Prawda / Fałsz:</strong> Czytaj słowa totalne — <em>always, never, all, every, only, no one</em>. Jedno słowo zmienia wszystko.<br><br>
      <strong>Słowa kontrastu = sygnał właściwej odpowiedzi:</strong> <em>however, but, although, despite, on the other hand, yet, nevertheless</em> — CKE lubi pytać o to co dzieje się po kontraście.<br><br>
      <strong>Zadania otwarte (od 2025 r.):</strong> Pełna poprawność ortograficzna. Upewnij się, że to co napisałaś/eś ma sens z resztą zdania.
    </div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Rozumienie tekstów pisanych — Scan → Locate → Eliminate <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Typ zadania</th><th>Strategia</th></tr>
      <tr><td>Dopasowanie nagłówków</td><td>Przetłumacz nagłówki najpierw. Czytaj fragmenty po jednym. Zawsze o 2 nagłówki więcej niż fragmentów — to pułapka.</td></tr>
      <tr><td>Cztery krótkie teksty</td><td>Czytaj pytania PRZED tekstami. Kolejność pytań = kolejność informacji. Ostatnie pytanie często dotyczy tekstu jako całości.</td></tr>
      <tr><td>Wielokrotny wybór</td><td>Szukaj parafraz — odpowiedź nigdy nie jest dosłownym cytatem. Eliminuj opcje zamiast szukać właściwej.</td></tr>
      <tr><td>Wstawianie zdań</td><td>Przeczytaj zdania A–E zanim zaczniesz tekst. Czytaj zdanie przed + po luce. Szukaj spójności gramatycznej i logicznej.</td></tr>
    </table></div>
  </div>

  <div class=&quot;block&quot;>
    <div class=&quot;block-title&quot;>Znajomość środków językowych <span class=&quot;badge badge-both&quot;>Podstawa + Rozszerzona</span></div>
    <div class=&quot;tbl-wrap&quot;><table>
      <tr><th>Typ zadania</th><th>Strategia</th></tr>
      <tr><td>Minidialogi</td><td>Zwróć uwagę kto mówi — X czy Y. Nie traktuj luki jako ciąg dalszy osoby powyżej.</td></tr>
      <tr><td>Pary zdań</td><td>Szukaj słowa pasującego do OBU zdań — często kolokacja lub phrasal verb.</td></tr>
      <tr><td>Open cloze</td><td>Myśl o: przyimkach, spójnikach, zaimkach względnych, czasownikach posiłkowych. Często: <em>go/do/have/be</em>. Pełna poprawność ortograficzna!</td></tr>
      <tr><td>Słowotwórstwo</td><td>Jakiej części mowy potrzebujesz? Pozytywna czy negatywna? Liczba pojedyncza czy mnoga?</td></tr>
      <tr><td>Transformacje</td><td>SAID/TOLD → mowa zależna | BY → strona bierna | UNLESS → conditional | WISH/IF ONLY → żal | DESPITE → mimo że + gerund | HAVE/GET → causative</td></tr>
    </table></div>
  </div>
</section>

<script>
  const sections = document.querySelectorAll('section[id]');
  const links = document.querySelectorAll('.nav-link');
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const a = document.querySelector(`.nav-link[href=&quot;#${e.target.id}&quot;]`);
        if (a) a.classList.add('active');
      }
    });
  }, { threshold: 0.2 });
  sections.forEach(s => io.observe(s));
</script>

<script>
// ─── DAY 1 DATA ────────────────────────────────────────────────────────────
const DAY1 = { label: 'Dzień 1 — Czasy angielskie', sidebarLabel: 'Czasy', tenses: [
  { id:'ps_pc', name:'Present Simple / Continuous', tag:'Teraźniejszość',
    rule:'<strong>Present Simple:</strong> fakty, nawyki, prawdy ogólne, rozkłady jazdy.<br><strong>Present Continuous:</strong> czynność teraz lub tymczasowo, plany, irytujące nawyki (always).<br><strong>Uwaga:</strong> czasowniki statyczne nie mają formy Continuous — <em>know, believe, want, need, love, hate, understand, seem, prefer, belong.</em>',
    signals:{'PS — sygnały':['always','usually','often','never','every day','sometimes','on Mondays'],'PC — sygnały':['now','at the moment','currently','today','this week','Look!','Listen!','right now','these days']},
    questions:{ p:[
      {type:'mcq',text:'She _____ to school every day by bus.',options:['is going','goes','go','has gone'],correct:1,explain:'Nawyk = Present Simple. She goes.'},
      {type:'mcq',text:'Listen! The baby _____ again.',options:['cries','is crying','cry','has cried'],correct:1,explain:'Sygnał &quot;Listen!&quot; → czynność teraz = Present Continuous.'},
      {type:'fill',text:'Water _____ (boil) at 100 degrees Celsius.',correct:['boils'],explain:'Fakt naukowy = Present Simple. Water boils.'},
      {type:'mcq',text:'I _____ what you mean. It\'s perfectly clear.',options:['am understanding','understand','understood','am understand'],correct:1,explain:'Understand = czasownik statyczny. I understand.'},
      {type:'fill',text:'They _____ (work) on a new project this month.',correct:['are working'],explain:'Tymczasowa czynność = Present Continuous. Are working.'},
      {type:'mcq',text:'He always _____ his coffee without sugar.',options:['is drinking','drink','drinks','has drunk'],correct:2,explain:'Nawyk = Present Simple. He drinks.'},
      {type:'fill',text:'Look! The cat _____ (sit) on my laptop again.',correct:['is sitting'],explain:'Czynność teraz (Look!) = Present Continuous. Is sitting.'},
      {type:'mcq',text:'The train to Warsaw _____ at 8:15 every morning.',options:['is leaving','leave','leaves','has left'],correct:2,explain:'Rozkład jazdy = Present Simple. Leaves.'},
      {type:'fill',text:'She _____ (not / like) horror films at all.',correct:[&quot;doesn't like&quot;,&quot;does not like&quot;],explain:'Statyczny, nawyk = Present Simple. Doesn\'t like.'},
      {type:'mcq',text:'Why _____ you _____ so quietly? I can barely hear you.',options:['are / speaking','do / speak','does / speak','have / spoken'],correct:0,explain:'Czynność w tej chwili = Present Continuous. Are you speaking.'},
      {type:'fill',text:'My parents _____ (visit) us this weekend.',correct:['are visiting'],explain:'Ustalony plan = Present Continuous. Are visiting.'},
      {type:'mcq',text:'I _____ she\'ll agree — she\'s very reasonable.',options:['am thinking','thinks','think','am think'],correct:2,explain:'Think (opinia) = statyczny = Present Simple. I think.'},
      {type:'fill',text:'The museum _____ (open) at 9 and _____ (close) at 6.',correct:['opens','closes'],explain:'Stały fakt = Present Simple. Opens and closes.'},
      {type:'mcq',text:'He\'s so annoying! He _____ always _____ my things.',options:['is / borrowing','does / borrow','has / borrowed','will / borrow'],correct:0,explain:'Irytujący nawyk z &quot;always&quot; = Present Continuous.'},
      {type:'fill',text:'I can\'t come now — I _____ (have) dinner.',correct:['am having'],explain:'Have (jeść) = dynamiczny = Present Continuous. Am having.'},
      {type:'mcq',text:'English _____ a lot of vocabulary from French.',options:['is borrowing','borrowed','borrows','has been borrowing'],correct:2,explain:'Stały fakt językowy = Present Simple. Borrows.'},
      {type:'fill',text:'The children _____ (get) louder and louder these days.',correct:['are getting'],explain:'Zmieniająca się sytuacja = Present Continuous. Are getting.'},
      {type:'mcq',text:'She _____ this coat. It\'s hers, not yours.',options:['is owning','owns','own','is own'],correct:1,explain:'Own = statyczny = Present Simple. She owns.'},
      {type:'fill',text:'He _____ (think) about changing his job. He seems unsure.',correct:['is thinking'],explain:'Think (rozważać) = dynamiczny = Present Continuous. Is thinking.'},
      {type:'mcq',text:'Scientists _____ that the climate is changing rapidly.',options:['are believing','believed','believe','are believe'],correct:2,explain:'Believe = statyczny = Present Simple. Believe.'},
    ], r:[
      {type:'mcq',text:'She _____ what you mean, even if she _____ nothing.',options:['understands / says','is understanding / says','understands / is saying','is understanding / is saying'],correct:2,explain:'Understand = statyczny (PS). Say = trwające teraz (PC). Understands / is saying.'},
      {type:'fill',text:'The data _____ (suggest) that temperatures _____ (rise) year on year.',correct:['suggest','are rising'],explain:'Suggest = statyczny (PS). Rise = trwający trend (PC).'},
      {type:'mcq',text:'I _____ he\'ll agree — he _____ the proposal carefully right now.',options:['think / is considering','am thinking / considers','think / considers','am thinking / is considering'],correct:0,explain:'Think (opinia) = PS. Consider (aktywny teraz) = PC. Think / is considering.'},
      {type:'fill',text:'This fabric _____ (feel) incredibly soft. I _____ (consider) buying it.',correct:['feels','am considering'],explain:'Feel (zmysłowy) = PS. Consider (aktywny) = PC. Feels / am considering.'},
      {type:'mcq',text:'The committee _____ that the policy needs revision. They _____ it at this very meeting.',options:['agrees / are discussing','agree / are discussing','agree / discuss','are agreeing / are discussing'],correct:1,explain:'Agree = statyczny PS. Discuss = aktywny, trwający = PC.'},
      {type:'fill',text:'She _____ (have) a meeting at 3, but she _____ (have) doubts about the plan.',correct:['is having','has'],explain:'Have (spotkanie) = dynamiczny PC. Have (wątpliwości) = statyczny PS.'},
      {type:'mcq',text:'The new regulations _____ into effect next Monday and they _____ the whole industry.',options:['come / will affect','are coming / affect','come / affect','are coming / will affect'],correct:0,explain:'Harmonogram (PS) + przyszły efekt (will). Come / will affect.'},
      {type:'fill',text:'Why _____ you _____ (smell) that perfume? It _____ (smell) like roses.',correct:['are','smelling','smells'],explain:'Smell (wąchać aktywnie) = PC. Smell (zapach) = PS. Are smelling / smells.'},
      {type:'mcq',text:'He consistently _____ deadlines, which _____ his manager increasingly.',options:['is missing / is frustrating','misses / is frustrating','is missing / frustrates','misses / frustrates'],correct:1,explain:'Nawyk = PS. Irytujący trwający efekt = PC. Misses / is frustrating.'},
      {type:'fill',text:'I _____ (see) your point, but I _____ (see) him tomorrow.',correct:['see','am seeing'],explain:'See (rozumieć) = PS. See (spotykać, plan) = PC. See / am seeing.'},
      {type:'mcq',text:'The economy _____ well this quarter, though inflation still _____ a concern.',options:['performs / poses','is performing / poses','is performing / is posing','performs / is posing'],correct:1,explain:'Tymczasowy trend = PC. Stały fakt = PS. Is performing / poses.'},
      {type:'fill',text:'She _____ (appear) calm, but I _____ (appear) in court tomorrow.',correct:['appears','am appearing'],explain:'Appear (wyglądać) = PS. Appear (pojawiać się, plan) = PC.'},
      {type:'mcq',text:'The author _____ a new novel and she _____ it will be her best yet.',options:['writes / thinks','is writing / thinks','writes / is thinking','is writing / is thinking'],correct:1,explain:'Aktywny proces teraz = PC. Opinia = statyczny PS. Is writing / thinks.'},
      {type:'fill',text:'These days more people _____ (work) remotely, which _____ (mean) commutes are less common.',correct:['are working','means'],explain:'Zmieniający się trend = PC. Stały wynikający fakt = PS.'},
      {type:'mcq',text:'I _____ to tell you this, but your answer _____ wrong.',options:['am hating / is','hate / is','hate / are','am hating / are'],correct:1,explain:'Hate = statyczny PS. Is (fakt) = PS. Hate / is.'},
      {type:'fill',text:'The situation _____ (look) better than it _____ (sound).',correct:['looks','sounds'],explain:'Look + sound = statyczne = PS. Looks / sounds.'},
      {type:'mcq',text:'He _____ to music on his way to work and today he _____ his new favourite album.',options:['listens / is listening','is listening / listens','listens / listens','is listening / is listening'],correct:0,explain:'Nawyk = PS. Konkretna czynność teraz = PC. Listens / is listening.'},
      {type:'fill',text:'I _____ (not / belong) to any political party. I _____ (prefer) to stay neutral.',correct:[&quot;don't belong&quot;,&quot;do not belong&quot;,&quot;prefer&quot;],explain:'Belong + prefer = statyczne = PS.'},
      {type:'mcq',text:'She _____ more and more confident. Her teachers _____ it too.',options:['becomes / are noticing','is becoming / notice','is becoming / are noticing','becomes / notice'],correct:2,explain:'Zmieniająca się sytuacja = PC. Notice (aktywnie trwający) = PC. Is becoming / are noticing.'},
      {type:'fill',text:'The patient _____ (feel) better today, but the doctor _____ (feel) he needs more rest.',correct:['is feeling','feels'],explain:'Feel (stan fizyczny, zmienny) = PC. Feel (uważać) = PS. Is feeling / feels.'},
    ]}
  },
  { id:'past_ps_pc', name:'Past Simple / Continuous', tag:'Przeszłość',
    rule:'<strong>Past Simple:</strong> czynność zakończona w konkretnym momencie.<br><strong>Past Continuous:</strong> czynność trwała w tle, przerywana przez PS.<br>Klasyczna konstrukcja: <em>While I was cooking, the phone rang.</em>',
    signals:{'PS — sygnały':['yesterday','last year','ago','in 2010','when','then'],'PC — sygnały':['while','when (przerwanie)','at 5 o\'clock yesterday','all evening','as']},
    questions:{ p:[
      {type:'mcq',text:'She _____ TV when her phone rang.',options:['watched','was watching','has watched','watches'],correct:1,explain:'Czynność w tle (PC) przerwana przez PS. Was watching.'},
      {type:'fill',text:'I _____ (see) him yesterday at the station.',correct:['saw'],explain:'Konkretny moment = Past Simple. Saw.'},
      {type:'mcq',text:'While they _____, the lights _____ out.',options:['were eating / went','ate / were going','were eating / were going','ate / went'],correct:0,explain:'Tło = PC (were eating), zdarzenie = PS (went). While they were eating, the lights went out.'},
      {type:'fill',text:'She _____ (study) all evening but _____ (not / finish) in time.',correct:['was studying',&quot;didn't finish&quot;,&quot;did not finish&quot;],explain:'Trwający proces = PC. Wynik = PS. Was studying / didn\'t finish.'},
      {type:'mcq',text:'I _____ my keys when I _____ for the bus.',options:['dropped / was waiting','was dropping / waited','dropped / waited','was dropping / was waiting'],correct:0,explain:'Zdarzenie = PS (dropped). Tło = PC (was waiting).'},
      {type:'fill',text:'What _____ you _____ (do) at 8 o\'clock last night?',correct:['were','doing'],explain:'Konkretny moment + czynność trwająca = PC. Were you doing.'},
      {type:'mcq',text:'He _____ his ankle while he _____ basketball.',options:['twisted / was playing','was twisting / played','twisted / played','was twisting / was playing'],correct:0,explain:'Zdarzenie = PS (twisted). Tło = PC (was playing).'},
      {type:'fill',text:'The sun _____ (shine) and birds _____ (sing) when we _____ (leave).',correct:['was shining','were singing','left'],explain:'Sceneria = PC x2. Zdarzenie = PS. Was shining / were singing / left.'},
      {type:'mcq',text:'She _____ the bus because she _____ late.',options:['missed / was running','was missing / ran','missed / ran','was missing / was running'],correct:0,explain:'Wynik = PS. Przyczyna (trwający stan) = PC. Missed / was running.'},
      {type:'fill',text:'We _____ (just / sit) down to eat when the doorbell _____ (ring).',correct:['were just sitting','just were sitting','rang'],explain:'Czynność w toku = PC. Przerwanie = PS. Were just sitting / rang.'},
      {type:'mcq',text:'_____ you _____ when I called? You didn\'t pick up.',options:['Did / sleep','Were / sleeping','Have / slept','Did / sleeping'],correct:1,explain:'Czynność trwająca w chwili przerwania = PC. Were you sleeping.'},
      {type:'fill',text:'He _____ (not / listen) to the teacher; he _____ (draw) pictures instead.',correct:[&quot;wasn't listening&quot;,&quot;was not listening&quot;,&quot;was drawing&quot;],explain:'Trwające czynności = PC x2. Wasn\'t listening / was drawing.'},
      {type:'mcq',text:'As she _____ to work, she _____ an old friend.',options:['walked / was meeting','was walking / met','walked / met','was walking / was meeting'],correct:1,explain:'Tło = PC (was walking). Zdarzenie = PS (met).'},
      {type:'fill',text:'The children _____ (play) in the garden when it _____ (start) to rain.',correct:['were playing','started'],explain:'Tło = PC. Zdarzenie = PS. Were playing / started.'},
      {type:'mcq',text:'I _____ him for the first time in 2018. We _____ both _____ for the same company.',options:['met / were / working','was meeting / worked','met / worked','was meeting / were / working'],correct:0,explain:'Zdarzenie = PS (met). Tło = PC (were working).'},
      {type:'fill',text:'She _____ (read) a book, _____ (drink) tea, and _____ (listen) to music when I arrived.',correct:['was reading','was drinking','was listening'],explain:'Trzy czynności w tle = PC x3.'},
      {type:'mcq',text:'The fire _____ while everyone _____.',options:['started / was sleeping','was starting / slept','started / slept','was starting / was sleeping'],correct:0,explain:'Zdarzenie = PS (started). Tło = PC (was sleeping).'},
      {type:'fill',text:'I _____ (try) to call you all morning but you _____ (not / answer).',correct:['was trying',&quot;didn't answer&quot;,&quot;was not answering&quot;,&quot;wasn't answering&quot;],explain:'Trwający wysiłek = PC. Fakt = PS.'},
      {type:'mcq',text:'When the police arrived, the burglar _____ through the window.',options:['climbed','was climbing','has climbed','had climbed'],correct:1,explain:'Czynność w toku w momencie przybycia = PC. Was climbing.'},
      {type:'fill',text:'She _____ (wear) her favourite dress and _____ (look) wonderful at the party.',correct:['was wearing','looked'],explain:'Opis wyglądu (tło) = PC. Ogólna ocena = PS. Was wearing / looked.'},
    ], r:[
      {type:'mcq',text:'He _____ the report when he _____ an error he _____ earlier.',options:['was reviewing / noticed / had overlooked','reviewed / was noticing / overlooked','was reviewing / was noticing / had overlooked','reviewed / noticed / had overlooked'],correct:0,explain:'Tło = PC, zdarzenie = PS, wcześniejsza czynność = PP.'},
      {type:'fill',text:'By the time the police _____ (arrive), the thieves _____ (escape).',correct:['arrived','had escaped'],explain:'Wcześniejsza czynność = Past Perfect. Arrived / had escaped.'},
      {type:'mcq',text:'She _____ the presentation confidently, though she _____ the material only briefly beforehand.',options:['was delivering / studied','delivered / had studied','was delivering / had studied','delivered / studied'],correct:1,explain:'Ukończone zdarzenie = PS. Wcześniejsze przygotowanie = PP.'},
      {type:'fill',text:'While the scientists _____ (analyse) the samples, they _____ (discover) something they _____ (not / expect).',correct:['were analysing','discovered',&quot;hadn't expected&quot;,&quot;had not expected&quot;],explain:'Tło = PC. Zdarzenie = PS. Wcześniejsze oczekiwanie = PP negatywne.'},
      {type:'mcq',text:'The witness claimed she _____ in the park when the incident _____.',options:['walked / was occurring','was walking / occurred','walked / occurred','was walking / was occurring'],correct:1,explain:'Tło (alibi) = PC. Zdarzenie = PS. Was walking / occurred.'},
      {type:'fill',text:'As the CEO _____ (speak), it _____ (become) clear that the company _____ (lose) millions.',correct:['was speaking','became','had lost'],explain:'Tło = PC. Odkrycie = PS. Wcześniejsza strata = PP.'},
      {type:'mcq',text:'I _____ the contract when I _____ that I _____ the wrong document.',options:['was signing / realised / had been given','signed / was realising / was given','was signing / realised / was given','signed / realised / had been given'],correct:0,explain:'Tło = PC. Odkrycie = PS. Wcześniejsze wręczenie (PP strona bierna) = had been given.'},
      {type:'fill',text:'The storm _____ (rage) all night, but by morning it _____ (pass) and the sun _____ (shine).',correct:['was raging','had passed','was shining'],explain:'Tło nocne = PC. Ukończone przed ranem = PP. Tło ranne = PC.'},
      {type:'mcq',text:'Detectives _____ the area when a local resident _____ them a crucial tip.',options:['were searching / gave','searched / was giving','searched / gave','were searching / was giving'],correct:0,explain:'Tło = PC (were searching). Zdarzenie = PS (gave).'},
      {type:'fill',text:'She _____ (not / realise) how serious the situation _____ (be) until it _____ (be) too late.',correct:[&quot;didn't realise&quot;,&quot;did not realise&quot;,&quot;was&quot;,&quot;was&quot;],explain:'PS negatywne + PS (stan) + PS (moment).'},
      {type:'mcq',text:'The students _____ quietly when the headteacher unexpectedly _____ into the room.',options:['studied / was walking','were studying / walked','studied / walked','were studying / was walking'],correct:1,explain:'Tło = PC. Zdarzenie = PS. Were studying / walked.'},
      {type:'fill',text:'He _____ (just / fall) asleep when his alarm _____ (go) off.',correct:['was just falling','had just fallen','went'],explain:'Czynność w toku = PC lub PP. PS dla alarmu.'},
      {type:'mcq',text:'The journalist _____ an exposé that _____ months of undercover work.',options:['was publishing / involved','published / was involving','published / involved','was publishing / was involving'],correct:2,explain:'Ukończone zdarzenie = PS x2. Published / involved.'},
      {type:'fill',text:'While she _____ (recover) in hospital, her colleagues _____ (cover) for her and _____ (do) an excellent job.',correct:['was recovering','were covering','did'],explain:'Tło = PC x2. Ocena końcowa = PS.'},
      {type:'mcq',text:'He _____ faster and faster and before long he _____ the world record.',options:['ran / broke','was running / broke','ran / was breaking','was running / was breaking'],correct:1,explain:'Trwający postęp = PC. Moment osiągnięcia = PS. Was running / broke.'},
      {type:'fill',text:'The negotiations _____ (drag) on for weeks until both sides finally _____ (reach) an agreement.',correct:['were dragging','reached'],explain:'Trwający proces = PC. Ostateczne zdarzenie = PS.'},
      {type:'mcq',text:'As she _____ up the stairs, she _____ something and _____ her ankle.',options:['was running / tripped / twisted','ran / was tripping / twisted','was running / tripped / was twisting','ran / tripped / twisted'],correct:0,explain:'Tło = PC. Dwa zdarzenia = PS x2.'},
      {type:'fill',text:'Nobody _____ (notice) that the painting _____ (hang) upside down for three days.',correct:['noticed','had been hanging'],explain:'Odkrycie = PS. Wcześniejszy stan trwający = PPC.'},
      {type:'mcq',text:'When we _____ up, our parents _____ for us with dinner on the table.',options:['turned / waited','were turning / were waiting','turned / were waiting','were turning / waited'],correct:2,explain:'Zdarzenie = PS (turned up). Stan oczekiwania = PC (were waiting).'},
      {type:'fill',text:'I _____ (walk) past the café when I _____ (smell) fresh coffee and _____ (decide) to go in.',correct:['was walking','smelled','decided'],explain:'Tło = PC. Dwa zdarzenia = PS x2.'},
