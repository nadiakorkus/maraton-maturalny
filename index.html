<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maraton Maturalny — Czasy angielskie</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf7;
    --surface2: #eee8d8;
    --border: #d6cdb8;
    --border2: #c4b99f;
    --text: #1a2744;
    --text2: #4a5a7a;
    --text3: #8a96b0;
    --accent: #1a2744;
    --accent2: #243560;
    --green: #2d7a4f;
    --green-bg: #e8f5ee;
    --red: #b84040;
    --red-bg: #faeaea;
    --purple: #4a3fa0;
    --purple-bg: #eeecf8;
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --serif: 'DM Serif Display', serif;
    --sans: 'Instrument Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; line-height: 1.6; }
  .header { border-bottom: 1px solid var(--border); padding: 28px 32px 24px; display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap; }
  .header-left { flex: 1; min-width: 200px; }
  .eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #3a5cbf; margin-bottom: 6px; }
  h1 { font-family: var(--serif); font-size: clamp(22px, 4vw, 34px); font-weight: 400; color: var(--text); line-height: 1.1; }
  h1 em { font-style: italic; color: #3a5cbf; }
  .subtitle { font-size: 13px; color: var(--text2); margin-top: 6px; }
  .level-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; gap: 4px; }
  .level-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; padding: 8px 18px; border: none; border-radius: 7px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.2s; }
  .level-btn.active { background: var(--accent); color: #f5f0e8; font-weight: 600; }
  .main { display: grid; grid-template-columns: 230px 1fr; min-height: calc(100vh - 100px); }
  .sidebar { border-right: 1px solid var(--border); padding: 24px 0; position: sticky; top: 0; height: calc(100vh - 100px); overflow-y: auto; display: flex; flex-direction: column; }
  .sidebar-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); padding: 0 20px; margin-bottom: 12px; }
  .tense-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; font-size: 13px; color: var(--text2); }
  .tense-item:hover { background: var(--surface2); color: var(--text); }
  .tense-item.active { background: var(--surface2); color: var(--text); border-left-color: #3a5cbf; }
  .tense-item.done { color: var(--green); }
  .tense-item.done .tense-check { opacity: 1; }
  .tense-check { font-size: 11px; opacity: 0; color: var(--green); }
  .progress-bar-wrap { padding: 20px; margin-top: auto; }
  .progress-label { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #3a5cbf; border-radius: 2px; transition: width 0.4s ease; }
  .content { padding: 32px; max-width: 740px; }
  .tense-header { margin-bottom: 28px; }
  .tense-tag { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); background: rgba(26,39,68,0.08); border: 1px solid rgba(26,39,68,0.2); border-radius: 4px; padding: 3px 8px; margin-bottom: 10px; }
  .tense-title { font-family: var(--serif); font-size: 26px; font-weight: 400; margin-bottom: 8px; }
  .tense-rule { font-size: 13px; color: var(--text2); line-height: 1.8; }
  .tense-rule strong { color: var(--text); font-weight: 500; }
  .tense-rule em { color: #3a5cbf; font-style: normal; }
  .signal-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .pill { font-family: var(--mono); font-size: 11px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 3px 10px; color: var(--text2); }
  .pill-label { font-size: 10px; color: var(--text3); margin-top: 8px; margin-bottom: 4px; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; width: 100%; }
  .questions { display: flex; flex-direction: column; gap: 16px; }
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; transition: border-color 0.2s; }
  .q-card.correct { border-color: var(--green); background: var(--green-bg); }
  .q-card.wrong { border-color: var(--red); background: var(--red-bg); }
  .q-num { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 8px; letter-spacing: 0.08em; display: flex; gap: 8px; align-items: center; }
  .q-type-badge { font-size: 9px; padding: 1px 6px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text3); }
  .q-text { font-size: 15px; color: var(--text); margin-bottom: 14px; line-height: 1.7; }
  .q-text .blank { display: inline-block; border-bottom: 2px solid #3a5cbf; min-width: 80px; color: #3a5cbf; font-family: var(--mono); font-size: 14px; text-align: center; padding: 0 4px; }
  .options { display: flex; flex-direction: column; gap: 7px; }
  .option-btn { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 1px solid var(--border2); border-radius: 8px; background: transparent; color: var(--text2); font-family: var(--sans); font-size: 13px; cursor: pointer; text-align: left; transition: all 0.15s; width: 100%; }
  .option-btn:hover:not(:disabled) { border-color: #3a5cbf; color: var(--text); }
  .option-btn.selected-correct { border-color: var(--green); background: rgba(90,158,111,0.12); color: var(--green); }
  .option-btn.selected-wrong { border-color: var(--red); background: rgba(201,95,95,0.12); color: var(--red); }
  .option-btn.reveal-correct { border-color: var(--green); color: var(--green); background: rgba(90,158,111,0.07); }
  .opt-letter { font-family: var(--mono); font-size: 10px; min-width: 18px; height: 18px; border: 1px solid currentColor; border-radius: 3px; display: flex; align-items: center; justify-content: center; opacity: 0.7; flex-shrink: 0; }
  .fill-wrap { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .fill-input { font-family: var(--mono); font-size: 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); padding: 8px 14px; outline: none; transition: border-color 0.15s; min-width: 180px; }
  .fill-input:focus { border-color: #3a5cbf; }
  .fill-input.correct-input { border-color: var(--green); color: var(--green); }
  .fill-input.wrong-input { border-color: var(--red); color: var(--red); }
  .check-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; background: var(--accent); color: #f5f0e8; border: none; border-radius: 7px; cursor: pointer; font-weight: 600; transition: opacity 0.15s; white-space: nowrap; }
  .check-btn:hover { opacity: 0.85; }
  .check-btn:disabled { opacity: 0.3; cursor: default; }
  .feedback { margin-top: 10px; font-size: 12px; line-height: 1.7; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { color: var(--green); }
  .feedback.bad { color: var(--red); }
  .feedback .correct-ans { font-family: var(--mono); font-size: 12px; color: #3a5cbf; }
  .parity-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; margin-left: 8px; vertical-align: middle; }
  .tag-p { background: rgba(90,158,111,0.15); color: var(--green); }
  .tag-r { background: rgba(139,126,200,0.15); color: var(--purple); }
  .section-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
  .nav-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 9px 20px; border: 1px solid var(--border2); background: transparent; color: var(--text2); border-radius: 7px; cursor: pointer; transition: all 0.15s; }
  .nav-btn:hover:not(:disabled) { border-color: #3a5cbf; color: var(--text); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: var(--accent); color: #0f0f0d; border-color: var(--accent); font-weight: 600; }
  .score-badge { font-family: var(--mono); font-size: 13px; color: var(--text2); }
  .results-screen { display: none; text-align: center; padding: 60px 32px; }
  .results-screen.show { display: block; }
  .results-icon { font-size: 52px; margin-bottom: 20px; }
  .results-title { font-family: var(--serif); font-size: 30px; margin-bottom: 8px; }
  .results-score { font-family: var(--mono); font-size: 52px; color: #3a5cbf; margin: 20px 0; }
  .results-msg { font-size: 14px; color: var(--text2); max-width: 420px; margin: 0 auto 32px; line-height: 1.7; }
  .restart-btn { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 28px; background: var(--accent); color: #f5f0e8; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  @media (max-width: 640px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .content { padding: 20px; }
    .header { padding: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="eyebrow">Maraton Maturalny · Dzień 1</div>
    <h1>Czasy angielskie — <em>ćwiczenia</em></h1>
    <p class="subtitle">20 ćwiczeń na każdy czas. Wybierz poziom i zacznij.</p>
  </div>
  <div class="level-toggle">
    <button class="level-btn active" onclick="setLevel('p')">Podstawowy</button>
    <button class="level-btn" onclick="setLevel('r')">Rozszerzony</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-label">Czasy</div>
    <div id="tense-list"></div>
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>Postęp</span>
        <span id="progress-text">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </div>
  <div class="content">
    <div id="tense-content"></div>
    <div class="results-screen" id="results-screen">
      <div class="results-icon" id="results-icon">🎯</div>
      <div class="results-title">Sekcja ukończona!</div>
      <div class="results-score" id="results-score">—</div>
      <div class="results-msg" id="results-msg"></div>
      <button class="restart-btn" onclick="restartTense()">Spróbuj jeszcze raz</button>
    </div>
  </div>
</div>

<script>
const DATA = {
  tenses: [

    // ─── 1. PRESENT SIMPLE / CONTINUOUS ───────────────────────────────────
    {
      id: 'ps_pc',
      name: 'Present Simple / Continuous',
      tag: 'Teraźniejszość',
      rule: '<strong>Present Simple:</strong> fakty, nawyki, prawdy ogólne, rozkłady jazdy.<br><strong>Present Continuous:</strong> czynność teraz lub tymczasowo, plany na przyszłość, irytujące nawyki (always).<br><strong>Uwaga:</strong> czasowniki statyczne nie mają formy Continuous — <em>know, believe, want, need, love, hate, understand, remember, seem, prefer, belong, consist.</em>',
      signals: {
        'PS — sygnały': ['always','usually','often','never','every day','sometimes','rarely','on Mondays','in general'],
        'PC — sygnały': ['now','at the moment','currently','today','this week','Look!','Listen!','right now','these days']
      },
      questions: {
        p: [
          { type:'mcq', text:'She _____ to school every day by bus.', options:['is going','goes','go','has gone'], correct:1, explain:'Nawyk = Present Simple. She goes.' },
          { type:'mcq', text:'Listen! The baby _____ again.', options:['cries','is crying','cry','has cried'], correct:1, explain:'Sygnał "Listen!" → czynność teraz = Present Continuous.' },
          { type:'fill', text:'Water _____ (boil) at 100 degrees Celsius.', correct:['boils'], explain:'Fakt naukowy = Present Simple. Water boils.' },
          { type:'mcq', text:'I _____ what you mean. It\'s perfectly clear.', options:['am understanding','understand','understood','am understand'], correct:1, explain:'Understand = czasownik statyczny — nie ma formy Continuous. I understand.' },
          { type:'fill', text:'They _____ (work) on a new project this month.', correct:['are working'], explain:'Tymczasowa czynność = Present Continuous. They are working.' },
          { type:'mcq', text:'He always _____ his coffee without sugar.', options:['is drinking','drink','drinks','has drunk'], correct:2, explain:'Nawyk = Present Simple. He drinks.' },
          { type:'fill', text:'Look! The cat _____ (sit) on my laptop again.', correct:['is sitting'], explain:'Czynność teraz (Look!) = Present Continuous. The cat is sitting.' },
          { type:'mcq', text:'The train to Warsaw _____ at 8:15 every morning.', options:['is leaving','leave','leaves','has left'], correct:2, explain:'Rozkład jazdy = Present Simple. The train leaves.' },
          { type:'fill', text:'She _____ (not / like) horror films at all.', correct:["doesn't like","does not like"], explain:'Czasownik statyczny "like", nawyk = Present Simple. She doesn\'t like.' },
          { type:'mcq', text:'Why _____ you _____ so quietly? I can barely hear you.', options:['are / speaking','do / speak','does / speak','have / spoken'], correct:0, explain:'Czynność w tej chwili = Present Continuous. Why are you speaking.' },
          { type:'fill', text:'My parents _____ (visit) us this weekend. I\'m excited.', correct:['are visiting'], explain:'Ustalony plan na przyszłość = Present Continuous. Are visiting.' },
          { type:'mcq', text:'I _____ she\'ll agree — she\'s very reasonable.', options:['am thinking','thinks','think','am think'], correct:2, explain:'Think w znaczeniu "uważać/sądzić" = czasownik statyczny = Present Simple. I think.' },
          { type:'fill', text:'The museum _____ (open) at 9 and _____ (close) at 6.', correct:['opens','closes'], explain:'Stały fakt/rozkład = Present Simple. Opens and closes.' },
          { type:'mcq', text:'He\'s so annoying! He _____ always _____ my things without asking.', options:['is / borrowing','does / borrow','has / borrowed','will / borrow'], correct:0, explain:'Irytujący nawyk z "always" = Present Continuous. He is always borrowing.' },
          { type:'fill', text:'I can\'t come now — I _____ (have) dinner.', correct:['am having'], explain:'Czynność teraz, "have" w znaczeniu "jeść" = dynamiczny = Present Continuous. Am having.' },
          { type:'mcq', text:'English _____ a lot of vocabulary from French.', options:['is borrowing','borrowed','borrows','has been borrowing'], correct:2, explain:'Stały fakt językowy = Present Simple. Borrows.' },
          { type:'fill', text:'The children _____ (get) louder and louder these days.', correct:['are getting'], explain:'Zmieniająca się sytuacja = Present Continuous. Are getting.' },
          { type:'mcq', text:'She _____ this coat. It\'s hers, not yours.', options:['is owning','owns','own','is own'], correct:1, explain:'Own = czasownik statyczny = Present Simple. She owns.' },
          { type:'fill', text:'He _____ (think) about changing his job. He seems unsure.', correct:['is thinking'], explain:'Think w znaczeniu "rozważać" = dynamiczny = Present Continuous. Is thinking.' },
          { type:'mcq', text:'Scientists _____ that the climate is changing rapidly.', options:['are believing','believed','believe','are believe'], correct:2, explain:'Believe = czasownik statyczny = Present Simple. Believe.' },
        ],
        r: [
          { type:'mcq', text:'She _____ what you mean, even if she _____ nothing.', options:['understands / says','is understanding / says','understands / is saying','is understanding / is saying'], correct:2, explain:'Understand = statyczny (PS). Say = konkretna czynność trwająca teraz (PC). Understands / is saying.' },
          { type:'fill', text:'The data _____ (suggest) that temperatures _____ (rise) year on year.', correct:['suggest','are rising'], explain:'Suggest = statyczny (PS). Rise = trwający trend (PC). Suggest / are rising.' },
          { type:'mcq', text:'I _____ he\'ll agree — he _____ the proposal carefully right now.', options:['think / is considering','am thinking / considers','think / considers','am thinking / is considering'], correct:0, explain:'Think (opinia) = statyczny PS. Consider (aktywny proces teraz) = PC. Think / is considering.' },
          { type:'fill', text:'This fabric _____ (feel) incredibly soft. I _____ (consider) buying it.', correct:['feels','am considering'], explain:'Feel (zmysłowy) = statyczny PS. Consider (aktywny) = PC. Feels / am considering.' },
          { type:'mcq', text:'The committee _____ that the policy needs revision. They _____ it at this very meeting.', options:['agrees / are discussing','agree / are discussing','agree / discuss','are agreeing / are discussing'], correct:1, explain:'Agree = statyczny PS. Discuss = aktywny, trwający teraz = PC. Agree / are discussing.' },
          { type:'fill', text:'She _____ (have) a meeting at 3, but she _____ (have) doubts about the plan.', correct:['is having','has'], explain:'Have (spotkanie) = dynamiczny, zaplanowany = PC. Have (wątpliwości) = statyczny = PS. Is having / has.' },
          { type:'mcq', text:'The new regulations _____ into effect next Monday and they _____ the whole industry.', options:['come / will affect','are coming / affect','come / affect','are coming / will affect'], correct:0, explain:'Harmonogram (PS) + przyszły efekt (will). Come / will affect.' },
          { type:'fill', text:'Why _____ you _____ (smell) that perfume? It _____ (smell) like roses.', correct:['are','smelling','smells'], explain:'Smell (wąchać aktywnie) = dynamiczny PC. Smell (zapach) = statyczny PS. Are smelling / smells.' },
          { type:'mcq', text:'He consistently _____ deadlines, which _____ his manager increasingly.', options:['is missing / is frustrating','misses / is frustrating','is missing / frustrates','misses / frustrates'], correct:1, explain:'Nawyk (PS). Irytujący trwający efekt = PC. Misses / is frustrating.' },
          { type:'fill', text:'I _____ (see) your point, but I _____ (see) him tomorrow to discuss it further.', correct:['see','am seeing'], explain:'See (rozumieć) = statyczny PS. See (spotykać) = dynamiczny, plan = PC. See / am seeing.' },
          { type:'mcq', text:'The economy _____ well this quarter, though inflation still _____ a concern.', options:['performs / poses','is performing / poses','is performing / is posing','performs / is posing'], correct:1, explain:'Tymczasowy trend = PC. Stały fakt = PS. Is performing / poses.' },
          { type:'fill', text:'She _____ (appear) calm, but I _____ (appear) in court tomorrow.', correct:['appears','am appearing'], explain:'Appear (wyglądać) = statyczny PS. Appear (pojawiać się) = dynamiczny, plan = PC. Appears / am appearing.' },
          { type:'mcq', text:'The author _____ a new novel and she _____ it will be her best yet.', options:['writes / thinks','is writing / thinks','writes / is thinking','is writing / is thinking'], correct:1, explain:'Aktywny proces teraz = PC. Opinia = statyczny PS. Is writing / thinks.' },
          { type:'fill', text:'These days more people _____ (work) remotely, which _____ (mean) commutes are less common.', correct:['are working','means'], explain:'Zmieniający się trend = PC. Stały wynikający fakt = PS. Are working / means.' },
          { type:'mcq', text:'I _____ to tell you this, but your answer _____ wrong.', options:['am hating / is','hate / is','hate / are','am hating / are'], correct:1, explain:'Hate = statyczny PS. Is (fakt) = PS. Hate / is.' },
          { type:'fill', text:'The situation _____ (look) better than it _____ (sound).', correct:['looks','sounds'], explain:'Oba to czasowniki statyczne (wygląd/brzmienie) = PS. Looks / sounds.' },
          { type:'mcq', text:'He _____ to music on his way to work every day and today he _____ his new favourite album.', options:['listens / is listening','is listening / listens','listens / listens','is listening / is listening'], correct:0, explain:'Nawyk = PS. Konkretna czynność teraz = PC. Listens / is listening.' },
          { type:'fill', text:'I _____ (not / belong) to any political party. I _____ (prefer) to stay neutral.', correct:["don't belong","do not belong","prefer"], explain:'Belong + prefer = statyczne = PS. Don\'t belong / prefer.' },
          { type:'mcq', text:'She _____ more and more confident in her English. Her teachers _____ it too.', options:['becomes / are noticing','is becoming / notice','is becoming / are noticing','becomes / notice'], correct:2, explain:'Zmieniająca się sytuacja = PC. Notice (dostrzegać aktywnie, trwający) = PC. Is becoming / are noticing.' },
          { type:'fill', text:'The patient _____ (feel) better today, but the doctor _____ (feel) he needs more rest.', correct:['is feeling','feels'], explain:'Feel (stan fizyczny, zmienny) = PC. Feel (uważać) = statyczny PS. Is feeling / feels.' },
        ]
      }
    },

    // ─── 2. PAST SIMPLE / CONTINUOUS ──────────────────────────────────────
    {
      id: 'past_ps_pc',
      name: 'Past Simple / Continuous',
      tag: 'Przeszłość',
      rule: '<strong>Past Simple:</strong> czynność zakończona w konkretnym momencie.<br><strong>Past Continuous:</strong> czynność trwała w tle, przerywana przez PS.<br>Klasyczna konstrukcja: <em>While I was cooking, the phone rang.</em><br>PC służy też do opisu scenerii w narracji.',
      signals: {
        'PS — sygnały': ['yesterday','last year','ago','in 2010','when','then','at that moment'],
        'PC — sygnały': ['while','when (przerwanie)','at 5 o\'clock yesterday','all evening','as','at that time']
      },
      questions: {
        p: [
          { type:'mcq', text:'She _____ TV when her phone rang.', options:['watched','was watching','has watched','watches'], correct:1, explain:'Czynność w tle (PC) przerwana przez PS. She was watching TV when her phone rang.' },
          { type:'fill', text:'I _____ (see) him yesterday at the station.', correct:['saw'], explain:'Konkretny moment w przeszłości = Past Simple. I saw him.' },
          { type:'mcq', text:'While they _____, the lights _____ out.', options:['were eating / went','ate / were going','were eating / were going','ate / went'], correct:0, explain:'Tło = PC (were eating), zdarzenie = PS (went out). While they were eating, the lights went out.' },
          { type:'fill', text:'She _____ (study) all evening but _____ (not / finish) in time.', correct:['was studying',"didn't finish","did not finish"], explain:'Trwający proces = PC. Wynik/fakt = PS. Was studying / didn\'t finish.' },
          { type:'mcq', text:'I _____ my keys when I _____ for the bus.', options:['dropped / was waiting','was dropping / waited','dropped / waited','was dropping / was waiting'], correct:0, explain:'Zdarzenie = PS (dropped). Tło = PC (was waiting). I dropped my keys while I was waiting.' },

          { type:'fill', text:'The leak _____ (drip) for so long that the ceiling _____ (collapse) partially.', correct:['has been dripping','has collapsed',"'s been dripping","'s collapsed"], explain:'Trwający proces = PPC. Wynik/skutek = PP. Has been dripping / has collapsed.' },

          { type:'fill', text:'How many chapters _____ you _____ (write)? And how long _____ you _____ (work) on the thesis?', correct:['have','written','have','been working'], explain:'Policzalny wynik = PP. Czas trwania = PPC. Have written / have been working.' },
          { type:'mcq', text:'The patient _____ remarkably well since the surgery, and the doctors say the recovery _____ all expectations.', options:['has been recovering / has exceeded','recovered / exceeded','has recovered / has been exceeding','has been recovering / has been exceeding'], correct:0, explain:'Trwający postęp = PPC. Wynik osiągnięty = PP. Has been recovering / has exceeded.' },
          { type:'fill', text:'I _____ (not / see) results yet, even though I _____ (follow) the diet for six weeks.', correct:["haven't seen","have not seen","have been following","'ve been following"], explain:'Brak wyniku = PP negatywne. Trwający wysiłek = PPC. Haven\'t seen / have been following.' },
          { type:'mcq', text:'The government _____ to address the housing crisis for years and _____ virtually nothing.', options:['has been promising / has achieved','promised / has been achieving','has promised / achieved','has been promising / has been achieving'], correct:0, explain:'Trwające obietnice = PPC. Brak osiągnięcia (wynik) = PP. Has been promising / has achieved.' },
          { type:'fill', text:'They _____ (live) in this flat for three years but _____ (only / decide) to renovate it now.', correct:['have been living','have only decided',"'ve been living","'ve only decided"], explain:'Trwający stan = PPC. Decyzja (wynik) = PP. Have been living / have only decided.' },
          { type:'mcq', text:'I _____ this argument before and I _____ my mind.', options:['have heard / haven\'t changed','have been hearing / am not changing','heard / haven\'t changed','have heard / haven\'t been changing'], correct:0, explain:'PP (doświadczenie, wynik). PP negatywne (stan). Have heard / haven\'t changed.' },
          { type:'fill', text:'Sales _____ (rise) steadily. The team _____ (work) incredibly hard to achieve this.', correct:['have been rising','have been working',"'ve been rising","'ve been working"], explain:'Trwające trendy = PPC x2. Have been rising / have been working.' },
          { type:'mcq', text:'She _____ to find a solution but hasn\'t _____ yet.', options:['has been trying / managed','tried / been managing','has tried / managed','is trying / managed'], correct:0, explain:'Trwające próby = PPC. Brak wyniku = PP. Has been trying / managed.' },
          { type:'fill', text:'The negotiators _____ (talk) for twelve hours and _____ (not / reach) any agreement.', correct:['have been talking','have not reached',"haven't reached"], explain:'Czas trwania = PPC. Brak wyniku = PP. Have been talking / haven\'t reached.' },
          { type:'mcq', text:'He _____ chess since he was six and _____ over 300 games professionally.', options:['has played / has won','has been playing / has won','has played / has been winning','played / won'], correct:1, explain:'Trwające hobby = PPC. Policzalne wyniki = PP. Has been playing / has won.' },
          { type:'fill', text:'The athlete _____ (train) twice a day and _____ (break) her personal record three times this season.', correct:['has been training','has broken',"'s been training","'s broken"], explain:'Trwający reżim = PPC. Policzalne osiągnięcia = PP. Has been training / has broken.' },
          { type:'mcq', text:'I _____ this song for hours and I still can\'t get it right.', options:['have practised','have been practising','practised','am practising'], correct:1, explain:'Trwający, niezakończony wysiłek = PPC. Have been practising.' },
          { type:'fill', text:'Why _____ your face so red? _____ you _____ (run)?', correct:["is","Have","been running"], explain:'Wnioskowanie o procesie z wyglądu = PPC. Have you been running?' },
          { type:'mcq', text:'The author _____ to find a publisher for years. She _____ her manuscript to over fifty agents.', options:['has been trying / has sent','tried / sent','has tried / has been sending','has been trying / has been sending'], correct:0, explain:'Trwające starania = PPC. Policzalne wysyłki = PP. Has been trying / has sent.' },
          { type:'fill', text:'The company _____ (lose) money every quarter. Directors _____ (meet) all week to find a solution.', correct:['has been losing','have been meeting',"'s been losing","'ve been meeting"], explain:'Trwający negatywny trend = PPC. Trwające spotkania = PPC. Has been losing / have been meeting.' },

    // ─── 5. FUTURE ─────────────────────────────────────────────────────────

      signals: {

      questions: {

          { type:'fill', text:'Look at those clouds — it _____ (rain).', correct:['is going to rain',"'s going to rain"], explain:'Widoczny dowód (chmury) = going to. It\'s going to rain.' },

          { type:'fill', text:'I think it _____ (be) a great concert tonight. I love this band.', correct:['will be',"'ll be"], explain:'Przewidywanie bez dowodów (opinion: I think) = will. It will be / It\'ll be.' },
          { type:'mcq', text:'I\'ve decided — I _____ study medicine at university.', options:['\'ll study','study','\'m going to study','\'m studying'], correct:2, explain:'Podjęta wcześniej decyzja = going to. I\'m going to study.' },
          { type:'fill', text:'"I\'ve run out of milk." "Don\'t worry, I _____ (get) some on my way home."', correct:['will get',"'ll get"], explain:'Spontaniczna oferta pomocy = will. I\'ll get some.' },
          { type:'mcq', text:'We _____ have dinner with the Smiths this Friday. We arranged it ages ago.', options:['\'re going to','\'ll','\'re having','have'], correct:2, explain:'Ustalona umowa towarzyska = Present Continuous jako future. We\'re having dinner.' },
          { type:'fill', text:'Be careful! You _____ (spill) that coffee — it\'s right at the edge!', correct:['are going to spill',"'re going to spill"], explain:'Widoczne zagrożenie = going to. You\'re going to spill.' },

          { type:'fill', text:'I think technology _____ (change) our lives even more in the next ten years.', correct:['will change',"'ll change"], explain:'Przewidywanie przyszłości bez konkretnego planu = will. Will change.' },
          { type:'mcq', text:'She _____ take a gap year before university. She\'s been planning it for months.', options:['\'ll','\'s going to','\'s taking','takes'], correct:1, explain:'Zaplanowane wcześniej = going to. She\'s going to take.' },
          { type:'fill', text:'"This bag is really heavy!" "Give it to me — I _____ (carry) it for you."', correct:['will carry',"'ll carry"], explain:'Spontaniczna oferta = will. I\'ll carry it.' },
          { type:'mcq', text:'There\'s no way he _____ pass the exam — he hasn\'t studied at all.', options:['\'s going to','\'s passing','\'ll pass','passes'], correct:0, explain:'Przewidywanie oparte na widocznym fakcie (brak nauki) = going to. He\'s not going to pass.' },
          { type:'fill', text:'She _____ (fly) to London tomorrow morning. Her flight\'s at 6am.', correct:['is flying',"'s flying"], explain:'Ustalony plan (bilet kupiony) = Present Continuous. She\'s flying.' },
          { type:'mcq', text:'I _____ probably stay at home this weekend. I need to rest.', options:['\'m going to','\'m staying','\'ll','go to'], correct:2, explain:'Luźne przewidywanie z "probably" = will. I\'ll probably stay.' },
          { type:'fill', text:'"Someone needs to present the report." "Fine, I _____ (do) it."', correct:['will do',"'ll do"], explain:'Spontaniczna decyzja na miejscu = will. I\'ll do it.' },
          { type:'mcq', text:'Watch out! That vase _____ fall!', options:['will','is going to','is','goes to'], correct:1, explain:'Natychmiastowe niebezpieczeństwo (widoczny dowód) = going to. It\'s going to fall!' },
          { type:'fill', text:'By the time you arrive, I _____ (finish) cooking. Dinner will be ready.', correct:['will have finished',"'ll have finished"], explain:'Ukończone PRZED przyszłym momentem = Future Perfect. Will have finished.' },
          { type:'mcq', text:'Don\'t call me at 3pm — I _____ a meeting.', options:['\'ll have','\'m going to have','\'ll be having','have'], correct:2, explain:'Czynność trwająca w konkretnym momencie w przyszłości = Future Continuous. I\'ll be having.' },
          { type:'fill', text:'This time next week, we _____ (lie) on a beach in Zanzibar. I can\'t wait!', correct:['will be lying',"'ll be lying"], explain:'Czynność trwająca w przyszłym momencie = Future Continuous. Will be lying.' },

        r: [
          { type:'mcq', text:'By the time she retires, she _____ in this company for 30 years.', options:['will work','is going to work','will have worked','will be working'], correct:2, explain:'By the time + przyszły moment → coś skończone przed nim = Future Perfect. Will have worked.' },
          { type:'fill', text:'This time tomorrow I _____ (sit) my final exam. I\'m terrified.', correct:['will be sitting',"'ll be sitting"], explain:'Konkretny moment w przyszłości + trwająca czynność = Future Continuous. Will be sitting.' },
          { type:'mcq', text:'I can\'t meet at 5 — I _____ with clients at that time.', options:['\'ll meet','\'m going to meet','\'ll be meeting','\'m meeting'], correct:2, explain:'Planowa czynność trwająca w konkretnym momencie = Future Continuous. I\'ll be meeting.' },
          { type:'fill', text:'By next year, scientists _____ (develop) a vaccine, they hope. Clinical trials _____ (begin) already.', correct:['will have developed','will have begun',"'ll have developed","'ll have begun"], explain:'Ukończone przed przyszłym momentem = Future Perfect x2. Will have developed / will have begun.' },
          { type:'mcq', text:'The construction _____ by December, and by then they _____ 500 new homes.', options:['will finish / will build','will have finished / will have built','is finishing / are building','finishes / build'], correct:1, explain:'Oba ukończone przed grudniem = Future Perfect x2. Will have finished / will have built.' },
          { type:'fill', text:'Don\'t worry — by the time the guests arrive, I _____ (clean) the whole house.', correct:['will have cleaned',"'ll have cleaned"], explain:'Ukończone przed przyjazdem gości = Future Perfect. Will have cleaned.' },
          { type:'mcq', text:'I expect the negotiations _____ easier as both sides _____ pressure to reach a deal.', options:['will get / will feel','are going to get / feel','will get / are going to feel','are getting / will feel'], correct:0, explain:'Przewidywanie bez dowodów = will x2. Will get / will feel.' },
          { type:'fill', text:'She _____ (present) the findings at the conference. She _____ (speak) for approximately forty minutes.', correct:['is presenting','will be speaking',"'s presenting","'ll be speaking"], explain:'Ustalony plan konferencji = PC. Czas trwania = Future Continuous. Is presenting / will be speaking.' },
          { type:'mcq', text:'By the end of the decade, renewable energy _____ fossil fuels as the primary energy source.', options:['will replace','is going to replace','will have replaced','will be replacing'], correct:2, explain:'Ukończona zmiana przed końcem dekady = Future Perfect. Will have replaced.' },
          { type:'fill', text:'I _____ (probably / not / be) available tonight — I _____ (help) my sister move.', correct:['probably won\'t be',"will probably not be","'m helping","am helping"], explain:'Przewidywanie = will. Ustalony plan pomocy = PC. Won\'t be / am helping.' },
          { type:'mcq', text:'The surgery _____ approximately four hours, during which the patient _____ under general anaesthetic.', options:['will take / will be','will take / will be being','will be taking / will be','takes / is'], correct:0, explain:'Przewidywany fakt = will. Stan w czasie = will + be (statyczny). Will take / will be.' },
          { type:'fill', text:'By the time you read this letter, I _____ (already / leave) the country.', correct:['will have already left',"'ll have already left"], explain:'Ukończone przed przyszłym momentem = Future Perfect. Will have already left.' },
          { type:'mcq', text:'Experts predict that sea levels _____ by up to a metre by 2100, which _____ millions of people.', options:['will rise / will affect','are rising / affects','are going to rise / will affect','will rise / is going to affect'], correct:0, explain:'Przewidywanie ekspertów = will x2. Will rise / will affect.' },
          { type:'fill', text:'I _____ (not / retire) until I _____ (save) enough to travel the world comfortably.', correct:["won't retire","will not retire","have saved"], explain:'Obietnica/plan = will negatywne. After time clause = Present Simple (nie Future). Won\'t retire / have saved.' },
          { type:'mcq', text:'This time next month, we _____ final exams and hopefully we _____ them all.', options:['will sit / will pass','will be sitting / will have passed','sit / pass','are sitting / have passed'], correct:1, explain:'Trwająca czynność za miesiąc = Future Continuous. Ukończone wcześniej = Future Perfect. Will be sitting / will have passed.' },
          { type:'fill', text:'The project _____ (complete) by March, and we _____ (deliver) it to the client at that point.', correct:['will have been completed','will deliver',"'ll have been completed","'ll deliver"], explain:'Strona bierna Future Perfect. Przyszły wynik = will. Will have been completed / will deliver.' },
          { type:'mcq', text:'"Someone has to inform the board." "Leave it to me — I _____ call them first thing tomorrow."', options:['\'m going to','\'m','\'ll','go to'], correct:2, explain:'Spontaniczna decyzja/zobowiązanie = will. I\'ll call.' },
          { type:'fill', text:'Do you think she _____ (accept) the job offer? I _____ (be) very surprised if she doesn\'t.', correct:['will accept',"'ll accept","'ll be","will be"], explain:'Przewidywanie/opinia = will x2. Will accept / will be.' },

    // ─── 6. PAST PERFECT / PAST PERFECT CONTINUOUS ────────────────────────
    {
      id: 'past_perfect',
      name: 'Past Perfect / Past Perfect Continuous',
      tag: 'Przeszłość złożona',
      rule: '<strong>Past Perfect:</strong> czynność przed inną czynnością w przeszłości — "przeszłość przeszłości".<br><strong>Past Perfect Continuous:</strong> proces trwający przed momentem w przeszłości.<br>Kluczowe w: mowie zależnej, conditional type 3, narracji, zdaniach z <em>by the time, after, before, when, already, never before.</em>',
      signals: {
        'PP — sygnały': ['by the time','after','before','when (sekwencja)','already','never before','as soon as'],
        'PPC — sygnały': ['for hours (before)','all day (before)','because (przyczyna)','how long (before)']
      },
      questions: {
        p: [
          { type:'mcq', text:'When I arrived, she _____ already _____.', options:['has / left','had / left','was / leaving','did / leave'], correct:1, explain:'Czynność przed przyjazdem = Past Perfect. She had already left.' },
          { type:'fill', text:'He was tired because he _____ (work) all night.', correct:['had been working'], explain:'Przyczyna = trwający proces przed chwilą w przeszłości = PPC. Had been working.' },
          { type:'mcq', text:'She told me she _____ the email before the meeting.', options:['sent','has sent','had sent','was sending'], correct:2, explain:'Mowa zależna: sent → had sent (backshift). She told me she had sent.' },
          { type:'fill', text:'By the time the film started, we _____ (already / find) our seats.', correct:['had already found'], explain:'Ukończone przed początkiem filmu = Past Perfect. Had already found.' },
          { type:'mcq', text:'She _____ her homework before her parents got home.', options:['finished','has finished','had finished','was finishing'], correct:2, explain:'Ukończone przed powrotem rodziców = Past Perfect. She had finished.' },
          { type:'fill', text:'I recognised her immediately because we _____ (meet) at a conference the year before.', correct:['had met'], explain:'Wcześniejsze spotkanie = Past Perfect. Had met.' },
          { type:'mcq', text:'His eyes were red. He _____ clearly.', options:['was crying','cried','had been crying','has been crying'], correct:2, explain:'Widoczny skutek wcześniejszego procesu = PPC. He had been crying.' },
          { type:'fill', text:'They _____ (wait) for two hours by the time the doctor finally arrived.', correct:['had been waiting'], explain:'Trwający proces przed momentem w przeszłości = PPC. Had been waiting.' },
          { type:'mcq', text:'After she _____ the novel, she started writing a sequel.', options:['finished','has finished','had finished','was finishing'], correct:2, explain:'After + czynność przed = Past Perfect. After she had finished.' },
          { type:'fill', text:'He said he _____ (never / travel) abroad before this trip.', correct:['had never travelled','had never traveled'], explain:'Mowa zależna + never before = Past Perfect. Had never travelled.' },
          { type:'mcq', text:'I felt sick because I _____ too much at the party.', options:['ate','was eating','have eaten','had eaten'], correct:3, explain:'Przyczyna przed skutkiem = Past Perfect. I had eaten too much.' },
          { type:'fill', text:'She _____ (not / sleep) properly for weeks before the exam — no wonder she was exhausted.', correct:["hadn't slept","had not slept"], explain:'Trwający brak snu = PPC lub PP. Hadn\'t slept.' },
          { type:'mcq', text:'By the time the ambulance arrived, the patient _____ consciousness.', options:['lost','had lost','was losing','has lost'], correct:1, explain:'Ukończone przed przybyciem karetki = Past Perfect. Had lost consciousness.' },
          { type:'fill', text:'He _____ (practise) for months before his first concert and it showed.', correct:['had been practising'], explain:'Trwający wysiłek przed wydarzeniem = PPC. Had been practising.' },
          { type:'mcq', text:'I _____ that restaurant before, so I knew exactly what to order.', options:['visited','was visiting','had visited','have visited'], correct:2, explain:'Wcześniejsze doświadczenie = Past Perfect. I had visited.' },
          { type:'fill', text:'She looked confused — clearly nobody _____ (explain) the rules to her.', correct:["had explained","hadn't explained","had not explained"], explain:'Brak wcześniejszego wyjaśnienia = Past Perfect. Nobody had explained.' },
          { type:'mcq', text:'The house looked abandoned. Nobody _____ there for years.', options:['lived','had lived','has lived','was living'], correct:1, explain:'Stan trwający wcześniej w przeszłości = PP lub PPC. Nobody had lived.' },
          { type:'fill', text:'By the time I got to the station, the train _____ (already / leave).', correct:['had already left'], explain:'Pociąg odjechał przed moim przybyciem = Past Perfect. Had already left.' },
          { type:'mcq', text:'She _____ for the job for months when she finally got an interview.', options:['applied','had applied','has applied','had been applying'], correct:3, explain:'Trwający proces przed zdarzeniem = PPC. She had been applying.' },
          { type:'fill', text:'He realised he _____ (leave) his wallet at home when he tried to pay.', correct:['had left'], explain:'Wcześniejsze zdarzenie odkryte później = Past Perfect. Had left.' },
        ],
        r: [
          { type:'mcq', text:'If only I _____ more carefully — I _____ the mistake.', options:['read / would catch','had read / would have caught','have read / would catch','read / would have caught'], correct:1, explain:'Żal za przeszłością = If only + Past Perfect. Wynik = would have + PP3. Had read / would have caught.' },
          { type:'fill', text:'By the time the results _____ (announce), the students _____ (wait) for three hours.', correct:['were announced','had been waiting'], explain:'Strona bierna PS. Trwający proces przed = PPC. Were announced / had been waiting.' },
          { type:'mcq', text:'She _____ the presentation confidently, though she _____ the material only briefly beforehand.', options:['was delivering / studied','delivered / had studied','was delivering / had studied','delivered / studied'], correct:1, explain:'Ukończone zdarzenie = PS. Wcześniejsze przygotowanie = PP. Delivered / had studied.' },
          { type:'fill', text:'The report revealed that the company _____ (falsify) data for years and _____ (mislead) investors deliberately.', correct:['had been falsifying','had misled',"had been misleading"], explain:'Trwające fałszowanie (proces) = PPC. Jednorazowe wprowadzanie w błąd (wynik) = PP. Had been falsifying / had misled.' },
          { type:'mcq', text:'Had they _____ more carefully, they _____ the error in time.', options:['checked / would have caught','been checking / caught','check / would catch','checked / caught'], correct:0, explain:'Conditional type 3 inverted: Had + PP3 → would have + PP3. Checked / would have caught.' },
          { type:'fill', text:'She told investigators she _____ (not / realise) the documents _____ (be) forged.', correct:["hadn't realised","had not realised","had been"], explain:'Mowa zależna: hadn\'t realised (backshift). Wcześniejszy stan = PP. Hadn\'t realised / had been.' },
          { type:'mcq', text:'The critics praised the film, which _____ two years to make and _____ three different directors.', options:['took / involved','had taken / had involved','was taking / involved','took / had involved'], correct:1, explain:'Oba ukończone przed oceną krytyków = PP x2. Had taken / had involved.' },
          { type:'fill', text:'By the time the rescue team _____ (reach) them, the survivors _____ (shelter) in a cave for three days.', correct:['reached','had been sheltering'], explain:'PS dla zdarzenia głównego. PPC dla trwającego procesu wcześniejszego. Reached / had been sheltering.' },
          { type:'mcq', text:'It was obvious that she _____ for the role — every detail of her performance _____ meticulous preparation.', options:['prepared / reflected','had been preparing / reflected','had prepared / was reflecting','had been preparing / was reflecting'], correct:1, explain:'Trwające przygotowania (proces) = PPC. Wynik widoczny w przeszłości = PS. Had been preparing / reflected.' },
          { type:'fill', text:'He admitted he _____ (never / give) a speech before and _____ (barely / sleep) the night before.', correct:['had never given','had barely slept',"'d never given","'d barely slept"], explain:'Mowa zależna + never before = PP. Trwający wcześniejszy stan = PP. Had never given / had barely slept.' },
          { type:'mcq', text:'The novel explored themes the author _____ about for years but _____ articulate until now.', options:['thought / couldn\'t','had been thinking / hadn\'t been able to','thought / hadn\'t been able to','had thought / couldn\'t'], correct:1, explain:'Trwające myślenie = PPC. Trwała niemożność = PP. Had been thinking / hadn\'t been able to.' },
          { type:'fill', text:'The village _____ (flood) before the dyke _____ (repair), causing immense damage.', correct:['had flooded','was repaired'], explain:'Chronologia: zalanie przed naprawą = PP. Naprawienie = PS strona bierna. Had flooded / was repaired.' },
          { type:'mcq', text:'No sooner _____ she _____ the door than she _____ someone was watching her.', options:['had / opened / sensed','did / open / had sensed','has / opened / sensed','had / open / sensed'], correct:0, explain:'No sooner + PP → PS. Had she opened / sensed. Had opened / sensed.' },
          { type:'fill', text:'He was deeply anxious at the podium — he _____ (speak) publicly before and _____ (not / prepare) adequately.', correct:['had never spoken',"hadn't prepared","had not prepared"], explain:'Never before = PP. Brak przygotowania = PP. Had never spoken / hadn\'t prepared.' },
          { type:'mcq', text:'Scientists discovered that the ecosystem _____ significantly before conservation efforts _____ in the 1990s.', options:['degraded / began','had degraded / began','degraded / had begun','was degrading / began'], correct:1, explain:'Degradacja przed działaniami = PP. Konkretna data dla działań = PS. Had degraded / began.' },
          { type:'fill', text:'She confessed she _____ (lie) and _____ (hide) the truth for months before finally coming forward.', correct:['had been lying','had been hiding',"'d been lying","'d been hiding"], explain:'Trwające kłamstwa i ukrywanie = PPC x2. Had been lying / had been hiding.' },
          { type:'mcq', text:'It was the most challenging project he _____ — it _____ everything he had.', options:['undertook / demanded','had ever undertaken / demanded','undertook / had demanded','had undertaken / had demanded'], correct:1, explain:'Superlative + ever = PP. Wymaganie (fakt) = PS. Had ever undertaken / demanded.' },
          { type:'fill', text:'The infrastructure _____ (deteriorate) for decades before the government _____ (finally / allocate) funds for repair.', correct:['had been deteriorating','finally allocated'], explain:'Trwające pogarszanie się = PPC. Jednorazowe zdarzenie = PS. Had been deteriorating / finally allocated.' },
          { type:'mcq', text:'Witnesses reported that the suspect _____ the area for several days before the incident _____.', options:['watched / happened','had been watching / happened','watched / had happened','had watched / happened'], correct:1, explain:'Trwająca obserwacja przed zdarzeniem = PPC. Zdarzenie = PS. Had been watching / happened.' },
          { type:'fill', text:'By the time she _____ (realise) what _____ (happen), it _____ (be) too late to intervene.', correct:['realised','had happened','was'], explain:'Odkrycie = PS. Wcześniejsze zdarzenie = PP. Stan = PS. Realised / had happened / was.' },
        ]
      }
    }

  ]
};

let currentLevel = 'p';
let currentTense = 0;
let answers = {};
let tenseScores = {};

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && level === 'p') || (i === 1 && level === 'r'));
  });
  answers = {};
  tenseScores = {};
  renderSidebar();
  renderTense(currentTense);
}

function renderSidebar() {
  const list = document.getElementById('tense-list');
  list.innerHTML = DATA.tenses.map((t, i) => {
    const done = tenseScores[t.id] !== undefined;
    return `<div class="tense-item${i === currentTense ? ' active' : ''}${done ? ' done' : ''}" onclick="goTense(${i})">
      <span>${t.name}</span>
      <span class="tense-check">✓</span>
    </div>`;
  }).join('');
  updateProgress();
}

function updateProgress() {
  const total = DATA.tenses.length;
  const done = Object.keys(tenseScores).length;
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(done / total) * 100}%`;
}

function goTense(i) {
  currentTense = i;
  answers = {};
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('tense-content').style.display = 'block';
  renderSidebar();
  renderTense(i);
  window.scrollTo(0, 0);
}

function renderTense(i) {
  const t = DATA.tenses[i];
  const qs = t.questions[currentLevel] || t.questions.p;
  const levelTag = currentLevel === 'p'
    ? '<span class="parity-tag tag-p">Podstawowy</span>'
    : '<span class="parity-tag tag-r">Rozszerzony</span>';

  const signalHtml = Object.entries(t.signals).map(([label, vals]) =>
    `<div class="pill-label">${label}</div>` + vals.map(v => `<span class="pill">${v}</span>`).join('')
  ).join('');

  const qHtml = qs.map((q, qi) => renderQuestion(q, qi)).join('');

  document.getElementById('tense-content').innerHTML = `
    <div class="tense-header">
      <div class="tense-tag">${t.tag} ${levelTag}</div>
      <div class="tense-title">${t.name}</div>
      <div class="tense-rule">${t.rule}</div>
      <div class="signal-pills">${signalHtml}</div>
    </div>
    <div class="questions">${qHtml}</div>
    <div class="section-nav">
      <button class="nav-btn" onclick="goTense(${i - 1})" ${i === 0 ? 'disabled' : ''}>← Poprzedni</button>
      <span class="score-badge" id="score-badge">0 / ${qs.length}</span>
      <button class="nav-btn primary" onclick="goTense(${i + 1})" ${i === DATA.tenses.length - 1 ? 'disabled' : ''}>Następny →</button>
    </div>
  `;
}

function renderQuestion(q, qi) {
  if (q.type === 'mcq') {
    const opts = q.options.map((o, oi) => {
      const letters = ['A', 'B', 'C', 'D'];
      return `<button class="option-btn" id="opt-${qi}-${oi}" onclick="checkMcq(${qi},${oi},${q.correct},${q.options.length})">
        <span class="opt-letter">${letters[oi]}</span>${o}
      </button>`;
    }).join('');
    return `<div class="q-card" id="qcard-${qi}">
      <div class="q-num">Pytanie ${qi + 1} <span class="q-type-badge">wybór wielokrotny</span></div>
      <div class="q-text">${q.text}</div>
      <div class="options">${opts}</div>
      <div class="feedback" id="fb-${qi}"></div>
    </div>`;
  } else {
    return `<div class="q-card" id="qcard-${qi}">
      <div class="q-num">Pytanie ${qi + 1} <span class="q-type-badge">uzupełnianie luki</span></div>
      <div class="q-text">${q.text.replace(/_{2,}/g, '<span class="blank">___</span>')}</div>
      <div class="fill-wrap">
        <input class="fill-input" id="fill-${qi}" placeholder="wpisz odpowiedź..." onkeydown="if(event.key==='Enter')checkFill(${qi})">
        <button class="check-btn" id="checkbtn-${qi}" onclick="checkFill(${qi})">Sprawdź</button>
      </div>
      <div class="feedback" id="fb-${qi}"></div>
    </div>`;
  }
}

function normalize(s) {
  return s.toLowerCase().replace(/['']/g, "'").replace(/\s+/g, ' ').trim();
}

function checkMcq(qi, oi, correct, optLen) {
  if (answers[qi] !== undefined) return;
  answers[qi] = oi;
  const t = DATA.tenses[currentTense];
  const qs = t.questions[currentLevel] || t.questions.p;
  const q = qs[qi];
  const isCorrect = oi === correct;

  for (let i = 0; i < optLen; i++) {
    const btn = document.getElementById(`opt-${qi}-${i}`);
    if (!btn) continue;
    btn.disabled = true;
    if (i === oi) btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
    if (!isCorrect && i === correct) btn.classList.add('reveal-correct');
  }

  const card = document.getElementById(`qcard-${qi}`);
  card.classList.add(isCorrect ? 'correct' : 'wrong');

  const fb = document.getElementById(`fb-${qi}`);
  fb.className = `feedback show ${isCorrect ? 'ok' : 'bad'}`;
  fb.innerHTML = isCorrect ? `✓ Dobrze! ${q.explain}` : `✗ Niepoprawnie. ${q.explain}`;

  updateScore();
}

function checkFill(qi) {
  if (answers[qi] !== undefined) return;
  const input = document.getElementById(`fill-${qi}`);
  const btn = document.getElementById(`checkbtn-${qi}`);
  const val = normalize(input.value);
  const t = DATA.tenses[currentTense];
  const qs = t.questions[currentLevel] || t.questions.p;
  const q = qs[qi];
  const corrects = q.correct.map(normalize);
  const isCorrect = corrects.some(c => c === val);

  answers[qi] = val;
  input.disabled = true;
  if (btn) btn.disabled = true;
  input.classList.add(isCorrect ? 'correct-input' : 'wrong-input');

  const card = document.getElementById(`qcard-${qi}`);
  card.classList.add(isCorrect ? 'correct' : 'wrong');

  const fb = document.getElementById(`fb-${qi}`);
  fb.className = `feedback show ${isCorrect ? 'ok' : 'bad'}`;
  fb.innerHTML = isCorrect
    ? `✓ Dobrze! ${q.explain}`
    : `✗ Poprawna odpowiedź: <span class="correct-ans">${q.correct[0]}</span>. ${q.explain}`;

  updateScore();
}

function updateScore() {
  const t = DATA.tenses[currentTense];
  const qs = t.questions[currentLevel] || t.questions.p;
  const answered = Object.keys(answers).length;
  const correct = Object.entries(answers).filter(([qi, ans]) => {
    const q = qs[qi];
    if (q.type === 'mcq') return parseInt(ans) === q.correct;
    return q.correct.map(normalize).some(c => c === normalize(ans));
  }).length;

  const badge = document.getElementById('score-badge');
  if (badge) badge.textContent = `${correct} / ${qs.length}`;

  if (answered === qs.length) {
    tenseScores[t.id] = correct;
    renderSidebar();
    setTimeout(() => showResults(correct, qs.length), 700);
  }
}

function showResults(score, total) {
  document.getElementById('tense-content').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.classList.add('show');
  const pct = score / total;
  document.getElementById('results-score').textContent = `${score} / ${total}`;
  document.getElementById('results-icon').textContent = pct >= 0.85 ? '🏆' : pct >= 0.6 ? '💪' : '📖';
  document.getElementById('results-msg').textContent = pct >= 0.85
    ? 'Świetnie! Ten czas masz naprawdę opanowany. Śmiało idź dalej.'
    : pct >= 0.6
    ? 'Nieźle! Przejrzyj błędy i spróbuj jeszcze raz — jesteś blisko.'
    : 'Wróć do notatki z regułami i spróbuj jeszcze raz. Ten czas wymaga więcej uwagi.';
}

function restartTense() {
  answers = {};
  delete tenseScores[DATA.tenses[currentTense].id];
  document.getElementById('tense-content').style.display = 'block';
  document.getElementById('results-screen').classList.remove('show');
  renderSidebar();
  renderTense(currentTense);
  window.scrollTo(0, 0);
}

renderSidebar();
renderTense(0);
</script>
</body>
</html>
