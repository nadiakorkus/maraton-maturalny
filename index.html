  { id:'pp_ps', name:'Present Perfect / Past Simple', tag:'Kluczowy kontrast',
    rule:'<strong>Present Perfect:</strong> łączność z teraźniejszością, nieokreślony czas, doświadczenia.<br><strong>Past Simple:</strong> zamknięta przeszłość, wiem dokładnie kiedy.<br>To najczęstszy błąd na maturze.',
    signals:{'PP — sygnały':['already','yet','just','ever','never','since','for','recently','lately','so far'],'PS — sygnały':['yesterday','last week','ago','in 2010','when I was...','in January','at 5pm']},
    questions:{ p:[
      {type:'mcq',text:'I _____ my keys. I can\'t find them anywhere.',options:['lost','have lost','was losing','had lost'],correct:1,explain:'Nie wiem kiedy, ważne że teraz ich brak = Present Perfect. Have lost.'},
      {type:'fill',text:'She _____ (never / be) to Japan. She\'d love to go.',correct:['has never been'],explain:'Never + brak czasu = PP. Has never been.'},
      {type:'mcq',text:'I _____ him yesterday at the café on Main Street.',options:['have seen','see','saw','was seeing'],correct:2,explain:'Yesterday = konkretny moment = Past Simple. Saw.'},
      {type:'fill',text:'They _____ (just / finish) the exam. They look so relieved!',correct:['have just finished'],explain:'Just = Present Perfect. Have just finished.'},
      {type:'mcq',text:'_____ you ever _____ sushi before?',options:['Did / eat','Have / eaten','Do / eat','Were / eating'],correct:1,explain:'Ever + doświadczenie = PP. Have you ever eaten.'},
      {type:'fill',text:'I _____ (live) here since 2018 and I love it.',correct:['have lived',&quot;'ve lived&quot;],explain:'Since + trwający stan = PP. Have lived.'},
      {type:'mcq',text:'She _____ three cups of coffee this morning. It\'s only 9am!',options:['drank','was drinking','has drunk','drinks'],correct:2,explain:'This morning (niezakończony) + liczba = PP. Has drunk.'},
      {type:'fill',text:'When _____ you _____ (meet) your best friend for the first time?',correct:['did','meet'],explain:'Konkretny moment (when + first time) = PS. When did you meet.'},
      {type:'mcq',text:'Oh no! I _____ to bring my umbrella!',options:['forgot','have forgotten','was forgetting','forget'],correct:1,explain:'Skutek widoczny teraz = PP. Have forgotten.'},
      {type:'fill',text:'The team _____ (not / win) a single match so far this season.',correct:[&quot;haven't won&quot;,&quot;have not won&quot;],explain:'So far = PP. Haven\'t won.'},
      {type:'mcq',text:'I _____ this film twice already. Let\'s watch something else.',options:['saw','was seeing','see','have seen'],correct:3,explain:'Already + liczba razy = PP. Have seen.'},
      {type:'fill',text:'She _____ (leave) school at 16 and _____ (start) working immediately.',correct:['left','started'],explain:'Zamknięta sekwencja = PS x2. Left / started.'},
      {type:'mcq',text:'I\'m exhausted! I _____ in the garden all afternoon.',options:['worked','was working','have been working','work'],correct:2,explain:'Rezultat widoczny teraz = PPC. Have been working.'},
      {type:'fill',text:'He _____ (not / eat) anything since breakfast. He must be starving.',correct:[&quot;hasn't eaten&quot;,&quot;has not eaten&quot;],explain:'Since + skutek teraz = PP. Hasn\'t eaten.'},
      {type:'mcq',text:'The company _____ in 1892 and _____ since then.',options:['was founded / has thrived','founded / thrived','has been founded / has thrived','was founded / thrived'],correct:0,explain:'Konkretna data = PS (was founded). Trwający stan = PP (has thrived).'},
      {type:'fill',text:'I _____ (already / send) the email — you should have it by now.',correct:['have already sent',&quot;'ve already sent&quot;],explain:'Already + skutek teraz = PP. Have already sent.'},
      {type:'mcq',text:'_____ she call you yesterday evening?',options:['Has','Did','Was','Have'],correct:1,explain:'Yesterday = PS. Did she call.'},
      {type:'fill',text:'We _____ (not / see) each other for ages! You look great.',correct:[&quot;haven't seen&quot;,&quot;have not seen&quot;],explain:'For + skutek teraz = PP. Haven\'t seen.'},
      {type:'mcq',text:'I _____ a lot about this issue. My conclusion is that we need to act now.',options:['thought','was thinking','have thought','think'],correct:2,explain:'Przemyślenie wpływające na teraźniejszość = PP. Have thought.'},
      {type:'fill',text:'The last time I _____ (see) him, he _____ (work) in Warsaw.',correct:['saw','was working'],explain:'Last time = PS. Stan w tamtym czasie = PC. Saw / was working.'},
    ], r:[
      {type:'fill',text:'He started working here in 2015. He _____ (work) here _____ 2015.',correct:['has worked','since'],explain:'Transformacja: started in 2015 → has worked since 2015.'},
      {type:'mcq',text:'The crime rate _____ dramatically since the new policy _____ introduced.',options:['fell / was','has fallen / was','fell / has been','has fallen / has been'],correct:1,explain:'Trwający efekt = PP. Jednorazowy fakt = PS. Has fallen / was.'},
      {type:'fill',text:'It\'s the best film I _____ (ever / see).',correct:['have ever seen',&quot;'ve ever seen&quot;],explain:'Superlative + ever = PP. Have ever seen.'},
      {type:'mcq',text:'This is only the second time she _____ a formal presentation.',options:['gave','has given','was giving','gives'],correct:1,explain:'This is the + ordinal + time = PP. Has given.'},
      {type:'fill',text:'Researchers _____ (identify) a new species that _____ (live) in the Amazon for millions of years.',correct:['have identified','has lived',&quot;'s lived&quot;],explain:'Niedawne odkrycie = PP. Trwający fakt od dawna = PP.'},
      {type:'mcq',text:'She _____ three novels by the time she was thirty and _____ four more since then.',options:['wrote / published','wrote / has published','has written / published','has written / has published'],correct:1,explain:'By the time (zamknięte) = PS. Since then (do teraz) = PP. Wrote / has published.'},
      {type:'fill',text:'I _____ (wait) for over an hour! Why _____ you _____ (not / call)?',correct:['have been waiting',&quot;haven't&quot;,&quot;have not&quot;,&quot;called&quot;],explain:'Trwające oczekiwanie = PPC. Brak telefonu = PP. Have been waiting / haven\'t called.'},
      {type:'mcq',text:'The population _____ by 20% in the last decade, mainly because many people _____ here from rural areas.',options:['grew / moved','has grown / have moved','grew / have moved','has grown / moved'],correct:1,explain:'Ostatnia dekada (niezakończona) = PP x2. Has grown / have moved.'},
      {type:'fill',text:'It\'s the first time I _____ (ever / eat) oysters. They\'re surprisingly good!',correct:['have ever eaten',&quot;'ve ever eaten&quot;],explain:'First time + ever = PP. Have ever eaten.'},
      {type:'mcq',text:'He _____ the book three times and each time he _____ something new.',options:['has read / discovered','read / discovered','has read / has discovered','read / has discovered'],correct:1,explain:'Zamknięta seria bez związku z teraźniejszością = PS x2. Read / discovered.'},
      {type:'fill',text:'Sales _____ (increase) steadily since we _____ (launch) the new campaign last spring.',correct:['have increased',&quot;'ve increased&quot;,'launched'],explain:'Trwający efekt = PP. Konkretny moment = PS. Have increased / launched.'},
      {type:'mcq',text:'I _____ her once at a conference in 2019, and I _____ her since.',options:['met / haven\'t seen','have met / didn\'t see','met / didn\'t see','have met / haven\'t seen'],correct:0,explain:'Konkretny rok = PS. Od tamtej pory = PP. Met / haven\'t seen.'},
      {type:'fill',text:'By the time the investigation _____ (conclude), police _____ (interview) over two hundred witnesses.',correct:['concluded','had interviewed'],explain:'Zamknięta sekwencja. Ukończone przed = PP. Concluded / had interviewed.'},
      {type:'mcq',text:'The government _____ several measures, but critics argue that these _____ insufficient.',options:['took / proved','has taken / have proved','took / have proved','has taken / proved'],correct:1,explain:'Działania do teraz = PP. Ocena trwająca = PP. Has taken / have proved.'},
      {type:'fill',text:'I _____ (recently / start) learning Portuguese. I _____ (always / want) to visit Lisbon.',correct:['have recently started','have always wanted',&quot;'ve recently started&quot;,&quot;'ve always wanted&quot;],explain:'Recently + always = PP x2.'},
      {type:'mcq',text:'The last time scientists _____ such data was in 1987, and conditions _____ significantly since then.',options:['recorded / changed','have recorded / have changed','recorded / have changed','have recorded / changed'],correct:2,explain:'Last time + konkretny rok = PS. Since then = PP. Recorded / have changed.'},
      {type:'fill',text:'How many times _____ you _____ (visit) the doctor this year?',correct:['have','visited'],explain:'This year (niezakończony) + how many times = PP. Have you visited.'},
      {type:'mcq',text:'She _____ the role of manager for six months when the company suddenly _____ her.',options:['held / promoted','has held / promoted','had held / promoted','was holding / was promoting'],correct:2,explain:'Wcześniejszy stan przed zdarzeniem = Past Perfect. Had held / promoted.'},
      {type:'fill',text:'The situation _____ (change) dramatically since last year\'s report _____ (come) out.',correct:['has changed',&quot;'s changed&quot;,'came'],explain:'Trwająca zmiana = PP. Konkretny moment = PS. Has changed / came.'},
      {type:'mcq',text:'This _____ the third time this week that he _____ late to a meeting.',options:['is / was','is / has been','has been / was','has been / has been'],correct:1,explain:'This is the third time = PS (teraź.) + PP (seryjny fakt). Is / has been.'},
    ]}
  },
  { id:'pp_ppc', name:'Present Perfect / PP Continuous', tag:'Efekt vs proces',
    rule:'<strong>Present Perfect:</strong> wynik, efekt — CO zostało zrobione.<br><strong>Present Perfect Continuous:</strong> trwający proces — JAK DŁUGO.<br><em>I\'ve written three emails</em> (wynik) vs <em>I\'ve been writing emails all morning</em> (proces).',
    signals:{'PP — sygnały':['three times','five emails','already','just','never','completely'],'PPC — sygnały':['all day','all morning','for hours','lately','recently','how long']},
    questions:{ p:[
      {type:'mcq',text:'She\'s exhausted. She _____ all day.',options:['worked','has worked','has been working','is working'],correct:2,explain:'Skupienie na procesie, czasie trwania = PPC. Has been working.'},
      {type:'fill',text:'He _____ (read) for two hours and _____ (finish) three chapters.',correct:['has been reading','has finished'],explain:'Czas trwania = PPC. Policzalny wynik = PP.'},
      {type:'mcq',text:'How long _____ you _____ English?',options:['did / study','have / studied','have / been studying','are / studying'],correct:2,explain:'How long + trwający proces = PPC. Have you been studying.'},
      {type:'fill',text:'I _____ (paint) the kitchen — look at the mess!',correct:['have been painting',&quot;'ve been painting&quot;],explain:'Trwający proces z widocznym skutkiem = PPC. Have been painting.'},
      {type:'mcq',text:'He _____ four books this year — quite impressive.',options:['has been writing','wrote','has written','is writing'],correct:2,explain:'Policzalny wynik w niezakończonym czasie = PP. Has written.'},
      {type:'fill',text:'My eyes are red because I _____ (cry).',correct:['have been crying',&quot;'ve been crying&quot;],explain:'Widoczny fizyczny skutek = PPC. Have been crying.'},
      {type:'mcq',text:'She _____ that book for months! When will she finally finish it?',options:['read','has read','has been reading','reads'],correct:2,explain:'Trwający, niezakończony proces = PPC. Has been reading.'},
      {type:'fill',text:'We _____ (wait) here for over an hour. This is ridiculous.',correct:['have been waiting',&quot;'ve been waiting&quot;],explain:'Trwające oczekiwanie z frustracją = PPC. Have been waiting.'},
      {type:'mcq',text:'He looks tanned — he _____ on holiday.',options:['has been','was','has been being','went'],correct:0,explain:'Stan = statyczny = PP (nie PPC). He has been on holiday.'},
      {type:'fill',text:'I _____ (try) to call you all morning. Why aren\'t you answering?',correct:['have been trying',&quot;'ve been trying&quot;],explain:'Powtarzające się próby = PPC. Have been trying.'},
      {type:'mcq',text:'She _____ three cups of tea so far today.',options:['has been drinking','has drunk','drank','is drinking'],correct:1,explain:'Policzalna liczba = PP. Has drunk.'},
      {type:'fill',text:'Your hands are dirty! What _____ you _____ (do)?',correct:['have','been doing'],explain:'Widoczny skutek procesu = PPC. What have you been doing?'},
      {type:'mcq',text:'I _____ this problem for hours and I still can\'t solve it.',options:['have thought about','thought about','have been thinking about','think about'],correct:2,explain:'Trwający nieukończony wysiłek = PPC. Have been thinking about.'},
      {type:'fill',text:'She _____ (work) here since 2020 and _____ (complete) over fifty projects.',correct:['has been working','has completed'],explain:'Trwający staż = PPC. Policzalne wyniki = PP.'},
      {type:'mcq',text:'The children look happy — they _____ in the pool.',options:['swam','have swum','have been swimming','are swimming'],correct:2,explain:'Wnioskowanie z wyglądu = PPC. Have been swimming.'},
      {type:'fill',text:'He _____ (not / sleep) well lately. He seems very tired.',correct:[&quot;hasn't been sleeping&quot;,&quot;has not been sleeping&quot;],explain:'Trwający negatywny wzorzec = PPC. Hasn\'t been sleeping.'},
      {type:'mcq',text:'They _____ this bridge for three years already. When will they finish?',options:['built','have built','have been building','build'],correct:2,explain:'Trwający, niezakończony projekt = PPC. Have been building.'},
      {type:'fill',text:'I _____ (read) that report — I finished it an hour ago.',correct:['have read',&quot;'ve read&quot;],explain:'Ukończone, wynik gotowy = PP. Have read.'},
      {type:'mcq',text:'Why is the floor wet? Has someone _____ the plants?',options:['been watering','watered','been water','water'],correct:1,explain:'Ukończona czynność z konkretnym skutkiem = PP. Has someone watered.'},
      {type:'fill',text:'She looks nervous. I think she _____ (prepare) for her presentation.',correct:['has been preparing',&quot;'s been preparing&quot;],explain:'Trwające przygotowania (wnioskowanie) = PPC. Has been preparing.'},
    ], r:[
      {type:'mcq',text:'The river is polluted. Factories _____ waste into it for decades.',options:['dumped','have dumped','have been dumping','are dumping'],correct:2,explain:'Trwający szkodliwy proces = PPC. Have been dumping.'},
      {type:'fill',text:'I _____ (know) her for years. We _____ (work) together since 2019.',correct:['have known','have been working',&quot;'ve known&quot;,&quot;'ve been working&quot;],explain:'Know = statyczny = PP. Work = aktywny = PPC.'},
      {type:'mcq',text:'Scientists _____ the effects for a decade, but _____ no definitive conclusions yet.',options:['have studied / reached','have been studying / have reached','have been studying / haven\'t reached','have studied / haven\'t reached'],correct:2,explain:'Trwające badania = PPC. Brak wyniku = PP negatywne.'},
      {type:'fill',text:'The leak _____ (drip) for so long that the ceiling _____ (collapse) partially.',correct:['has been dripping','has collapsed',&quot;'s been dripping&quot;,&quot;'s collapsed&quot;],explain:'Trwający proces = PPC. Skutek = PP.'},
      {type:'mcq',text:'She _____ to master the piano since childhood and _____ several prestigious competitions.',options:['has been trying / has won','tried / won','has tried / has been winning','has been trying / has been winning'],correct:0,explain:'Trwający wysiłek = PPC. Policzalne osiągnięcia = PP.'},
      {type:'fill',text:'How many chapters _____ you _____ (write)? How long _____ you _____ (work) on the thesis?',correct:['have','written','have','been working'],explain:'Policzalny wynik = PP. Czas trwania = PPC.'},
      {type:'mcq',text:'The patient _____ remarkably well since surgery, and the recovery _____ all expectations.',options:['has been recovering / has exceeded','recovered / exceeded','has recovered / has been exceeding','has been recovering / has been exceeding'],correct:0,explain:'Trwający postęp = PPC. Wynik osiągnięty = PP.'},
      {type:'fill',text:'I _____ (not / see) results yet, even though I _____ (follow) the diet for six weeks.',correct:[&quot;haven't seen&quot;,&quot;have not seen&quot;,&quot;have been following&quot;,&quot;'ve been following&quot;],explain:'Brak wyniku = PP. Trwający wysiłek = PPC.'},
      {type:'mcq',text:'The government _____ to address the housing crisis for years and _____ virtually nothing.',options:['has been promising / has achieved','promised / has been achieving','has promised / achieved','has been promising / has been achieving'],correct:0,explain:'Trwające obietnice = PPC. Brak osiągnięcia = PP.'},
      {type:'fill',text:'They _____ (live) in this flat for three years but _____ (only / decide) to renovate it now.',correct:['have been living','have only decided',&quot;'ve been living&quot;,&quot;'ve only decided&quot;],explain:'Trwający stan = PPC. Decyzja = PP.'},
      {type:'mcq',text:'I _____ this argument before and I _____ my mind.',options:['have heard / haven\'t changed','have been hearing / am not changing','heard / haven\'t changed','have heard / haven\'t been changing'],correct:0,explain:'PP (doświadczenie). PP negatywne (stan). Have heard / haven\'t changed.'},
      {type:'fill',text:'Sales _____ (rise) steadily. The team _____ (work) incredibly hard.',correct:['have been rising','have been working',&quot;'ve been rising&quot;,&quot;'ve been working&quot;],explain:'Trwające trendy = PPC x2.'},
      {type:'mcq',text:'She _____ to find a solution but hasn\'t _____ yet.',options:['has been trying / managed','tried / been managing','has tried / managed','is trying / managed'],correct:0,explain:'Trwające próby = PPC. Brak wyniku = PP.'},
      {type:'fill',text:'The negotiators _____ (talk) for twelve hours and _____ (not / reach) any agreement.',correct:['have been talking','have not reached',&quot;haven't reached&quot;],explain:'Czas trwania = PPC. Brak wyniku = PP.'},
      {type:'mcq',text:'He _____ chess since he was six and _____ over 300 games professionally.',options:['has played / has won','has been playing / has won','has played / has been winning','played / won'],correct:1,explain:'Trwające hobby = PPC. Policzalne wyniki = PP.'},
      {type:'fill',text:'The athlete _____ (train) twice a day and _____ (break) her personal record three times.',correct:['has been training','has broken',&quot;'s been training&quot;,&quot;'s broken&quot;],explain:'Trwający reżim = PPC. Policzalne osiągnięcia = PP.'},
      {type:'mcq',text:'I _____ this song for hours and I still can\'t get it right.',options:['have practised','have been practising','practised','am practising'],correct:1,explain:'Trwający, niezakończony wysiłek = PPC. Have been practising.'},
      {type:'fill',text:'Why _____ your face so red? _____ you _____ (run)?',correct:[&quot;is&quot;,&quot;Have&quot;,&quot;been running&quot;],explain:'Wnioskowanie z wyglądu = PPC. Have you been running?'},
      {type:'mcq',text:'The author _____ to find a publisher for years. She _____ her manuscript to over fifty agents.',options:['has been trying / has sent','tried / sent','has tried / has been sending','has been trying / has been sending'],correct:0,explain:'Trwające starania = PPC. Policzalne wysyłki = PP.'},
      {type:'fill',text:'The company _____ (lose) money every quarter. Directors _____ (meet) all week to find a solution.',correct:['has been losing','have been meeting',&quot;'s been losing&quot;,&quot;'ve been meeting&quot;],explain:'Trwające negatywne trendy = PPC x2.'},
    ]}
  },
  { id:'future', name:'Future: will / going to / PC', tag:'Przyszłość',
    rule:'<strong>will:</strong> spontaniczna decyzja, przewidywanie bez dowodów, obietnice.<br><strong>going to:</strong> plan z wyprzedzeniem, przewidywanie z widocznym dowodem.<br><strong>Present Continuous:</strong> ustalony plan z konkretnym czasem.<br><strong>Future Perfect / Continuous:</strong> rozszerzona.',
    signals:{'will':['I think','probably','I\'m sure','spontaneous','I promise'],'going to':['Look!','I\'ve decided','I\'ve already booked','visible evidence'],'PC future':['tonight','at 6 pm','this Saturday','I\'ve arranged']},
    questions:{ p:[
      {type:'mcq',text:'&quot;The phone is ringing.&quot; &quot;I _____ get it!&quot;',options:[&quot;'m going to get&quot;,&quot;'ll get&quot;,'get',&quot;'m getting&quot;],correct:1,explain:'Spontaniczna decyzja = will. I\'ll get it.'},
      {type:'fill',text:'Look at those clouds — it _____ (rain).',correct:['is going to rain',&quot;'s going to rain&quot;],explain:'Widoczny dowód (chmury) = going to. It\'s going to rain.'},
      {type:'mcq',text:'I _____ meet Sarah at 7. I booked the restaurant last week.',options:[&quot;'ll meet&quot;,&quot;'m going to meet&quot;,&quot;'m meeting&quot;,'meet'],correct:2,explain:'Ustalony plan z godziną = Present Continuous. I\'m meeting.'},
      {type:'fill',text:'I think it _____ (be) a great concert tonight.',correct:['will be',&quot;'ll be&quot;],explain:'Przewidywanie bez dowodów (I think) = will. Will be.'},
      {type:'mcq',text:'I\'ve decided — I _____ study medicine at university.',options:[&quot;'ll study&quot;,'study',&quot;'m going to study&quot;,&quot;'m studying&quot;],correct:2,explain:'Podjęta wcześniej decyzja = going to. I\'m going to study.'},
      {type:'fill',text:'&quot;I\'ve run out of milk.&quot; &quot;Don\'t worry, I _____ (get) some on my way home.&quot;',correct:['will get',&quot;'ll get&quot;],explain:'Spontaniczna oferta = will. I\'ll get some.'},
      {type:'mcq',text:'We _____ have dinner with the Smiths this Friday. We arranged it ages ago.',options:[&quot;'re going to&quot;,&quot;'ll&quot;,&quot;'re having&quot;,'have'],correct:2,explain:'Ustalona umowa = Present Continuous. We\'re having dinner.'},

      {type:'fill',text:'_____ she _____ (be) here, she would know exactly what to do.',correct:['Were','were'],explain:'Inverted type 2: Were she here = If she were here.'},
      {type:'mcq',text:'Provided that all parties _____ to the terms, the deal _____ by Friday.',options:['agree / will be signed','agreed / would be signed','agree / would be signed','had agreed / will be signed'],correct:0,explain:'Provided that = if. Realna (type 1). Agree / will be signed.'},
      {type:'fill',text:'If the company _____ (not / cut) costs, it _____ (go) bankrupt by now.',correct:[&quot;hadn't cut&quot;,&quot;had not cut&quot;,&quot;would have gone&quot;],explain:'Type 3 — nierealna przeszłość. Hadn\'t cut / would have gone.'},
      {type:'mcq',text:'If he _____ the contract more carefully, he _____ the hidden clause.',options:['read / would notice','had read / would have noticed','reads / notices','read / noticed'],correct:1,explain:'Nierealna przeszłość (type 3). Had read / would have noticed.'},
      {type:'fill',text:'I _____ (be) more confident today if I _____ (practise) more as a child.',correct:['would be','had practised'],explain:'Mixed conditional: type 3 + type 2. Would be (teraz) / had practised (przeszłość).'},
      {type:'mcq',text:'_____ the government _____ earlier, the crisis could have been avoided.',options:['Had / intervened','If / had intervened','Should / intervene','Were / to intervene'],correct:0,explain:'Inverted type 3: Had + PP3. Had the government intervened.'},
      {type:'fill',text:'Supposing you _____ (be) offered the job, _____ you _____ (take) it?',correct:['were','would','take'],explain:'Supposing = if. Type 2. Were / would you take.'},
      {type:'mcq',text:'If he _____ so arrogant, he _____ more friends.',options:['isn\'t / will have','weren\'t / would have','hadn\'t been / would have','wasn\'t / will have'],correct:1,explain:'Nierealna teraźniejszość (type 2). Weren\'t / would have.'},
      {type:'fill',text:'Even if she _____ (try) harder, she _____ (not / pass) — the task was impossible.',correct:['had tried',&quot;wouldn't have passed&quot;,&quot;would not have passed&quot;],explain:'Even if + type 3. Had tried / wouldn\'t have passed.'},
      {type:'mcq',text:'If it _____ for your help, I _____ the deadline.',options:['weren\'t / would miss','hadn\'t been / would have missed','wasn\'t / would miss','isn\'t / will miss'],correct:1,explain:'If it hadn\'t been for = type 3. Had\'t been / would have missed.'},
      {type:'fill',text:'Should the system _____ (fail), a backup _____ (activate) automatically.',correct:['fail','will activate'],explain:'Should + inf. = formal type 1. Fail / will activate.'},
      {type:'mcq',text:'If she _____ about the risks, she _____ a different decision.',options:['knew / made','had known / would have made','knows / will make','knew / would make'],correct:1,explain:'Nierealna przeszłość (type 3). Had known / would have made.'},
      {type:'fill',text:'_____ I _____ (know) then what I know now, everything _____ (be) different.',correct:['Had','known','would have been'],explain:'Inverted type 3: Had I known + would have been. Had known / would have been.'},
      {type:&quot;mcq&quot;,text:&quot;If she _____ the warning signs, she _____ the problem before it escalated.&quot;,options:[&quot;noticed / would have prevented&quot;,&quot;had noticed / would have prevented&quot;,&quot;noticed / would prevent&quot;,&quot;had noticed / would prevent&quot;],correct:1,explain:&quot;Nierealna przeszlosc (type 3): If + PP would have + PP3. Had noticed / would have prevented.&quot;},
      {type:&quot;fill&quot;,text:&quot;If I _____ (know) how difficult it would be, I _____ (never / start).&quot;,correct:[&quot;had known&quot;,&quot;would never have started&quot;,&quot;would not have started&quot;],explain:&quot;Type 3: If + PP would have + PP3. Had known / would never have started.&quot;},
      {type:&quot;mcq&quot;,text:&quot;She _____ the job if she _____ been better prepared for the interview.&quot;,options:[&quot;would get / had&quot;,&quot;would have got / had&quot;,&quot;would have got / would have&quot;,&quot;would get / would have&quot;],correct:1,explain:&quot;Type 3: would have got / had been better prepared.&quot;},
      {type:&quot;fill&quot;,text:&quot;If the weather _____ (be) better, we _____ (go) to the beach instead of staying indoors.&quot;,correct:[&quot;had been&quot;,&quot;would have gone&quot;],explain:&quot;Type 3: If + PP would have + PP3. Had been / would have gone.&quot;},
      {type:&quot;mcq&quot;,text:&quot;_____ I known about the meeting, I would have attended without fail.&quot;,options:[&quot;If&quot;,&quot;Had&quot;,&quot;Should&quot;,&quot;Were&quot;],correct:1,explain:&quot;Inversion type 3: Had I known = If I had known. Had.&quot;},
      {type:&quot;fill&quot;,text:&quot;The accident _____ (not / happen) if the driver _____ (pay) more attention.&quot;,correct:[&quot;would not have happened&quot;,&quot;had paid&quot;],explain:&quot;Type 3: would not have happened / had paid.&quot;},
      {type:&quot;mcq&quot;,text:&quot;If the company _____ more in training, it _____ the high staff turnover.&quot;,options:[&quot;had invested / would have avoided&quot;,&quot;invested / would avoid&quot;,&quot;had invested / would avoid&quot;,&quot;invested / would have avoided&quot;],correct:0,explain:&quot;Type 3: If + PP would have + PP3. Had invested / would have avoided.&quot;},
      {type:&quot;fill&quot;,text:&quot;She _____ (might / become) a professional athlete if she _____ (not / injure) her knee.&quot;,correct:[&quot;might have become&quot;,&quot;had not injured&quot;],explain:&quot;Type 3 z might: might have become / had not injured.&quot;},
      {type:&quot;mcq&quot;,text:&quot;What _____ you have done if you _____ in my situation?&quot;,options:[&quot;would / were&quot;,&quot;would / had been&quot;,&quot;will / were&quot;,&quot;would / was&quot;],correct:1,explain:&quot;Type 3: What would you have done / if you had been. Had been.&quot;},
      {type:&quot;fill&quot;,text:&quot;If only they _____ (listen) to the experts, the crisis _____ (be) entirely avoidable.&quot;,correct:[&quot;had listened&quot;,&quot;would have been&quot;,&quot;could have been&quot;],explain:&quot;If only + PP = zal. Had listened / would have been.&quot;},
    ]}
  },
  { id:'wish_modal', name:'Wish / If only / Modal verbs', tag:'Modals + Wish',
    rule:'<strong>Wish + PS:</strong> żal za teraźniejszością. <strong>Wish + PP:</strong> żal za przeszłością. <strong>Wish + would:</strong> irytacja.<br><strong>Must:</strong> obowiązek/dedukcja. <strong>Should:</strong> rada. <strong>Might/may:</strong> możliwość. <strong>Can\'t have / must have:</strong> dedukcja w przeszłości.',
    signals:{'Wish/If only':['I wish','If only','I regret','I\'m unhappy that'],'Modals past':['must have','can\'t have','should have','might have','could have']},
    questions:{ p:[
      {type:'mcq',text:'I wish I _____ taller. It\'s so frustrating.',options:['am','were','was','have been'],correct:1,explain:'Wish + PS = żal za teraźniejszością. Zawsze were po wish. I wish I were.'},
      {type:'fill',text:'If only I _____ (study) harder last year — I would have passed.',correct:['had studied'],explain:'If only + PP = żal za przeszłością. Had studied.'},
      {type:'mcq',text:'You look pale. You _____ see a doctor.',options:['must','should','can\'t','might not'],correct:1,explain:'Rada = should. You should see a doctor.'},
      {type:'fill',text:'She _____ (must / leave) already — her coat is gone.',correct:['must have left'],explain:'Pewna dedukcja w przeszłości = must have + PP3. Must have left.'},
      {type:'mcq',text:'I wish you _____ make so much noise! I\'m trying to work.',options:['don\'t','wouldn\'t','won\'t','didn\'t'],correct:1,explain:'Wish + would = irytacja, prośba o zmianę. Wouldn\'t.'},
      {type:'fill',text:'He _____ (can\'t / say) that — he wasn\'t even there!',correct:[&quot;can't have said&quot;],explain:'Pewne zaprzeczenie w przeszłości = can\'t have + PP3. Can\'t have said.'},
      {type:'mcq',text:'You _____ have told me earlier! I could have helped.',options:['must','should','can\'t','would'],correct:1,explain:'Wyrzut za przeszłością = should have + PP3. Should have told.'},
      {type:'fill',text:'I wish I _____ (know) the answer. I feel so lost.',correct:['knew'],explain:'Wish + PS = żal za teraźniejszością. I wish I knew.'},
      {type:'mcq',text:'She _____ be in a meeting now — she left half an hour ago.',options:['might','must','should','can\'t'],correct:1,explain:'Pewna dedukcja o teraźniejszości = must. She must be in a meeting.'},
      {type:'fill',text:'If only he _____ (not / say) those words — it ruined everything.',correct:[&quot;hadn't said&quot;,&quot;had not said&quot;],explain:'If only + PP negatywne = żal za przeszłością. Hadn\'t said.'},
      {type:'mcq',text:'You _____ park here — it\'s a no-parking zone.',options:['mustn\'t','don\'t have to','shouldn\'t have','mightn\'t'],correct:0,explain:'Zakaz = mustn\'t. You mustn\'t park here.'},
      {type:'fill',text:'She _____ (might / forget) — you should send her a reminder.',correct:['might have forgotten'],explain:'Możliwość w przeszłości = might have + PP3. Might have forgotten.'},
      {type:'mcq',text:'You _____ wear a tie — it\'s a casual event.',options:['mustn\'t','don\'t have to','shouldn\'t','can\'t'],correct:1,explain:'Brak obowiązku = don\'t have to (nie zakaz!). You don\'t have to wear a tie.'},
      {type:'fill',text:'I wish she _____ (stop) interrupting me. It\'s so rude.',correct:['would stop'],explain:'Wish + would = irytacja/prośba o zmianę. Would stop.'},
      {type:'mcq',text:'He looks exhausted. He _____ been working all night.',options:['should have','must have','can\'t have','might not have'],correct:1,explain:'Pewna dedukcja z widocznego dowodu = must have. Must have been working.'},
      {type:'fill',text:'If only I _____ (be) more careful — I wouldn\'t have made that mistake.',correct:['had been'],explain:'If only + PP = żal za przeszłością. Had been.'},
      {type:'mcq',text:'I _____ go to the party tonight — I haven\'t decided yet.',options:['must','should','might','have to'],correct:2,explain:'Niepewność = might. I might go.'},
      {type:'fill',text:'You _____ (should / call) before coming over. It\'s basic courtesy.',correct:['should have called'],explain:'Wyrzut za przeszłością = should have + PP3. Should have called.'},
      {type:'mcq',text:'She _____ have stolen it — she\'s completely honest.',options:['must','should','can\'t','might'],correct:2,explain:'Pewne zaprzeczenie = can\'t have. She can\'t have stolen it.'},
      {type:'fill',text:'I wish I _____ (go) to that concert last year. By all accounts it was incredible.',correct:['had gone'],explain:'Wish + PP = żal za przeszłością. I wish I had gone.'},
    ], r:[
      {type:'mcq',text:'The report _____ have been submitted by now — the deadline was yesterday.',options:['should','must','can\'t','might'],correct:0,explain:'Wyrzut/oczekiwanie = should have. Should have been submitted.'},
      {type:'fill',text:'I wish the government _____ (take) this issue more seriously. It\'s getting worse.',correct:['would take'],explain:'Wish + would = frustracja z brakiem zmiany. Would take.'},
      {type:'mcq',text:'She _____ have been informed — it was clearly stated in the briefing document.',options:['might','should','can\'t','must'],correct:3,explain:'Pewna dedukcja z dostępnych dowodów = must have. Must have been informed.'},
      {type:'fill',text:'If only the decision _____ (make) sooner — we _____ (avoid) all this chaos.',correct:['had been made',&quot;could have avoided&quot;,&quot;would have avoided&quot;],explain:'Strona bierna PP (if only) + could/would have. Had been made / could have avoided.'},
      {type:'mcq',text:'He _____ have known about the risks — they were clearly documented.',options:['can\'t','must','should','might not'],correct:1,explain:'Oczywista dedukcja z dokumentów = must have. Must have known.'},
      {type:'fill',text:'I wish I _____ (be able to) attend every session — some were truly fascinating.',correct:['had been able to'],explain:'Wish + could/be able to w przeszłości = PP. Had been able to attend.'},
      {type:'mcq',text:'The results _____ have been altered — the methodology was sound throughout.',options:['shouldn\'t','can\'t','mustn\'t','wouldn\'t'],correct:1,explain:'Pewne zaprzeczenie w przeszłości = can\'t have. Can\'t have been altered.'},
      {type:'fill',text:'You _____ (should / be) more diplomatic — the way you phrased it was unnecessarily harsh.',correct:['should have been'],explain:'Wyrzut = should have been. Should have been more diplomatic.'},
      {type:'mcq',text:'If only the witnesses _____ more, the case _____ to court.',options:['cooperated / would go','had cooperated / would have gone','cooperated / would have gone','had cooperated / would go'],correct:1,explain:'If only + PP = żal. Wynik = would have. Had cooperated / would have gone.'},
      {type:'fill',text:'She _____ (must / work) incredibly hard — she graduated top of her class.',correct:['must have worked'],explain:'Pewna dedukcja z rezultatu = must have + PP3. Must have worked.'},
      {type:'mcq',text:'I wish the media _____ sensationalise every story — it distorts public perception.',options:['didn\'t','wouldn\'t','hadn\'t','won\'t'],correct:1,explain:'Wish + would = frustracja z trwającym nawyki. Wouldn\'t sensationalise.'},
      {type:'fill',text:'The equipment _____ (can\'t / malfunction) — it was serviced just last week.',correct:[&quot;can't have malfunctioned&quot;],explain:'Pewne zaprzeczenie = can\'t have + PP3. Can\'t have malfunctioned.'},
      {type:'mcq',text:'She _____ have anticipated this reaction — it was entirely predictable.',options:['might','must','should','can\'t'],correct:2,explain:'Wyrzut za brakiem przewidywania = should have. Should have anticipated.'},
      {type:'fill',text:'If only the treaty _____ (sign) earlier — the conflict _____ (prevent).',correct:['had been signed',&quot;could have been prevented&quot;,&quot;would have been prevented&quot;],explain:'If only + strona bierna PP. Had been signed / could have been prevented.'},
      {type:'mcq',text:'The suspect _____ have been at the scene — there\'s clear CCTV footage.',options:['can\'t','should','must','might not'],correct:2,explain:'Niepodważalny dowód = must have. Must have been at the scene.'},
      {type:'fill',text:'I wish the committee _____ (reconsider) their position — there\'s still time.',correct:['would reconsider'],explain:'Wish + would = nadzieja na zmianę. Would reconsider.'},
      {type:'mcq',text:'He _____ have spent all his savings — he was always extremely cautious with money.',options:['must','should','can\'t','might'],correct:2,explain:'Sprzeczność z charakterem = can\'t have. Can\'t have spent.'},
      {type:'fill',text:'You _____ (might / overlook) this initially, but in retrospect it\'s quite significant.',correct:['might have overlooked'],explain:'Możliwość w przeszłości = might have + PP3. Might have overlooked.'},
      {type:'mcq',text:'If only I _____ in her shoes for a day — I\'d understand her perspective so much better.',options:['walk','walked','had walked','were walking'],correct:3,explain:'Hipotetyczna teraźniejszość po if only = PS. Were walking / walked też poprawne, ale were walking podkreśla trwanie.'},
      {type:'fill',text:'The discovery _____ (must / shake) the scientific community — it contradicts decades of research.',correct:['must have shaken'],explain:'Pewna dedukcja z konsekwencji = must have + PP3. Must have shaken.'},
    ]}
  },
  { id:'key_constructions', name:'Going to / Would like / Be able to / Used to', tag:'Konstrukcje',
    rule:'<strong>going to:</strong> plan lub przewidywanie z dowodem.<br><strong>would like to:</strong> grzeczna chęć — zawsze + infinitive (nie gerund).<br><strong>be able to:</strong> umiejętność we wszystkich czasach (zastępuje can).<br><strong>used to:</strong> przeszły nawyk (już nie). <strong>be used to + -ing:</strong> być przyzwyczajonym. <strong>get used to + -ing:</strong> przyzwyczajać się.',
    signals:{'going to':['plan ahead','visible evidence','already decided','Look!'],'would like':['polite request','wish','I\'d like to'],'be able to':['future ability','after modal','all tenses'],'used to':['past habit','no longer','anymore','used to vs be used to']},
    questions:{ p:[
      {type:'mcq',text:'I\'ve already packed my bags. I _____ leave tomorrow morning.',options:['will','am going to','would','might'],correct:1,explain:'Wcześniej podjęty plan = going to. I\'m going to leave.'},
      {type:'fill',text:'I _____ (would like / order) the pasta, please.',correct:[&quot;'d like to order&quot;,&quot;would like to order&quot;],explain:'Grzeczna prośba w restauracji = would like to + infinitive. Would like to order.'},
      {type:'mcq',text:'She _____ to drive soon — she starts lessons next week.',options:['can','will be able','is able','could'],correct:1,explain:'Przyszła umiejętność = will be able to. She will be able to drive.'},
      {type:'fill',text:'He _____ (used to / walk) to school, but now he takes the bus.',correct:['used to walk'],explain:'Przeszły nawyk, już nie = used to. Used to walk.'},
      {type:'mcq',text:'Look at those dark clouds — it _____ rain.',options:['will','is going to','would','might'],correct:1,explain:'Widoczny dowód = going to. It\'s going to rain.'},
      {type:'fill',text:'I _____ (be used to / work) long hours — I\'ve done it for years.',correct:[&quot;'m used to working&quot;,&quot;am used to working&quot;],explain:'Być przyzwyczajonym = be used to + -ing. I\'m used to working.'},
      {type:'mcq',text:'_____ you _____ help me with this? I\'m struggling.',options:['Would / like to','Would / like','Will / like to','Would / liking'],correct:0,explain:'Grzeczna prośba = Would you like to. Would you like to help.'},
      {type:'fill',text:'After years of training, she _____ (be able to / lift) twice her body weight.',correct:['was able to lift'],explain:'Konkretne osiągnięcie w przeszłości = was able to (nie could). Was able to lift.'},
      {type:'mcq',text:'She _____ smoke, but she quit five years ago.',options:['is used to','used to','was able to','would like to'],correct:1,explain:'Przeszły nawyk (już nie) = used to. She used to smoke.'},
      {type:'fill',text:'I _____ (would like / learn) Spanish one day. It sounds beautiful.',correct:[&quot;'d like to learn&quot;,&quot;would like to learn&quot;],explain:'Pragnienie = would like to + infinitive. Would like to learn.'},
      {type:'mcq',text:'Don\'t worry — by next month you _____ do this in your sleep.',options:['can','will be able to','are able to','could'],correct:1,explain:'Przyszła umiejętność = will be able to. You will be able to do this.'},
      {type:'fill',text:'It took a while, but she _____ (get used to / drive) on the left.',correct:['got used to driving'],explain:'Przyzwyczajenie (proces) = got used to + -ing. Got used to driving.'},
      {type:'mcq',text:'I _____ play the piano as a child, but I\'ve completely forgotten how.',options:['used to','was used to','got used to','would like to'],correct:0,explain:'Przeszła umiejętność/nawyk (już nie) = used to. I used to play.'},
      {type:'fill',text:'He _____ (be going to / propose) last night, but he lost his nerve.',correct:['was going to propose'],explain:'Plan który nie doszedł do skutku = was going to. Was going to propose.'},
      {type:'mcq',text:'I _____ early mornings — I work from home, so I can set my own schedule.',options:['used to','am used to','get used to','would like'],correct:1,explain:'Obecne przyzwyczajenie = am used to + -ing. I\'m used to (working) early mornings.'},
      {type:'fill',text:'Would you _____ (like / join) us for dinner on Friday?',correct:['like to join'],explain:'Would you like to + infinitive. Like to join.'},
      {type:'mcq',text:'I _____ finish the report by 5pm — I\'ve already started.',options:['am going to','would like to','used to','am used to'],correct:0,explain:'Plan z decyzją = going to. I\'m going to finish.'},
      {type:'fill',text:'After the operation, he _____ (not / be able to / walk) for months.',correct:[&quot;wasn't able to walk&quot;,&quot;was not able to walk&quot;,&quot;couldn't walk&quot;],explain:'Brak umiejętności w przeszłości = wasn\'t able to / couldn\'t. Wasn\'t able to walk.'},
      {type:'mcq',text:'She\'s _____ working under pressure — she\'s been doing it her whole career.',options:['used to','get used to','going to','would like to'],correct:0,explain:'Obecne przyzwyczajenie = used to (być przyzwyczajoną). She\'s used to working.'},
      {type:'fill',text:'I _____ (would love to / travel) more, but I never seem to have the time.',correct:[&quot;'d love to travel&quot;,&quot;would love to travel&quot;],explain:'Would love to = silniejsza wersja would like to. Would love to travel.'},
    ], r:[
      {type:'mcq',text:'Having studied abroad, she _____ adapt to different cultural contexts with ease.',options:['is used to','was able to','used to','would like to'],correct:1,explain:'Konkretna umiejętność zdobyta przez doświadczenie = was able to. Was able to adapt.'},
      {type:'fill',text:'By this time next year, I _____ (be able to / speak) fluent Mandarin — I\'ve been taking intensive classes.',correct:['will be able to speak'],explain:'Przyszła umiejętność = will be able to. Will be able to speak.'},
      {type:'mcq',text:'I _____ working in a traditional office, but remote work has completely changed my habits.',options:['was used to','used to','am used to','got used to'],correct:0,explain:'Przeszłe przyzwyczajenie (teraz inne) = was used to + -ing. I was used to working.'},
      {type:'fill',text:'The CEO _____ (would like / address) shareholders\' concerns at the next board meeting.',correct:['would like to address'],explain:'Formalne pragnienie = would like to + infinitive. Would like to address.'},
      {type:'mcq',text:'She _____ have a remarkable memory as a child — she could recite entire poems effortlessly.',options:['used to','was used to','was able to','would like to'],correct:0,explain:'Przeszłe zdolności/nawyki = used to. She used to have.'},
      {type:'fill',text:'After months of intensive training, the team _____ (finally / be able to / compete) at the highest level.',correct:['was finally able to compete','were finally able to compete'],explain:'Konkretne osiągnięcie po wysiłku = was able to. Was finally able to compete.'},
      {type:'mcq',text:'The company _____ operate with a much smaller workforce — automation has transformed their processes.',options:['is used to','is able to','used to','would like to'],correct:2,explain:'Przeszłe warunki (teraz inne) = used to. The company used to operate.'},
      {type:'fill',text:'I _____ (would rather / work) independently, but I appreciate the collaborative aspect of this role.',correct:[&quot;'d rather work&quot;,&quot;would rather work&quot;],explain:'Would rather + infinitive = preferować. Would rather work.'},
      {type:'mcq',text:'Having lived in Tokyo for a decade, she _____ the city\'s complex transport system.',options:['used to navigating','is used to navigating','got used to navigate','was able to navigate'],correct:1,explain:'Obecne przyzwyczajenie po długim czasie = is used to + -ing. Is used to navigating.'},
      {type:'fill',text:'Within six months of joining, new recruits _____ (be able to / handle) most situations independently.',correct:['should be able to handle','will be able to handle'],explain:'Przyszła umiejętność po procesie = will/should be able to. Will/should be able to handle.'},
      {type:'mcq',text:'The industry _____ rely on fossil fuels, but the shift towards renewables is accelerating.',options:['is used to','was able to','used to','would like to'],correct:2,explain:'Przeszłe uzależnienie (zmiana nastąpiła) = used to. Used to rely.'},
      {type:'fill',text:'I _____ (not / be used to / receive) such direct feedback, but I\'ve come to value it enormously.',correct:[&quot;wasn't used to receiving&quot;,&quot;am not used to receiving&quot;],explain:'Przeszłe lub obecne przyzwyczajenie (negatywne) = wasn\'t/am not used to + -ing.'},
      {type:'mcq',text:'The diplomat _____ negotiate under pressure — it\'s a core part of the role.',options:['is used to','used to','was going to','would like to'],correct:0,explain:'Obecne przyzwyczajenie zawodowe = is used to + -ing. Is used to negotiating.'},
      {type:'fill',text:'She _____ (would like / see) greater transparency in the decision-making process.',correct:['would like to see'],explain:'Formalne pragnienie = would like to. Would like to see.'},
      {type:'mcq',text:'It took several months, but the team eventually _____ to the new management style.',options:['used to','got used','was able','would like'],correct:1,explain:'Proces przyzwyczajenia = got used to. Got used to (the new style).'},
      {type:'fill',text:'By the time the merger is complete, both companies _____ (be able to / pool) their resources effectively.',correct:['will be able to pool'],explain:'Przyszła umiejętność = will be able to. Will be able to pool.'},
      {type:'mcq',text:'He _____ be quite introverted, but years of public speaking have transformed him.',options:['is used to','used to','was able to','would like to'],correct:1,explain:'Przeszła cecha charakteru (teraz inna) = used to. He used to be.'},
      {type:'fill',text:'I _____ (get used to / work) with such ambiguous briefs — it\'s quite the adjustment.',correct:[&quot;'m getting used to working&quot;,&quot;am getting used to working&quot;],explain:'Trwający proces przyzwyczajenia = getting used to + -ing.'},
      {type:'mcq',text:'After the restructuring, staff _____ the new reporting structure within a few weeks.',options:['used to','were able to adjust to','got used to adjust to','would like to adjust to'],correct:1,explain:'Konkretne osiągnięcie = were able to. Were able to adjust to.'},

// ─── STATE ─────────────────────────────────────────────────────────────────
let currentDay = 1;
let currentLevel = 'p';
let currentTense = 0;
let answers = {};
let tenseScores = {};

function currentData() { return currentDay === 1 ? DAY1 : currentDay === 2 ? DAY2 : DAY3; }

function switchDay(day) {
  currentDay = day;
  currentTense = 0;
  answers = {};
  tenseScores = {};
  document.getElementById('tab-d1').classList.toggle('active', day === 1);
  document.getElementById('tab-d2').classList.toggle('active', day === 2);
  document.getElementById('tab-d3').classList.toggle('active', day === 3);
  const d = currentData();
  document.getElementById('day-label').textContent = d.label;
  document.getElementById('sidebar-label').textContent = d.sidebarLabel;
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('tense-content').style.display = 'block';
  renderSidebar();
  renderTense(0);
}

function setLevel(level) {
  currentLevel = level;
  document.querySelectorAll('.level-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 &amp;&amp; level === 'p') || (i === 1 &amp;&amp; level === 'r'));
  });
  answers = {};
  tenseScores = {};
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('tense-content').style.display = 'block';
  renderSidebar();
  renderTense(currentTense);
}

function renderSidebar() {
  const d = currentData();
  const list = document.getElementById('tense-list');
  list.innerHTML = d.tenses.map((t, i) => {
    const done = tenseScores[t.id] !== undefined;
    return `<div class=&quot;tense-item${i === currentTense ? ' active' : ''}${done ? ' done' : ''}&quot; onclick=&quot;goTense(${i})&quot;>
      <span>${t.name}</span>
      <span class=&quot;tense-check&quot;>✓</span>
    </div>`;
  }).join('');
  updateProgress();
}

function updateProgress() {
  const d = currentData();
  const total = d.tenses.length;
  const done = Object.keys(tenseScores).length;
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(done / total) * 100}%`;
}

function goTense(i) {
  currentTense = i;
  answers = {};
  document.getElementById('results-screen').classList.remove('show');
  document.getElementById('tense-content').style.display = 'block';
  renderSidebar();
  renderTense(i);
  window.scrollTo(0, 0);
}

function renderTense(i) {
  const d = currentData();
  const t = d.tenses[i];
  const qs = t.questions[currentLevel] || t.questions.p;
  const levelTag = currentLevel === 'p'
    ? '<span class=&quot;parity-tag tag-p&quot;>Podstawowy</span>'
    : '<span class=&quot;parity-tag tag-r&quot;>Rozszerzony</span>';
  const signalHtml = Object.entries(t.signals).map(([label, vals]) =>
    `<div class=&quot;pill-label&quot;>${label}</div>` + vals.map(v => `<span class=&quot;pill&quot;>${v}</span>`).join('')
  ).join('');
  const qHtml = qs.map((q, qi) => renderQuestion(q, qi)).join('');
  document.getElementById('tense-content').innerHTML = `
    <div class=&quot;tense-header&quot;>
      <div class=&quot;tense-tag&quot;>${t.tag} ${levelTag}</div>
      <div class=&quot;tense-title&quot;>${t.name}</div>
      <div class=&quot;tense-rule&quot;>${t.rule}</div>
      <div class=&quot;signal-pills&quot;>${signalHtml}</div>
    </div>
    <div class=&quot;questions&quot;>${qHtml}</div>
    <div class=&quot;section-nav&quot;>
      <button class=&quot;nav-btn&quot; onclick=&quot;goTense(${i - 1})&quot; ${i === 0 ? 'disabled' : ''}>← Poprzedni</button>
      <span class=&quot;score-badge&quot; id=&quot;score-badge&quot;>0 / ${qs.length}</span>
      <button class=&quot;nav-btn primary&quot; onclick=&quot;goTense(${i + 1})&quot; ${i === d.tenses.length - 1 ? 'disabled' : ''}>Następny →</button>
    </div>`;
}

function renderQuestion(q, qi) {
  if (q.type === 'mcq') {
    const opts = q.options.map((o, oi) => {
      const letters = ['A', 'B', 'C', 'D'];
      return `<button class=&quot;option-btn&quot; id=&quot;opt-${qi}-${oi}&quot; onclick=&quot;checkMcq(${qi},${oi},${q.correct},${q.options.length})&quot;>
        <span class=&quot;opt-letter&quot;>${letters[oi]}</span>${o}
      </button>`;
    }).join('');
    return `<div class=&quot;q-card&quot; id=&quot;qcard-${qi}&quot;>
      <div class=&quot;q-num&quot;>Pytanie ${qi + 1} <span class=&quot;q-type-badge&quot;>wybór wielokrotny</span></div>
      <div class=&quot;q-text&quot;>${q.text}</div>
      <div class=&quot;options&quot;>${opts}</div>
      <div class=&quot;feedback&quot; id=&quot;fb-${qi}&quot;></div>
    </div>`;
  } else {
    const blanks = (q.text.match(/_{2,}/g) || []).length;
    const isMulti = blanks > 1;
    let inputsHtml = '';
    if (isMulti) {
      for (let b = 0; b < blanks; b++) {
        inputsHtml += `<input class=&quot;fill-input&quot; id=&quot;fill-${qi}-${b}&quot; placeholder=&quot;luka ${b+1}...&quot; onkeydown=&quot;if(event.key==='Enter')checkFill(${qi})&quot; style=&quot;min-width:130px;&quot;>`;
      }
    } else {
      inputsHtml = `<input class=&quot;fill-input&quot; id=&quot;fill-${qi}-0&quot; placeholder=&quot;wpisz odpowiedź...&quot; onkeydown=&quot;if(event.key==='Enter')checkFill(${qi})&quot; style=&quot;min-width:180px;&quot;>`;
    }
    return `<div class=&quot;q-card&quot; id=&quot;qcard-${qi}&quot;>
      <div class=&quot;q-num&quot;>Pytanie ${qi + 1} <span class=&quot;q-type-badge&quot;>uzupełnianie luki</span></div>
      <div class=&quot;q-text&quot;>${q.text.replace(/_{2,}/g, '<span class=&quot;blank&quot;>___</span>')}</div>
      <div class=&quot;fill-wrap&quot;>
        ${inputsHtml}
        <button class=&quot;check-btn&quot; id=&quot;checkbtn-${qi}&quot; onclick=&quot;checkFill(${qi})&quot;>Sprawdź</button>
      </div>
      <div class=&quot;feedback&quot; id=&quot;fb-${qi}&quot;></div>
    </div>`;
  }
}

function normalize(s) {
  return s.toLowerCase().replace(/['']/g, &quot;'&quot;).replace(/\s+/g, ' ').trim();
}

function checkMcq(qi, oi, correct, optLen) {
  if (answers[qi] !== undefined) return;
  answers[qi] = oi;
  const d = currentData();
  const qs = d.tenses[currentTense].questions[currentLevel] || d.tenses[currentTense].questions.p;
  const q = qs[qi];
  const isCorrect = oi === correct;
  for (let i = 0; i < optLen; i++) {
    const btn = document.getElementById(`opt-${qi}-${i}`);
    if (!btn) continue;
    btn.disabled = true;
    if (i === oi) btn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');
    if (!isCorrect &amp;&amp; i === correct) btn.classList.add('reveal-correct');
  }
  document.getElementById(`qcard-${qi}`).classList.add(isCorrect ? 'correct' : 'wrong');
  const fb = document.getElementById(`fb-${qi}`);
  fb.className = `feedback show ${isCorrect ? 'ok' : 'bad'}`;
  fb.innerHTML = isCorrect ? `✓ Dobrze! ${q.explain}` : `✗ Niepoprawnie. ${q.explain}`;
  updateScore();
}

function checkFill(qi) {
  if (answers[qi] !== undefined) return;
  const d = currentData();
  const qs = d.tenses[currentTense].questions[currentLevel] || d.tenses[currentTense].questions.p;
  const q = qs[qi];
  const blanks = (q.text.match(/_{2,}/g) || []).length;
  const numInputs = Math.max(blanks, 1);
  const btn = document.getElementById(`checkbtn-${qi}`);

  // Collect values from all inputs
  const vals = [];
  for (let b = 0; b < numInputs; b++) {
    const inp = document.getElementById(`fill-${qi}-${b}`);
    if (inp) { vals.push(normalize(inp.value)); inp.disabled = true; }
  }
  if (btn) btn.disabled = true;
  answers[qi] = vals.join('|');

  // For single-blank: check if val matches any correct answer
  // For multi-blank: check each val against corresponding correct answer in order
  let isCorrect = false;
  if (numInputs === 1) {
    isCorrect = q.correct.map(normalize).some(c => c === vals[0]);
    const inp = document.getElementById(`fill-${qi}-0`);
    if (inp) inp.classList.add(isCorrect ? 'correct-input' : 'wrong-input');
  } else {
    // Multi-blank: each input checked against its own correct answer
    // correct array order matches blank order
    let allCorrect = true;
    for (let b = 0; b < numInputs; b++) {
      const inp = document.getElementById(`fill-${qi}-${b}`);
      const expected = q.correct[b] ? normalize(q.correct[b]) : null;
      const got = vals[b] || '';
      const ok = expected !== null &amp;&amp; got === expected;
      if (!ok) allCorrect = false;
      if (inp) inp.classList.add(ok ? 'correct-input' : 'wrong-input');
    }
    isCorrect = allCorrect;
  }

  document.getElementById(`qcard-${qi}`).classList.add(isCorrect ? 'correct' : 'wrong');
  const fb = document.getElementById(`fb-${qi}`);
  fb.className = `feedback show ${isCorrect ? 'ok' : 'bad'}`;
  fb.innerHTML = isCorrect
    ? `✓ Dobrze! ${q.explain}`
    : `✗ Poprawne: <span class=&quot;correct-ans&quot;>${q.correct.join(' / ')}</span>. ${q.explain}`;
  updateScore();
}

function updateScore() {
  const d = currentData();
  const t = d.tenses[currentTense];
  const qs = t.questions[currentLevel] || t.questions.p;
  const answered = Object.keys(answers).length;
  const correct = Object.entries(answers).filter(([qi, ans]) => {
    const q = qs[qi];
    if (q.type === 'mcq') return parseInt(ans) === q.correct;
    // fill: multi-blank stored as 'val1|val2', single as plain val
    if (String(ans).includes('|')) {
      const vals = String(ans).split('|');
      return vals.every((v, i) => q.correct[i] &amp;&amp; normalize(q.correct[i]) === normalize(v));
    }
    return q.correct.map(normalize).some(c => c === normalize(String(ans)));
  }).length;
  const badge = document.getElementById('score-badge');
  if (badge) badge.textContent = `${correct} / ${qs.length}`;
  if (answered === qs.length) {
    tenseScores[t.id] = correct;
    renderSidebar();
    setTimeout(() => showResults(correct, qs.length), 700);
  }
}

function showResults(score, total) {
  document.getElementById('tense-content').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.classList.add('show');
  const pct = score / total;
  document.getElementById('results-score').textContent = `${score} / ${total}`;
  document.getElementById('results-icon').textContent = pct >= 0.85 ? '🏆' : pct >= 0.6 ? '💪' : '📖';
  document.getElementById('results-msg').textContent = pct >= 0.85
    ? 'Świetnie! Masz to opanowane. Przejdź do kolejnej sekcji.'
    : pct >= 0.6
    ? 'Nieźle! Przejrzyj błędy i spróbuj jeszcze raz — jesteś blisko.'
    : 'Wróć do notatki i spróbuj jeszcze raz. Ta sekcja wymaga więcej uwagi.';
}

function restartTense() {
  answers = {};
  const d = currentData();
  delete tenseScores[d.tenses[currentTense].id];
  document.getElementById('tense-content').style.display = 'block';
  document.getElementById('results-screen').classList.remove('show');
  renderSidebar();
  renderTense(currentTense);
  window.scrollTo(0, 0);
}

renderSidebar();
renderTense(0);
</script>
