<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maraton Maturalny — Ćwiczenia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8; --surface: #fffdf7; --surface2: #eee8d8;
    --border: #d6cdb8; --border2: #c4b99f;
    --text: #1a2744; --text2: #4a5a7a; --text3: #8a96b0;
    --accent: #1a2744; --blue: #3a5cbf;
    --green: #2d7a4f; --green-bg: #e8f5ee;
    --red: #b84040; --red-bg: #faeaea;
    --purple: #4a3fa0; --purple-bg: #eeecf8;
    --radius: 10px;
    --mono: 'DM Mono', monospace;
    --serif: 'DM Serif Display', serif;
    --sans: 'Instrument Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; line-height: 1.6; }

  /* TOP BAR */
  .topbar { border-bottom: 1px solid var(--border); padding: 20px 32px 0; display: flex; align-items: flex-end; gap: 0; flex-wrap: wrap; background: var(--surface); }
  .topbar-left { flex: 1; min-width: 200px; padding-bottom: 16px; }
  .eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--blue); margin-bottom: 5px; }
  h1 { font-family: var(--serif); font-size: clamp(20px, 3.5vw, 30px); font-weight: 400; color: var(--text); line-height: 1.1; }
  h1 em { font-style: italic; color: var(--blue); }
  .subtitle { font-size: 13px; color: var(--text2); margin-top: 4px; }

  /* DAY TABS */
  .day-tabs { display: flex; gap: 4px; align-items: flex-end; padding-bottom: 0; }
  .day-tab { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; padding: 10px 20px; border: 1px solid transparent; border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer; background: var(--surface2); color: var(--text3); transition: all 0.15s; margin-bottom: -1px; }
  .day-tab:hover { background: var(--surface); color: var(--text2); }
  .day-tab.active { background: var(--bg); color: var(--text); border-color: var(--border); font-weight: 600; border-bottom-color: var(--bg); }

  /* LEVEL TOGGLE */
  .controls-bar { padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .level-toggle { display: flex; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 3px; gap: 3px; }
  .level-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; padding: 7px 16px; border: none; border-radius: 7px; cursor: pointer; background: transparent; color: var(--text2); transition: all 0.2s; }
  .level-btn.active { background: var(--accent); color: #f5f0e8; font-weight: 600; }
  .day-label { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }

  /* MAIN */
  .main { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 130px); }
  .sidebar { border-right: 1px solid var(--border); padding: 20px 0; position: sticky; top: 0; height: calc(100vh - 130px); overflow-y: auto; display: flex; flex-direction: column; }
  .sidebar-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); padding: 0 18px; margin-bottom: 10px; }
  .tense-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; font-size: 13px; color: var(--text2); }
  .tense-item:hover { background: var(--surface2); color: var(--text); }
  .tense-item.active { background: var(--surface2); color: var(--text); border-left-color: var(--blue); }
  .tense-item.done { color: var(--green); }
  .tense-item.done .tense-check { opacity: 1; }
  .tense-check { font-size: 11px; opacity: 0; color: var(--green); }
  .progress-bar-wrap { padding: 18px; margin-top: auto; }
  .progress-label { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.4s ease; }

  /* CONTENT */
  .content { padding: 28px 32px; max-width: 720px; }
  .tense-header { margin-bottom: 24px; }
  .tense-tag { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); background: rgba(26,39,68,0.08); border: 1px solid rgba(26,39,68,0.2); border-radius: 4px; padding: 3px 8px; margin-bottom: 10px; }
  .tense-title { font-family: var(--serif); font-size: 24px; font-weight: 400; margin-bottom: 8px; }
  .tense-rule { font-size: 13px; color: var(--text2); line-height: 1.8; }
  .tense-rule strong { color: var(--text); font-weight: 500; }
  .tense-rule em { color: var(--blue); font-style: normal; }
  .signal-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .pill { font-family: var(--mono); font-size: 11px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px; padding: 3px 10px; color: var(--text2); }
  .pill-label { font-size: 10px; color: var(--text3); margin-top: 8px; margin-bottom: 4px; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; width: 100%; }

  /* QUESTIONS */
  .questions { display: flex; flex-direction: column; gap: 14px; }
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; transition: border-color 0.2s; }
  .q-card.correct { border-color: var(--green); background: var(--green-bg); }
  .q-card.wrong { border-color: var(--red); background: var(--red-bg); }
  .q-num { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-bottom: 8px; letter-spacing: 0.08em; display: flex; gap: 8px; align-items: center; }
  .q-type-badge { font-size: 9px; padding: 1px 6px; border-radius: 3px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text3); }
  .q-text { font-size: 15px; color: var(--text); margin-bottom: 12px; line-height: 1.7; }
  .q-text .blank { display: inline-block; border-bottom: 2px solid var(--blue); min-width: 80px; color: var(--blue); font-family: var(--mono); font-size: 14px; text-align: center; padding: 0 4px; }
  .options { display: flex; flex-direction: column; gap: 7px; }
  .option-btn { display: flex; align-items: center; gap: 10px; padding: 9px 13px; border: 1px solid var(--border2); border-radius: 8px; background: transparent; color: var(--text2); font-family: var(--sans); font-size: 13px; cursor: pointer; text-align: left; transition: all 0.15s; width: 100%; }
  .option-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--text); }
  .option-btn.selected-correct { border-color: var(--green); background: rgba(45,122,79,0.1); color: var(--green); }
  .option-btn.selected-wrong { border-color: var(--red); background: rgba(184,64,64,0.1); color: var(--red); }
  .option-btn.reveal-correct { border-color: var(--green); color: var(--green); background: rgba(45,122,79,0.06); }
  .opt-letter { font-family: var(--mono); font-size: 10px; min-width: 18px; height: 18px; border: 1px solid currentColor; border-radius: 3px; display: flex; align-items: center; justify-content: center; opacity: 0.7; flex-shrink: 0; }
  .fill-wrap { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .fill-input { font-family: var(--mono); font-size: 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); padding: 8px 14px; outline: none; transition: border-color 0.15s; min-width: 180px; }
  .fill-input:focus { border-color: var(--blue); }
  .fill-input.correct-input { border-color: var(--green); color: var(--green); }
  .fill-input.wrong-input { border-color: var(--red); color: var(--red); }
  .check-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 16px; background: var(--accent); color: #f5f0e8; border: none; border-radius: 7px; cursor: pointer; font-weight: 600; transition: opacity 0.15s; white-space: nowrap; }
  .check-btn:hover { opacity: 0.85; }
  .check-btn:disabled { opacity: 0.3; cursor: default; }
  .feedback { margin-top: 10px; font-size: 12px; line-height: 1.7; display: none; }
  .feedback.show { display: block; }
  .feedback.ok { color: var(--green); }
  .feedback.bad { color: var(--red); }
  .feedback .correct-ans { font-family: var(--mono); font-size: 12px; color: var(--blue); }
  .parity-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px; margin-left: 8px; vertical-align: middle; }
  .tag-p { background: rgba(45,122,79,0.12); color: var(--green); }
  .tag-r { background: rgba(74,63,160,0.12); color: var(--purple); }
  .section-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--border); }
  .nav-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 18px; border: 1px solid var(--border2); background: transparent; color: var(--text2); border-radius: 7px; cursor: pointer; transition: all 0.15s; }
  .nav-btn:hover:not(:disabled) { border-color: var(--blue); color: var(--text); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn.primary { background: var(--accent); color: #f5f0e8; border-color: var(--accent); font-weight: 600; }
  .score-badge { font-family: var(--mono); font-size: 13px; color: var(--text2); }
  .results-screen { display: none; text-align: center; padding: 60px 32px; }
  .results-screen.show { display: block; }
  .results-icon { font-size: 48px; margin-bottom: 16px; }
  .results-title { font-family: var(--serif); font-size: 28px; margin-bottom: 8px; }
  .results-score { font-family: var(--mono); font-size: 48px; color: var(--blue); margin: 16px 0; }
  .results-msg { font-size: 14px; color: var(--text2); max-width: 400px; margin: 0 auto 28px; line-height: 1.7; }
  .restart-btn { font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; padding: 11px 26px; background: var(--accent); color: #f5f0e8; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  @media (max-width: 640px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    .content { padding: 20px; }
    .topbar { padding: 16px 20px 0; }
    .controls-bar { padding: 12px 20px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="eyebrow">Maraton Maturalny</div>
    <h1>Ćwiczenia — <em>interaktywne</em></h1>
    <p class="subtitle">20 pytań na sekcję. Wybierz dzień i poziom.</p>
  </div>
  <div class="day-tabs">
    <div class="day-tab active" id="tab-d1" onclick="switchDay(1)">Dzień 1 — Czasy</div>
    <div class="day-tab" id="tab-d2" onclick="switchDay(2)">Dzień 2 — Conditionals</div>
  </div>
</div>

<div class="controls-bar">
  <span class="day-label" id="day-label">Dzień 1 — Czasy angielskie</span>
  <div class="level-toggle">
    <button class="level-btn active" onclick="setLevel('p')">Podstawowy</button>
    <button class="level-btn" onclick="setLevel('r')">Rozszerzony</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-label" id="sidebar-label">Czasy</div>
    <div id="tense-list"></div>
    <div class="progress-bar-wrap">
      <div class="progress-label">
        <span>Postęp</span>
        <span id="progress-text">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
  </div>
  <div class="content">
    <div id="tense-content"></div>
    <div class="results-screen" id="results-screen">
      <div class="results-icon" id="results-icon">🎯</div>
      <div class="results-title">Sekcja ukończona!</div>
      <div class="results-score" id="results-score">—</div>
      <div class="results-msg" id="results-msg"></div>
      <button class="restart-btn" onclick="restartTense()">Spróbuj jeszcze raz</button>
    </div>
  </div>
</div>

<script>
// ─── DAY 1 DATA ────────────────────────────────────────────────────────────
const DAY1 = { label: 'Dzień 1 — Czasy angielskie', sidebarLabel: 'Czasy', tenses: [
  { id:'ps_pc', name:'Present Simple / Continuous', tag:'Teraźniejszość',
    rule:'<strong>Present Simple:</strong> fakty, nawyki, prawdy ogólne, rozkłady jazdy.<br><strong>Present Continuous:</strong> czynność teraz lub tymczasowo, plany, irytujące nawyki (always).<br><strong>Uwaga:</strong> czasowniki statyczne nie mają formy Continuous — <em>know, believe, want, need, love, hate, understand, seem, prefer, belong.</em>',
    signals:{'PS — sygnały':['always','usually','often','never','every day','sometimes','on Mondays'],'PC — sygnały':['now','at the moment','currently','today','this week','Look!','Listen!','right now','these days']},
    questions:{ p:[
      {type:'mcq',text:'She _____ to school every day by bus.',options:['is going','goes','go','has gone'],correct:1,explain:'Nawyk = Present Simple. She goes.'},
      {type:'mcq',text:'Listen! The baby _____ again.',options:['cries','is crying','cry','has cried'],correct:1,explain:'Sygnał "Listen!" → czynność teraz = Present Continuous.'},
      {type:'fill',text:'Water _____ (boil) at 100 degrees Celsius.',correct:['boils'],explain:'Fakt naukowy = Present Simple. Water boils.'},
      {type:'mcq',text:'I _____ what you mean. It\'s perfectly clear.',options:['am understanding','understand','understood','am understand'],correct:1,explain:'Understand = czasownik statyczny. I understand.'},
      {type:'fill',text:'They _____ (work) on a new project this month.',correct:['are working'],explain:'Tymczasowa czynność = Present Continuous. Are working.'},
      {type:'mcq',text:'He always _____ his coffee without sugar.',options:['is drinking','drink','drinks','has drunk'],correct:2,explain:'Nawyk = Present Simple. He drinks.'},
      {type:'fill',text:'Look! The cat _____ (sit) on my laptop again.',correct:['is sitting'],explain:'Czynność teraz (Look!) = Present Continuous. Is sitting.'},
      {type:'mcq',text:'The train to Warsaw _____ at 8:15 every morning.',options:['is leaving','leave','leaves','has left'],correct:2,explain:'Rozkład jazdy = Present Simple. Leaves.'},
      {type:'fill',text:'She _____ (not / like) horror films at all.',correct:["doesn't like","does not like"],explain:'Statyczny, nawyk = Present Simple. Doesn\'t like.'},
      {type:'mcq',text:'Why _____ you _____ so quietly? I can barely hear you.',options:['are / speaking','do / speak','does / speak','have / spoken'],correct:0,explain:'Czynność w tej chwili = Present Continuous. Are you speaking.'},
      {type:'fill',text:'My parents _____ (visit) us this weekend.',correct:['are visiting'],explain:'Ustalony plan = Present Continuous. Are visiting.'},
      {type:'mcq',text:'I _____ she\'ll agree — she\'s very reasonable.',options:['am thinking','thinks','think','am think'],correct:2,explain:'Think (opinia) = statyczny = Present Simple. I think.'},
      {type:'fill',text:'The museum _____ (open) at 9 and _____ (close) at 6.',correct:['opens','closes'],explain:'Stały fakt = Present Simple. Opens and closes.'},
      {type:'mcq',text:'He\'s so annoying! He _____ always _____ my things.',options:['is / borrowing','does / borrow','has / borrowed','will / borrow'],correct:0,explain:'Irytujący nawyk z "always" = Present Continuous.'},
      {type:'fill',text:'I can\'t come now — I _____ (have) dinner.',correct:['am having'],explain:'Have (jeść) = dynamiczny = Present Continuous. Am having.'},
      {type:'mcq',text:'English _____ a lot of vocabulary from French.',options:['is borrowing','borrowed','borrows','has been borrowing'],correct:2,explain:'Stały fakt językowy = Present Simple. Borrows.'},
      {type:'fill',text:'The children _____ (get) louder and louder these days.',correct:['are getting'],explain:'Zmieniająca się sytuacja = Present Continuous. Are getting.'},
      {type:'mcq',text:'She _____ this coat. It\'s hers, not yours.',options:['is owning','owns','own','is own'],correct:1,explain:'Own = statyczny = Present Simple. She owns.'},
      {type:'fill',text:'He _____ (think) about changing his job. He seems unsure.',correct:['is thinking'],explain:'Think (rozważać) = dynamiczny = Present Continuous. Is thinking.'},
      {type:'mcq',text:'Scientists _____ that the climate is changing rapidly.',options:['are believing','believed','believe','are believe'],correct:2,explain:'Believe = statyczny = Present Simple. Believe.'},
    ], r:[
      {type:'mcq',text:'She _____ what you mean, even if she _____ nothing.',options:['understands / says','is understanding / says','understands / is saying','is understanding / is saying'],correct:2,explain:'Understand = statyczny (PS). Say = trwające teraz (PC). Understands / is saying.'},
      {type:'fill',text:'The data _____ (suggest) that temperatures _____ (rise) year on year.',correct:['suggest','are rising'],explain:'Suggest = statyczny (PS). Rise = trwający trend (PC).'},
      {type:'mcq',text:'I _____ he\'ll agree — he _____ the proposal carefully right now.',options:['think / is considering','am thinking / considers','think / considers','am thinking / is considering'],correct:0,explain:'Think (opinia) = PS. Consider (aktywny teraz) = PC. Think / is considering.'},
      {type:'fill',text:'This fabric _____ (feel) incredibly soft. I _____ (consider) buying it.',correct:['feels','am considering'],explain:'Feel (zmysłowy) = PS. Consider (aktywny) = PC. Feels / am considering.'},
      {type:'mcq',text:'The committee _____ that the policy needs revision. They _____ it at this very meeting.',options:['agrees / are discussing','agree / are discussing','agree / discuss','are agreeing / are discussing'],correct:1,explain:'Agree = statyczny PS. Discuss = aktywny, trwający = PC.'},
      {type:'fill',text:'She _____ (have) a meeting at 3, but she _____ (have) doubts about the plan.',correct:['is having','has'],explain:'Have (spotkanie) = dynamiczny PC. Have (wątpliwości) = statyczny PS.'},
      {type:'mcq',text:'The new regulations _____ into effect next Monday and they _____ the whole industry.',options:['come / will affect','are coming / affect','come / affect','are coming / will affect'],correct:0,explain:'Harmonogram (PS) + przyszły efekt (will). Come / will affect.'},
      {type:'fill',text:'Why _____ you _____ (smell) that perfume? It _____ (smell) like roses.',correct:['are','smelling','smells'],explain:'Smell (wąchać aktywnie) = PC. Smell (zapach) = PS. Are smelling / smells.'},
      {type:'mcq',text:'He consistently _____ deadlines, which _____ his manager increasingly.',options:['is missing / is frustrating','misses / is frustrating','is missing / frustrates','misses / frustrates'],correct:1,explain:'Nawyk = PS. Irytujący trwający efekt = PC. Misses / is frustrating.'},
      {type:'fill',text:'I _____ (see) your point, but I _____ (see) him tomorrow.',correct:['see','am seeing'],explain:'See (rozumieć) = PS. See (spotykać, plan) = PC. See / am seeing.'},
      {type:'mcq',text:'The economy _____ well this quarter, though inflation still _____ a concern.',options:['performs / poses','is performing / poses','is performing / is posing','performs / is posing'],correct:1,explain:'Tymczasowy trend = PC. Stały fakt = PS. Is performing / poses.'},
      {type:'fill',text:'She _____ (appear) calm, but I _____ (appear) in court tomorrow.',correct:['appears','am appearing'],explain:'Appear (wyglądać) = PS. Appear (pojawiać się, plan) = PC.'},
      {type:'mcq',text:'The author _____ a new novel and she _____ it will be her best yet.',options:['writes / thinks','is writing / thinks','writes / is thinking','is writing / is thinking'],correct:1,explain:'Aktywny proces teraz = PC. Opinia = statyczny PS. Is writing / thinks.'},
      {type:'fill',text:'These days more people _____ (work) remotely, which _____ (mean) commutes are less common.',correct:['are working','means'],explain:'Zmieniający się trend = PC. Stały wynikający fakt = PS.'},
      {type:'mcq',text:'I _____ to tell you this, but your answer _____ wrong.',options:['am hating / is','hate / is','hate / are','am hating / are'],correct:1,explain:'Hate = statyczny PS. Is (fakt) = PS. Hate / is.'},
      {type:'fill',text:'The situation _____ (look) better than it _____ (sound).',correct:['looks','sounds'],explain:'Look + sound = statyczne = PS. Looks / sounds.'},
      {type:'mcq',text:'He _____ to music on his way to work and today he _____ his new favourite album.',options:['listens / is listening','is listening / listens','listens / listens','is listening / is listening'],correct:0,explain:'Nawyk = PS. Konkretna czynność teraz = PC. Listens / is listening.'},
      {type:'fill',text:'I _____ (not / belong) to any political party. I _____ (prefer) to stay neutral.',correct:["don't belong","do not belong","prefer"],explain:'Belong + prefer = statyczne = PS.'},
      {type:'mcq',text:'She _____ more and more confident. Her teachers _____ it too.',options:['becomes / are noticing','is becoming / notice','is becoming / are noticing','becomes / notice'],correct:2,explain:'Zmieniająca się sytuacja = PC. Notice (aktywnie trwający) = PC. Is becoming / are noticing.'},
      {type:'fill',text:'The patient _____ (feel) better today, but the doctor _____ (feel) he needs more rest.',correct:['is feeling','feels'],explain:'Feel (stan fizyczny, zmienny) = PC. Feel (uważać) = PS. Is feeling / feels.'},
    ]}
  },
  { id:'past_ps_pc', name:'Past Simple / Continuous', tag:'Przeszłość',
    rule:'<strong>Past Simple:</strong> czynność zakończona w konkretnym momencie.<br><strong>Past Continuous:</strong> czynność trwała w tle, przerywana przez PS.<br>Klasyczna konstrukcja: <em>While I was cooking, the phone rang.</em>',
    signals:{'PS — sygnały':['yesterday','last year','ago','in 2010','when','then'],'PC — sygnały':['while','when (przerwanie)','at 5 o\'clock yesterday','all evening','as']},
    questions:{ p:[
      {type:'mcq',text:'She _____ TV when her phone rang.',options:['watched','was watching','has watched','watches'],correct:1,explain:'Czynność w tle (PC) przerwana przez PS. Was watching.'},
      {type:'fill',text:'I _____ (see) him yesterday at the station.',correct:['saw'],explain:'Konkretny moment = Past Simple. Saw.'},
      {type:'mcq',text:'While they _____, the lights _____ out.',options:['were eating / went','ate / were going','were eating / were going','ate / went'],correct:0,explain:'Tło = PC (were eating), zdarzenie = PS (went). While they were eating, the lights went out.'},
      {type:'fill',text:'She _____ (study) all evening but _____ (not / finish) in time.',correct:['was studying',"didn't finish","did not finish"],explain:'Trwający proces = PC. Wynik = PS. Was studying / didn\'t finish.'},
      {type:'mcq',text:'I _____ my keys when I _____ for the bus.',options:['dropped / was waiting','was dropping / waited','dropped / waited','was dropping / was waiting'],correct:0,explain:'Zdarzenie = PS (dropped). Tło = PC (was waiting).'},
      {type:'fill',text:'What _____ you _____ (do) at 8 o\'clock last night?',correct:['were','doing'],explain:'Konkretny moment + czynność trwająca = PC. Were you doing.'},
      {type:'mcq',text:'He _____ his ankle while he _____ basketball.',options:['twisted / was playing','was twisting / played','twisted / played','was twisting / was playing'],correct:0,explain:'Zdarzenie = PS (twisted). Tło = PC (was playing).'},
      {type:'fill',text:'The sun _____ (shine) and birds _____ (sing) when we _____ (leave).',correct:['was shining','were singing','left'],explain:'Sceneria = PC x2. Zdarzenie = PS. Was shining / were singing / left.'},
      {type:'mcq',text:'She _____ the bus because she _____ late.',options:['missed / was running','was missing / ran','missed / ran','was missing / was running'],correct:0,explain:'Wynik = PS. Przyczyna (trwający stan) = PC. Missed / was running.'},
      {type:'fill',text:'We _____ (just / sit) down to eat when the doorbell _____ (ring).',correct:['were just sitting','just were sitting','rang'],explain:'Czynność w toku = PC. Przerwanie = PS. Were just sitting / rang.'},
      {type:'mcq',text:'_____ you _____ when I called? You didn\'t pick up.',options:['Did / sleep','Were / sleeping','Have / slept','Did / sleeping'],correct:1,explain:'Czynność trwająca w chwili przerwania = PC. Were you sleeping.'},
      {type:'fill',text:'He _____ (not / listen) to the teacher; he _____ (draw) pictures instead.',correct:["wasn't listening","was not listening","was drawing"],explain:'Trwające czynności = PC x2. Wasn\'t listening / was drawing.'},
      {type:'mcq',text:'As she _____ to work, she _____ an old friend.',options:['walked / was meeting','was walking / met','walked / met','was walking / was meeting'],correct:1,explain:'Tło = PC (was walking). Zdarzenie = PS (met).'},
      {type:'fill',text:'The children _____ (play) in the garden when it _____ (start) to rain.',correct:['were playing','started'],explain:'Tło = PC. Zdarzenie = PS. Were playing / started.'},
      {type:'mcq',text:'I _____ him for the first time in 2018. We _____ both _____ for the same company.',options:['met / were / working','was meeting / worked','met / worked','was meeting / were / working'],correct:0,explain:'Zdarzenie = PS (met). Tło = PC (were working).'},
      {type:'fill',text:'She _____ (read) a book, _____ (drink) tea, and _____ (listen) to music when I arrived.',correct:['was reading','was drinking','was listening'],explain:'Trzy czynności w tle = PC x3.'},
      {type:'mcq',text:'The fire _____ while everyone _____.',options:['started / was sleeping','was starting / slept','started / slept','was starting / was sleeping'],correct:0,explain:'Zdarzenie = PS (started). Tło = PC (was sleeping).'},
      {type:'fill',text:'I _____ (try) to call you all morning but you _____ (not / answer).',correct:['was trying',"didn't answer","was not answering","wasn't answering"],explain:'Trwający wysiłek = PC. Fakt = PS.'},
      {type:'mcq',text:'When the police arrived, the burglar _____ through the window.',options:['climbed','was climbing','has climbed','had climbed'],correct:1,explain:'Czynność w toku w momencie przybycia = PC. Was climbing.'},
      {type:'fill',text:'She _____ (wear) her favourite dress and _____ (look) wonderful at the party.',correct:['was wearing','looked'],explain:'Opis wyglądu (tło) = PC. Ogólna ocena = PS. Was wearing / looked.'},
    ], r:[
      {type:'mcq',text:'He _____ the report when he _____ an error he _____ earlier.',options:['was reviewing / noticed / had overlooked','reviewed / was noticing / overlooked','was reviewing / was noticing / had overlooked','reviewed / noticed / had overlooked'],correct:0,explain:'Tło = PC, zdarzenie = PS, wcześniejsza czynność = PP.'},
      {type:'fill',text:'By the time the police _____ (arrive), the thieves _____ (escape).',correct:['arrived','had escaped'],explain:'Wcześniejsza czynność = Past Perfect. Arrived / had escaped.'},
      {type:'mcq',text:'She _____ the presentation confidently, though she _____ the material only briefly beforehand.',options:['was delivering / studied','delivered / had studied','was delivering / had studied','delivered / studied'],correct:1,explain:'Ukończone zdarzenie = PS. Wcześniejsze przygotowanie = PP.'},
      {type:'fill',text:'While the scientists _____ (analyse) the samples, they _____ (discover) something they _____ (not / expect).',correct:['were analysing','discovered',"hadn't expected","had not expected"],explain:'Tło = PC. Zdarzenie = PS. Wcześniejsze oczekiwanie = PP negatywne.'},
      {type:'mcq',text:'The witness claimed she _____ in the park when the incident _____.',options:['walked / was occurring','was walking / occurred','walked / occurred','was walking / was occurring'],correct:1,explain:'Tło (alibi) = PC. Zdarzenie = PS. Was walking / occurred.'},
      {type:'fill',text:'As the CEO _____ (speak), it _____ (become) clear that the company _____ (lose) millions.',correct:['was speaking','became','had lost'],explain:'Tło = PC. Odkrycie = PS. Wcześniejsza strata = PP.'},
      {type:'mcq',text:'I _____ the contract when I _____ that I _____ the wrong document.',options:['was signing / realised / had been given','signed / was realising / was given','was signing / realised / was given','signed / realised / had been given'],correct:0,explain:'Tło = PC. Odkrycie = PS. Wcześniejsze wręczenie (PP strona bierna) = had been given.'},
      {type:'fill',text:'The storm _____ (rage) all night, but by morning it _____ (pass) and the sun _____ (shine).',correct:['was raging','had passed','was shining'],explain:'Tło nocne = PC. Ukończone przed ranem = PP. Tło ranne = PC.'},
      {type:'mcq',text:'Detectives _____ the area when a local resident _____ them a crucial tip.',options:['were searching / gave','searched / was giving','searched / gave','were searching / was giving'],correct:0,explain:'Tło = PC (were searching). Zdarzenie = PS (gave).'},
      {type:'fill',text:'She _____ (not / realise) how serious the situation _____ (be) until it _____ (be) too late.',correct:["didn't realise","did not realise","was","was"],explain:'PS negatywne + PS (stan) + PS (moment).'},
      {type:'mcq',text:'The students _____ quietly when the headteacher unexpectedly _____ into the room.',options:['studied / was walking','were studying / walked','studied / walked','were studying / was walking'],correct:1,explain:'Tło = PC. Zdarzenie = PS. Were studying / walked.'},
      {type:'fill',text:'He _____ (just / fall) asleep when his alarm _____ (go) off.',correct:['was just falling','had just fallen','went'],explain:'Czynność w toku = PC lub PP. PS dla alarmu.'},
      {type:'mcq',text:'The journalist _____ an exposé that _____ months of undercover work.',options:['was publishing / involved','published / was involving','published / involved','was publishing / was involving'],correct:2,explain:'Ukończone zdarzenie = PS x2. Published / involved.'},
      {type:'fill',text:'While she _____ (recover) in hospital, her colleagues _____ (cover) for her and _____ (do) an excellent job.',correct:['was recovering','were covering','did'],explain:'Tło = PC x2. Ocena końcowa = PS.'},
      {type:'mcq',text:'He _____ faster and faster and before long he _____ the world record.',options:['ran / broke','was running / broke','ran / was breaking','was running / was breaking'],correct:1,explain:'Trwający postęp = PC. Moment osiągnięcia = PS. Was running / broke.'},
      {type:'fill',text:'The negotiations _____ (drag) on for weeks until both sides finally _____ (reach) an agreement.',correct:['were dragging','reached'],explain:'Trwający proces = PC. Ostateczne zdarzenie = PS.'},
      {type:'mcq',text:'As she _____ up the stairs, she _____ something and _____ her ankle.',options:['was running / tripped / twisted','ran / was tripping / twisted','was running / tripped / was twisting','ran / tripped / twisted'],correct:0,explain:'Tło = PC. Dwa zdarzenia = PS x2.'},
      {type:'fill',text:'Nobody _____ (notice) that the painting _____ (hang) upside down for three days.',correct:['noticed','had been hanging'],explain:'Odkrycie = PS. Wcześniejszy stan trwający = PPC.'},
      {type:'mcq',text:'When we _____ up, our parents _____ for us with dinner on the table.',options:['turned / waited','were turning / were waiting','turned / were waiting','were turning / waited'],correct:2,explain:'Zdarzenie = PS (turned up). Stan oczekiwania = PC (were waiting).'},
      {type:'fill',text:'I _____ (walk) past the café when I _____ (smell) fresh coffee and _____ (decide) to go in.',correct:['was walking','smelled','decided'],explain:'Tło = PC. Dwa zdarzenia = PS x2.'},
    ]}
  },
  { id:'pp_ps', name:'Present Perfect / Past Simple', tag:'Kluczowy kontrast',
    rule:'<strong>Present Perfect:</strong> łączność z teraźniejszością, nieokreślony czas, doświadczenia.<br><strong>Past Simple:</strong> zamknięta przeszłość, wiem dokładnie kiedy.<br>To najczęstszy błąd na maturze.',
    signals:{'PP — sygnały':['already','yet','just','ever','never','since','for','recently','lately','so far'],'PS — sygnały':['yesterday','last week','ago','in 2010','when I was...','in January','at 5pm']},
    questions:{ p:[
      {type:'mcq',text:'I _____ my keys. I can\'t find them anywhere.',options:['lost','have lost','was losing','had lost'],correct:1,explain:'Nie wiem kiedy, ważne że teraz ich brak = Present Perfect. Have lost.'},
      {type:'fill',text:'She _____ (never / be) to Japan. She\'d love to go.',correct:['has never been'],explain:'Never + brak czasu = PP. Has never been.'},
      {type:'mcq',text:'I _____ him yesterday at the café on Main Street.',options:['have seen','see','saw','was seeing'],correct:2,explain:'Yesterday = konkretny moment = Past Simple. Saw.'},
      {type:'fill',text:'They _____ (just / finish) the exam. They look so relieved!',correct:['have just finished'],explain:'Just = Present Perfect. Have just finished.'},
      {type:'mcq',text:'_____ you ever _____ sushi before?',options:['Did / eat','Have / eaten','Do / eat','Were / eating'],correct:1,explain:'Ever + doświadczenie = PP. Have you ever eaten.'},
      {type:'fill',text:'I _____ (live) here since 2018 and I love it.',correct:['have lived',"'ve lived"],explain:'Since + trwający stan = PP. Have lived.'},
      {type:'mcq',text:'She _____ three cups of coffee this morning. It\'s only 9am!',options:['drank','was drinking','has drunk','drinks'],correct:2,explain:'This morning (niezakończony) + liczba = PP. Has drunk.'},
      {type:'fill',text:'When _____ you _____ (meet) your best friend for the first time?',correct:['did','meet'],explain:'Konkretny moment (when + first time) = PS. When did you meet.'},
      {type:'mcq',text:'Oh no! I _____ to bring my umbrella!',options:['forgot','have forgotten','was forgetting','forget'],correct:1,explain:'Skutek widoczny teraz = PP. Have forgotten.'},
      {type:'fill',text:'The team _____ (not / win) a single match so far this season.',correct:["haven't won","have not won"],explain:'So far = PP. Haven\'t won.'},
      {type:'mcq',text:'I _____ this film twice already. Let\'s watch something else.',options:['saw','was seeing','see','have seen'],correct:3,explain:'Already + liczba razy = PP. Have seen.'},
      {type:'fill',text:'She _____ (leave) school at 16 and _____ (start) working immediately.',correct:['left','started'],explain:'Zamknięta sekwencja = PS x2. Left / started.'},
      {type:'mcq',text:'I\'m exhausted! I _____ in the garden all afternoon.',options:['worked','was working','have been working','work'],correct:2,explain:'Rezultat widoczny teraz = PPC. Have been working.'},
      {type:'fill',text:'He _____ (not / eat) anything since breakfast. He must be starving.',correct:["hasn't eaten","has not eaten"],explain:'Since + skutek teraz = PP. Hasn\'t eaten.'},
      {type:'mcq',text:'The company _____ in 1892 and _____ since then.',options:['was founded / has thrived','founded / thrived','has been founded / has thrived','was founded / thrived'],correct:0,explain:'Konkretna data = PS (was founded). Trwający stan = PP (has thrived).'},
      {type:'fill',text:'I _____ (already / send) the email — you should have it by now.',correct:['have already sent',"'ve already sent"],explain:'Already + skutek teraz = PP. Have already sent.'},
      {type:'mcq',text:'_____ she call you yesterday evening?',options:['Has','Did','Was','Have'],correct:1,explain:'Yesterday = PS. Did she call.'},
      {type:'fill',text:'We _____ (not / see) each other for ages! You look great.',correct:["haven't seen","have not seen"],explain:'For + skutek teraz = PP. Haven\'t seen.'},
      {type:'mcq',text:'I _____ a lot about this issue. My conclusion is that we need to act now.',options:['thought','was thinking','have thought','think'],correct:2,explain:'Przemyślenie wpływające na teraźniejszość = PP. Have thought.'},
      {type:'fill',text:'The last time I _____ (see) him, he _____ (work) in Warsaw.',correct:['saw','was working'],explain:'Last time = PS. Stan w tamtym czasie = PC. Saw / was working.'},
    ], r:[
      {type:'fill',text:'He started working here in 2015. He _____ (work) here _____ 2015.',correct:['has worked','since'],explain:'Transformacja: started in 2015 → has worked since 2015.'},
      {type:'mcq',text:'The crime rate _____ dramatically since the new policy _____ introduced.',options:['fell / was','has fallen / was','fell / has been','has fallen / has been'],correct:1,explain:'Trwający efekt = PP. Jednorazowy fakt = PS. Has fallen / was.'},
      {type:'fill',text:'It\'s the best film I _____ (ever / see).',correct:['have ever seen',"'ve ever seen"],explain:'Superlative + ever = PP. Have ever seen.'},
      {type:'mcq',text:'This is only the second time she _____ a formal presentation.',options:['gave','has given','was giving','gives'],correct:1,explain:'This is the + ordinal + time = PP. Has given.'},
      {type:'fill',text:'Researchers _____ (identify) a new species that _____ (live) in the Amazon for millions of years.',correct:['have identified','has lived',"'s lived"],explain:'Niedawne odkrycie = PP. Trwający fakt od dawna = PP.'},
      {type:'mcq',text:'She _____ three novels by the time she was thirty and _____ four more since then.',options:['wrote / published','wrote / has published','has written / published','has written / has published'],correct:1,explain:'By the time (zamknięte) = PS. Since then (do teraz) = PP. Wrote / has published.'},
      {type:'fill',text:'I _____ (wait) for over an hour! Why _____ you _____ (not / call)?',correct:['have been waiting',"haven't","have not","called"],explain:'Trwające oczekiwanie = PPC. Brak telefonu = PP. Have been waiting / haven\'t called.'},
      {type:'mcq',text:'The population _____ by 20% in the last decade, mainly because many people _____ here from rural areas.',options:['grew / moved','has grown / have moved','grew / have moved','has grown / moved'],correct:1,explain:'Ostatnia dekada (niezakończona) = PP x2. Has grown / have moved.'},
      {type:'fill',text:'It\'s the first time I _____ (ever / eat) oysters. They\'re surprisingly good!',correct:['have ever eaten',"'ve ever eaten"],explain:'First time + ever = PP. Have ever eaten.'},
      {type:'mcq',text:'He _____ the book three times and each time he _____ something new.',options:['has read / discovered','read / discovered','has read / has discovered','read / has discovered'],correct:1,explain:'Zamknięta seria bez związku z teraźniejszością = PS x2. Read / discovered.'},
      {type:'fill',text:'Sales _____ (increase) steadily since we _____ (launch) the new campaign last spring.',correct:['have increased',"'ve increased",'launched'],explain:'Trwający efekt = PP. Konkretny moment = PS. Have increased / launched.'},
      {type:'mcq',text:'I _____ her once at a conference in 2019, and I _____ her since.',options:['met / haven\'t seen','have met / didn\'t see','met / didn\'t see','have met / haven\'t seen'],correct:0,explain:'Konkretny rok = PS. Od tamtej pory = PP. Met / haven\'t seen.'},
      {type:'fill',text:'By the time the investigation _____ (conclude), police _____ (interview) over two hundred witnesses.',correct:['concluded','had interviewed'],explain:'Zamknięta sekwencja. Ukończone przed = PP. Concluded / had interviewed.'},
      {type:'mcq',text:'The government _____ several measures, but critics argue that these _____ insufficient.',options:['took / proved','has taken / have proved','took / have proved','has taken / proved'],correct:1,explain:'Działania do teraz = PP. Ocena trwająca = PP. Has taken / have proved.'},
      {type:'fill',text:'I _____ (recently / start) learning Portuguese. I _____ (always / want) to visit Lisbon.',correct:['have recently started','have always wanted',"'ve recently started","'ve always wanted"],explain:'Recently + always = PP x2.'},
      {type:'mcq',text:'The last time scientists _____ such data was in 1987, and conditions _____ significantly since then.',options:['recorded / changed','have recorded / have changed','recorded / have changed','have recorded / changed'],correct:2,explain:'Last time + konkretny rok = PS. Since then = PP. Recorded / have changed.'},
      {type:'fill',text:'How many times _____ you _____ (visit) the doctor this year?',correct:['have','visited'],explain:'This year (niezakończony) + how many times = PP. Have you visited.'},
      {type:'mcq',text:'She _____ the role of manager for six months when the company suddenly _____ her.',options:['held / promoted','has held / promoted','had held / promoted','was holding / was promoting'],correct:2,explain:'Wcześniejszy stan przed zdarzeniem = Past Perfect. Had held / promoted.'},
      {type:'fill',text:'The situation _____ (change) dramatically since last year\'s report _____ (come) out.',correct:['has changed',"'s changed",'came'],explain:'Trwająca zmiana = PP. Konkretny moment = PS. Has changed / came.'},
      {type:'mcq',text:'This _____ the third time this week that he _____ late to a meeting.',options:['is / was','is / has been','has been / was','has been / has been'],correct:1,explain:'This is the third time = PS (teraź.) + PP (seryjny fakt). Is / has been.'},
    ]}
  },
  { id:'pp_ppc', name:'Present Perfect / PP Continuous', tag:'Efekt vs proces',
    rule:'<strong>Present Perfect:</strong> wynik, efekt — CO zostało zrobione.<br><strong>Present Perfect Continuous:</strong> trwający proces — JAK DŁUGO.<br><em>I\'ve written three emails</em> (wynik) vs <em>I\'ve been writing emails all morning</em> (proces).',
    signals:{'PP — sygnały':['three times','five emails','already','just','never','completely'],'PPC — sygnały':['all day','all morning','for hours','lately','recently','how long']},
    questions:{ p:[
      {type:'mcq',text:'She\'s exhausted. She _____ all day.',options:['worked','has worked','has been working','is working'],correct:2,explain:'Skupienie na procesie, czasie trwania = PPC. Has been working.'},
      {type:'fill',text:'He _____ (read) for two hours and _____ (finish) three chapters.',correct:['has been reading','has finished'],explain:'Czas trwania = PPC. Policzalny wynik = PP.'},
      {type:'mcq',text:'How long _____ you _____ English?',options:['did / study','have / studied','have / been studying','are / studying'],correct:2,explain:'How long + trwający proces = PPC. Have you been studying.'},
      {type:'fill',text:'I _____ (paint) the kitchen — look at the mess!',correct:['have been painting',"'ve been painting"],explain:'Trwający proces z widocznym skutkiem = PPC. Have been painting.'},
      {type:'mcq',text:'He _____ four books this year — quite impressive.',options:['has been writing','wrote','has written','is writing'],correct:2,explain:'Policzalny wynik w niezakończonym czasie = PP. Has written.'},
      {type:'fill',text:'My eyes are red because I _____ (cry).',correct:['have been crying',"'ve been crying"],explain:'Widoczny fizyczny skutek = PPC. Have been crying.'},
      {type:'mcq',text:'She _____ that book for months! When will she finally finish it?',options:['read','has read','has been reading','reads'],correct:2,explain:'Trwający, niezakończony proces = PPC. Has been reading.'},
      {type:'fill',text:'We _____ (wait) here for over an hour. This is ridiculous.',correct:['have been waiting',"'ve been waiting"],explain:'Trwające oczekiwanie z frustracją = PPC. Have been waiting.'},
      {type:'mcq',text:'He looks tanned — he _____ on holiday.',options:['has been','was','has been being','went'],correct:0,explain:'Stan = statyczny = PP (nie PPC). He has been on holiday.'},
      {type:'fill',text:'I _____ (try) to call you all morning. Why aren\'t you answering?',correct:['have been trying',"'ve been trying"],explain:'Powtarzające się próby = PPC. Have been trying.'},
      {type:'mcq',text:'She _____ three cups of tea so far today.',options:['has been drinking','has drunk','drank','is drinking'],correct:1,explain:'Policzalna liczba = PP. Has drunk.'},
      {type:'fill',text:'Your hands are dirty! What _____ you _____ (do)?',correct:['have','been doing'],explain:'Widoczny skutek procesu = PPC. What have you been doing?'},
      {type:'mcq',text:'I _____ this problem for hours and I still can\'t solve it.',options:['have thought about','thought about','have been thinking about','think about'],correct:2,explain:'Trwający nieukończony wysiłek = PPC. Have been thinking about.'},
      {type:'fill',text:'She _____ (work) here since 2020 and _____ (complete) over fifty projects.',correct:['has been working','has completed'],explain:'Trwający staż = PPC. Policzalne wyniki = PP.'},
      {type:'mcq',text:'The children look happy — they _____ in the pool.',options:['swam','have swum','have been swimming','are swimming'],correct:2,explain:'Wnioskowanie z wyglądu = PPC. Have been swimming.'},
      {type:'fill',text:'He _____ (not / sleep) well lately. He seems very tired.',correct:["hasn't been sleeping","has not been sleeping"],explain:'Trwający negatywny wzorzec = PPC. Hasn\'t been sleeping.'},
      {type:'mcq',text:'They _____ this bridge for three years already. When will they finish?',options:['built','have built','have been building','build'],correct:2,explain:'Trwający, niezakończony projekt = PPC. Have been building.'},
      {type:'fill',text:'I _____ (read) that report — I finished it an hour ago.',correct:['have read',"'ve read"],explain:'Ukończone, wynik gotowy = PP. Have read.'},
      {type:'mcq',text:'Why is the floor wet? Has someone _____ the plants?',options:['been watering','watered','been water','water'],correct:1,explain:'Ukończona czynność z konkretnym skutkiem = PP. Has someone watered.'},
      {type:'fill',text:'She looks nervous. I think she _____ (prepare) for her presentation.',correct:['has been preparing',"'s been preparing"],explain:'Trwające przygotowania (wnioskowanie) = PPC. Has been preparing.'},
    ], r:[
      {type:'mcq',text:'The river is polluted. Factories _____ waste into it for decades.',options:['dumped','have dumped','have been dumping','are dumping'],correct:2,explain:'Trwający szkodliwy proces = PPC. Have been dumping.'},
      {type:'fill',text:'I _____ (know) her for years. We _____ (work) together since 2019.',correct:['have known','have been working',"'ve known","'ve been working"],explain:'Know = statyczny = PP. Work = aktywny = PPC.'},
      {type:'mcq',text:'Scientists _____ the effects for a decade, but _____ no definitive conclusions yet.',options:['have studied / reached','have been studying / have reached','have been studying / haven\'t reached','have studied / haven\'t reached'],correct:2,explain:'Trwające badania = PPC. Brak wyniku = PP negatywne.'},
      {type:'fill',text:'The leak _____ (drip) for so long that the ceiling _____ (collapse) partially.',correct:['has been dripping','has collapsed',"'s been dripping","'s collapsed"],explain:'Trwający proces = PPC. Skutek = PP.'},
      {type:'mcq',text:'She _____ to master the piano since childhood and _____ several prestigious competitions.',options:['has been trying / has won','tried / won','has tried / has been winning','has been trying / has been winning'],correct:0,explain:'Trwający wysiłek = PPC. Policzalne osiągnięcia = PP.'},
      {type:'fill',text:'How many chapters _____ you _____ (write)? How long _____ you _____ (work) on the thesis?',correct:['have','written','have','been working'],explain:'Policzalny wynik = PP. Czas trwania = PPC.'},
      {type:'mcq',text:'The patient _____ remarkably well since surgery, and the recovery _____ all expectations.',options:['has been recovering / has exceeded','recovered / exceeded','has recovered / has been exceeding','has been recovering / has been exceeding'],correct:0,explain:'Trwający postęp = PPC. Wynik osiągnięty = PP.'},
      {type:'fill',text:'I _____ (not / see) results yet, even though I _____ (follow) the diet for six weeks.',correct:["haven't seen","have not seen","have been following","'ve been following"],explain:'Brak wyniku = PP. Trwający wysiłek = PPC.'},
      {type:'mcq',text:'The government _____ to address the housing crisis for years and _____ virtually nothing.',options:['has been promising / has achieved','promised / has been achieving','has promised / achieved','has been promising / has been achieving'],correct:0,explain:'Trwające obietnice = PPC. Brak osiągnięcia = PP.'},
      {type:'fill',text:'They _____ (live) in this flat for three years but _____ (only / decide) to renovate it now.',correct:['have been living','have only decided',"'ve been living","'ve only decided"],explain:'Trwający stan = PPC. Decyzja = PP.'},
      {type:'mcq',text:'I _____ this argument before and I _____ my mind.',options:['have heard / haven\'t changed','have been hearing / am not changing','heard / haven\'t changed','have heard / haven\'t been changing'],correct:0,explain:'PP (doświadczenie). PP negatywne (stan). Have heard / haven\'t changed.'},
      {type:'fill',text:'Sales _____ (rise) steadily. The team _____ (work) incredibly hard.',correct:['have been rising','have been working',"'ve been rising","'ve been working"],explain:'Trwające trendy = PPC x2.'},
